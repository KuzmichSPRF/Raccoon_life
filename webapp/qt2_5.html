<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QT2: Бюрократический Ад</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; }
        :root {
            --neon-cyan: #00ffcc;
            --neon-pink: #ff00ff;
            --neon-yellow: #ffff00;
            --bg-black: #050505;
            --panel-bg: rgba(15, 15, 15, 0.95);
        }
        body {
            margin: 0; background: var(--bg-black); color: var(--neon-cyan);
            font-family: 'Courier New', Courier, monospace;
            display: flex; height: 100vh; overflow: hidden;
        }
        #sidebar {
            width: 250px; background: #0a0a0a; border-right: 2px solid var(--neon-cyan);
            display: flex; flex-direction: column; padding: 15px; box-sizing: border-box;
            box-shadow: 2px 0 15px rgba(0, 255, 204, 0.2); z-index: 10;
        }
        .sidebar-title { font-weight: bold; text-align: center; margin-bottom: 20px; color: var(--neon-pink); border-bottom: 1px dashed var(--neon-pink); padding-bottom: 10px;}
        .floor-btn {
            background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan);
            padding: 8px; margin-bottom: 8px; cursor: pointer; text-align: left;
            transition: 0.2s; border-radius: 0; font-family: inherit; font-size: 0.85rem;
        }
        .floor-btn:hover:not(:disabled) { background: var(--neon-cyan); color: black; }
        .floor-btn.active { background: var(--neon-cyan); color: black; box-shadow: 0 0 10px var(--neon-cyan); }
        .floor-btn:disabled { border-color: #333; color: #555; cursor: not-allowed; }
        
        #inventory { margin-top: auto; border-top: 1px dashed var(--neon-cyan); padding-top: 10px; font-size: 0.75rem; }
        .seal { display: flex; align-items: center; gap: 10px; margin-top: 5px; color: #555; }
        .seal.active { color: var(--neon-yellow); text-shadow: 0 0 5px var(--neon-yellow); }

        .reset-btn {
            margin-bottom: 15px; padding: 10px; border: 1px dashed var(--neon-pink);
            background: transparent; color: var(--neon-pink); cursor: pointer;
            font-family: inherit; font-size: 0.8rem; text-transform: uppercase; width: 100%;
        }

        #main-content {
            flex: 1; display: flex; flex-direction: column; padding: 20px;
            overflow-y: auto; position: relative;
        }
        .scene-image {
            width: 100%; max-width: 500px; max-height: 200px;
            object-fit: contain; background: #0a0a0a;
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
            margin: 0 auto 15px auto; display: block; flex-shrink: 0;
        }
        .character-header { font-size: 1.4rem; color: var(--neon-pink); margin-bottom: 10px; text-shadow: 0 0 5px var(--neon-pink); text-align: center;}
        .dialog-box {
            background: var(--panel-bg); border: 1px solid var(--neon-pink); padding: 15px;
            min-height: 80px; margin-bottom: 15px; font-size: 1rem; line-height: 1.4;
            overflow-wrap: break-word; word-wrap: break-word; flex-shrink: 0;
        }
        .action-area { flex: 1 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-bottom: 30px; position: relative;}
        
        button.action-btn {
            background: transparent; border: 2px solid var(--neon-cyan); color: var(--neon-cyan);
            padding: 12px 20px; font-size: 1rem; cursor: pointer; margin: 8px;
            font-family: inherit; text-transform: uppercase; transition: 0.3s;
            width: 90%; max-width: 400px; box-sizing: border-box;
        }
        button.action-btn:hover:not(:disabled) { background: var(--neon-cyan); color: black; box-shadow: 0 0 15px var(--neon-cyan); }
        button.action-btn:disabled { border-color: #555; color: #555; cursor: not-allowed; }

        /* --- ИГРА 1: МЕДИК --- */
        #medic-game { width: 100%; max-width: 350px; height: 250px; border: 2px solid var(--neon-cyan); position: relative; overflow: hidden; background: #111; transition: background 0.3s; display: none; }
        .floating-letter { position: absolute; font-size: 2rem; font-weight: bold; color: white; cursor: pointer; padding: 10px; user-select: none; }
        #eye-btn { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: var(--neon-pink); color: black; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; font-family: inherit; z-index: 10; display: none; touch-action: none; }

        /* --- ИГРА 2: ТБ ЛАБИРИНТ --- */
        #maze-game { display: none; flex-direction: column; align-items: center; gap: 10px; }
        .maze-grid { display: grid; grid-template-columns: repeat(6, 40px); grid-template-rows: repeat(6, 40px); gap: 2px; background: #333; border: 2px solid var(--neon-cyan); padding: 2px; }
        .maze-cell { width: 40px; height: 40px; background: #111; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .maze-controls { display: grid; grid-template-columns: 60px 60px 60px; gap: 5px; margin-top: 10px; }
        .maze-btn { background: transparent; border: 1px solid var(--neon-pink); color: var(--neon-pink); font-size: 1.5rem; padding: 10px; cursor: pointer; text-align: center; }
        .maze-btn:active { background: var(--neon-pink); color: black; }

        /* --- ИГРА 3: СОРТИРОВКА ПАПОК --- */
        #archive-game { width: 100%; max-width: 400px; display: none; flex-direction: column; align-items: center; position: relative; }
        #active-folder { width: 200px; height: 120px; background: #fff; color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-bottom: 20px; border-radius: 5px 20px 5px 5px; border: 2px solid #555; text-align: center; padding: 10px; transition: transform 0.2s; font-family: sans-serif; box-shadow: 2px 2px 10px rgba(255,255,255,0.2);}
        .bin-row { display: flex; gap: 10px; width: 100%; justify-content: center; }
        .bin-btn { flex: 1; padding: 15px 5px; font-weight: bold; border: none; cursor: pointer; color: white; text-transform: uppercase; font-size: 0.8rem; }
        #dust-cloud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(100, 100, 100, 0.95); z-index: 20; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; font-weight: bold; opacity: 0; pointer-events: none; text-shadow: 2px 2px 0 #000; touch-action: none;}

        /* --- ИГРА 4: СТЕЛС БИБЛИОТЕКА --- */
        #stealth-game { width: 100%; max-width: 400px; display: none; flex-direction: column; align-items: center; position: relative; }
        #stealth-bar { width: 100%; height: 40px; border: 2px solid var(--neon-cyan); position: relative; margin-bottom: 20px; background: #111; }
        #stealth-zone { position: absolute; left: 40%; width: 12%; height: 100%; background: rgba(0, 255, 136, 0.4); border-left: 2px solid #0f8; border-right: 2px solid #0f8; }
        #stealth-cursor { position: absolute; left: 0; top: -5px; width: 10px; height: 50px; background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }
        #fake-tg { position: absolute; top: 20%; left: 5%; width: 90%; background: #2b5278; color: white; padding: 20px; border-radius: 10px; z-index: 30; display: none; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); font-family: sans-serif; }
        #fake-tg button { background: #4ca6ff; border: none; color: white; padding: 10px 20px; margin-top: 15px; border-radius: 5px; font-weight: bold; }

        .cursor { border-left: 10px solid var(--neon-cyan); margin-left: 5px; animation: blink 0.8s infinite; display: inline-block; height: 1.1em; vertical-align: text-bottom; }
        @keyframes blink { 50% { opacity: 0; } }
        .hidden { display: none !important; }

        #end-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-black); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #finish-btn:hover { background: var(--neon-cyan) !important; color: black !important; }

        @media (max-width: 768px) {
            body { flex-direction: column; display: flex; }
            #sidebar { width: 100%; height: auto; border-right: none; border-bottom: 2px solid var(--neon-cyan); display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; flex-shrink: 0;}
            .sidebar-title { display: none; }
            .floor-btn { margin: 0; padding: 5px 2px; font-size: 0.6rem; text-align: center; }
            .reset-btn { grid-column: span 3; margin: 0; width: 100%; padding: 8px 10px; }
            #inventory { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10, 10, 10, 0.95); border-top: 2px solid var(--neon-cyan); display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 8px; z-index: 50; }
            #inventory > div:first-child { display: none; }
            .seal { font-size: 0.65rem; margin: 0; }
            #main-content { padding-bottom: 80px; }
        }
    </style>
</head>
<body>
    <audio id="intro-music"><source src="https://raw.githubusercontent.com/KuzmichSPRF/QT2/main/intro.mp3" type="audio/mpeg"></audio>

    <div id="sidebar">
        <div class="sidebar-title">ЛИФТ СИСТЕМЫ</div>
        <button class="reset-btn" onclick="resetProgress()">[ Сбросить цикл ]</button>
        <button class="floor-btn hidden" id="btn-f40" onclick="loadFloor(40)">Этаж 40: Завхоз</button>
        <button class="floor-btn" id="btn-f21" onclick="loadFloor(21)">Этаж 21: Охрана Труда</button>
        <button class="floor-btn hidden" id="btn-f20" onclick="loadFloor(20)">Этаж 20: Медкабинет</button>
        <button class="floor-btn hidden" id="btn-f11" onclick="loadFloor(11)">Этаж 11: Архив</button>
        <button class="floor-btn hidden" id="btn-f10" onclick="loadFloor(10)">Этаж 10: Библиотека</button>
        
        <div id="inventory">
            <div style="color:var(--neon-cyan); margin-bottom:5px; width:100%; text-align:center;">--- ОБХОДНОЙ ЛИСТ ---</div>
            <div class="seal" id="inv-med">🩺 Осмотр пройден</div>
            <div class="seal" id="inv-tb">🦺 ТБ сдана</div>
            <div class="seal" id="inv-lib">🤫 Тишина соблюдена</div>
            <div class="seal" id="inv-lamp">🔦 УФ-Лампа</div>
            <div class="seal" id="inv-book">📘 Книга</div>
        </div>
    </div>

    <div id="main-content">
        <div class="character-header" id="char-name">ЛИФТ</div>
        <img id="floor-image" class="scene-image hidden" src="" alt="Сцена" onerror="this.onerror=null; this.src='https://via.placeholder.com/500x200/0a0a0a/ff00ff?text=IMAGE+404';">
        <div class="dialog-box" id="dialog-container">
            <span id="dialog-text">Мы погружаемся в нижние уровни. Здесь пахнет старой бумагой и корвалолом. Куда пойдем?</span><span id="dialog-cursor" class="cursor hidden"></span>
        </div>
        <div class="action-area" id="action-area">
            <button class="action-btn" onclick="loadFloor(21)">Начать с 21 этажа</button>
        </div>
    </div>

    <div id="end-screen" class="hidden">
        <button id="finish-btn" style="font-size: 1.5rem; padding: 20px; border: 2px solid var(--neon-cyan); background: transparent; color: var(--neon-cyan); text-transform: uppercase; box-shadow: 0 0 20px var(--neon-cyan); cursor: pointer; transition: 0.3s; font-family: inherit;">ЭТАП ПРОЙДЕН</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const lang = localStorage.getItem('rl_lang') || 'ru';
        const T = (ru, en) => lang === 'en' ? en : ru;
        
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'language_changed') {
                localStorage.setItem('rl_lang', event.data.lang);
                location.reload();
            }
        });

        document.addEventListener("DOMContentLoaded", () => {
            if (lang === 'en') {
                document.querySelector('.sidebar-title').innerText = "SYSTEM ELEVATOR";
                document.querySelector('.reset-btn').innerText = "[ Restart ]";
                document.getElementById('btn-f40').innerText = "Floor 40: Supply";
                document.getElementById('btn-f21').innerText = "Floor 21: Safety Dept";
                document.getElementById('btn-f20').innerText = "Floor 20: Medical";
                document.getElementById('btn-f11').innerText = "Floor 11: Archive";
                document.getElementById('btn-f10').innerText = "Floor 10: Library";
                document.querySelector('#inventory > div:first-child').innerText = "--- BYPASS SHEET ---";
                document.getElementById('inv-med').innerText = "🩺 Checkup passed";
                document.getElementById('inv-tb').innerText = "🦺 Safety passed";
                document.getElementById('inv-lib').innerText = "🤫 Silence kept";
                document.getElementById('inv-lamp').innerText = "🔦 UV Lamp";
                document.getElementById('inv-book').innerText = "📘 Book";
                document.getElementById('char-name').innerText = "ELEVATOR";
                document.getElementById('dialog-text').innerText = "We plunge into the lower levels. It smells like old paper and Corvalol here. Where to go?";
                const actionBtns = document.querySelectorAll('.action-btn');
                if(actionBtns[0]) actionBtns[0].innerText = "Start from 21st floor";
                document.getElementById('finish-btn').innerText = "STAGE CLEARED";
            }
        });

        // --- АУДИО ---
        const audioBg = new Audio('https://github.com/KuzmichSPRF/Raccoon_life/raw/refs/heads/main/sound/03-main-theme.mp3');
        audioBg.volume = 0.4; audioBg.loop = true;
        document.body.addEventListener('click', function startAudio() { audioBg.play().catch(()=>{}); }, { once: true });
        const audioIntro = document.getElementById('intro-music');
        function playClick() { tg.HapticFeedback.impactOccurred('light'); }
        document.addEventListener('click', e => { if (e.target.tagName === 'BUTTON') playClick(); });

        // --- STATE ---
        let pState = JSON.parse(localStorage.getItem('qt2_5_progress')) || {
            medic_tested: false, tb_maze_done: false, archive_sorted: false, stealth_passed: false,
            has_uv_lamp: false, has_faded_folder: false, gosha_revealed: false, gosha_passed: false,
            has_book: false, got_blank: false, current_floor: null
        };

        function updateFloorLocks() {
            const btn40 = document.getElementById('btn-f40');
            const btn21 = document.getElementById('btn-f21');
            const btn20 = document.getElementById('btn-f20');
            const btn11 = document.getElementById('btn-f11');
            const btn10 = document.getElementById('btn-f10');
            
            if (!btn40) return;
            btn40.classList.toggle('hidden', !pState.stealth_passed);
            btn21.classList.remove('hidden'); // Всегда доступен для старта
            btn20.classList.toggle('hidden', !pState.has_faded_folder); 
            btn11.classList.toggle('hidden', !pState.tb_maze_done);
            btn10.classList.toggle('hidden', !pState.gosha_passed);
        }

        const charName = document.getElementById('char-name');
        const actionArea = document.getElementById('action-area');
        const dialogText = document.getElementById('dialog-text');
        const dialogCursor = document.getElementById('dialog-cursor');
        let typingTimeout;

        function saveState() {
            localStorage.setItem('qt2_5_progress', JSON.stringify(pState));
            document.getElementById('inv-med').className = `seal ${pState.medic_tested ? 'active' : ''}`;
            document.getElementById('inv-tb').className = `seal ${pState.gosha_passed ? 'active' : ''}`;
            document.getElementById('inv-lib').className = `seal ${pState.got_blank ? 'active' : ''}`;
            document.getElementById('inv-lamp').className = `seal ${pState.has_uv_lamp ? 'active' : ''}`;
            document.getElementById('inv-book').className = `seal ${pState.has_book ? 'active' : ''}`;
            updateFloorLocks();
        }
        saveState();

        function resetProgress() {
            if (confirm(T("Вы точно хотите стереть память об этих этажах?", "Are you sure you want to erase memories of these floors?"))) {
                localStorage.removeItem('qt2_5_progress'); location.reload();
            }
        }

        function showDialog(text, callback) {
            clearTimeout(typingTimeout); dialogText.textContent = ""; dialogCursor.classList.remove('hidden');
            try { audioIntro.currentTime = 0; audioIntro.play().catch(()=>{}); } catch(e){}
            let i = 0;
            function typeNext() {
                if (i < text.length) {
                    dialogText.textContent += text.charAt(i); i++;
                    typingTimeout = setTimeout(typeNext, 20);
                } else {
                    try { audioIntro.pause(); } catch(e){}
                    dialogCursor.classList.add('hidden');
                    if (callback) callback();
                }
            }
            typeNext();
        }

        function addBtn(text, onclick, id="") {
            const btn = document.createElement('button');
            btn.className = 'action-btn'; btn.innerText = text; btn.onclick = onclick;
            if (id) btn.id = id;
            actionArea.appendChild(btn); return btn;
        }

        function loadFloor(floor) {
            document.querySelectorAll('.floor-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-f${floor}`).classList.add('active');
            actionArea.innerHTML = '';
            document.getElementById('floor-image').classList.add('hidden');
            pState.current_floor = floor; saveState();

            if (floor === 40) initFloor40();
            if (floor === 21) initFloor21();
            if (floor === 20) initFloor20();
            if (floor === 11) initFloor11();
            if (floor === 10) initFloor10();
            checkGlobalWin();
        }

        function checkGlobalWin() {
            if (pState.medic_tested && pState.gosha_passed && pState.got_blank) {
                actionArea.innerHTML = '';
                showDialog(T("— ВСЕ ШТАМПЫ ПОЛУЧЕНЫ! Обходной лист закрыт. Теперь со всеми печатями вам нужно вернуться на 69-й этаж в Отдел Кадров для прохождения итогового тестирования...", "— ALL STAMPS OBTAINED! Bypass sheet is closed. Now with all the seals you need to return to the 69th floor HR Department to pass the final testing..."), () => {
                    addBtn(T('В ОТДЕЛ КАДРОВ (ЗАВЕРШИТЬ)', 'TO HR DEPT (FINISH)'), () => {
                        document.getElementById('main-content').classList.add('hidden');
                        document.getElementById('sidebar').classList.add('hidden');
                        document.getElementById('end-screen').classList.remove('hidden');
                    });
                });
            }
        }

        // ================= ЭТАЖ 20: МЕДИК =================
        function initFloor20() {
            actionArea.innerHTML = '';
            charName.innerText = T("Зинаида Петровна (Медик)", "Zinaida Petrovna (Medic)");
            document.getElementById('floor-image').src = "https://raw.githubusercontent.com/KuzmichSPRF/Raccoon_life/main/image/med.png";
            document.getElementById('floor-image').classList.remove('hidden');

            if (!pState.medic_tested) {
                showDialog(T("— Так, голубчик. Пульс как у зайца под обстрелом. Сдайте тест на рефлексы. Ловите нужную букву, но если экран станет КРАСНЫМ (скачок давления) — жмите 'ЗАКРЫТЬ ГЛАЗА' и ничего больше не трогайте!", "— So, my dear. Pulse like a hare under fire. Pass the reflex test. Catch the required letter, but if the screen turns RED (pressure spike) — press 'CLOSE EYES' and don't touch anything else!"));
                addBtn(T('НАЧАТЬ ТЕСТ ЗРЕНИЯ', 'START VISION TEST'), startMedicGame);
            } else if (pState.has_faded_folder && !pState.has_uv_lamp) {
                showDialog(T("— У вас в руках какая-то пыльная гадость! Быстро под кварцевую лампу! О... это же скрытые чернила. Забирайте свою папку и проваливайте, пока я вас не продезинфицировала!", "— You have some dusty muck in your hands! Quickly under the quartz lamp! Oh... this is invisible ink. Take your folder and get out before I disinfect you!"));
                addBtn(T('ПРОСВЕТИТЬ ПАПКУ', 'EXPOSE FOLDER'), () => {
                    pState.has_uv_lamp = true; pState.gosha_revealed = true; saveState();
                    tg.HapticFeedback.notificationOccurred('success');
                    showDialog(T("— (Ультрафиолет проявил скрытый номер: 666-G-ОШ-А). Отлично, теперь можно нести это безопаснику на 21-й этаж.", "— (Ultraviolet revealed a hidden number: 666-G-OSH-A). Great, now you can take this to the security guy on the 21st floor."));
                    actionArea.innerHTML = ''; addBtn(T('СПУСТИТЬСЯ НА 21 ЭТАЖ', 'GO TO 21ST FLOOR'), ()=>loadFloor(21));
                });
            } else {
                showDialog(T("— Я вам уже всё подписала. Идите, не нервируйте меня, у меня кварцевание!", "— I already signed everything for you. Go, don't unnerve me, I'm doing quartz sterilization!"));
            }
        }

        function startMedicGame() {
            actionArea.innerHTML = `
                <div style="color:var(--neon-yellow); margin-bottom:5px;">${T("НАЙДИТЕ БУКВУ:", "FIND LETTER:")} <span id="target-letter" style="font-size:1.5rem; font-weight:bold;">Ш</span></div>
                <div style="font-size:0.8rem; margin-bottom:10px;">${T("Счет:", "Score:")} <span id="medic-score">0</span>/7</div>
                <div id="medic-game" style="display:block;">
                    <button id="eye-btn" onpointerdown="closeEyes(event)">${T("ЗАКРЫТЬ ГЛАЗА", "CLOSE EYES")}</button>
                </div>
            `;
            let score = 0, isRed = false, gameInt, letterInt;
            let isGameOver = false;
            const gameDiv = document.getElementById('medic-game');
            const eyeBtn = document.getElementById('eye-btn');
            const letters = ['Ш', 'Б', 'М', 'Н', 'К', 'Ы', 'И'];
            let currentTarget = 'Ш';

            function spawnLetter() {
                if(score >= 7) return;
                if(isGameOver) return;
                const l = document.createElement('div'); l.className = 'floating-letter';
                const isTargetObj = Math.random() > 0.5;
                l.innerText = isTargetObj ? currentTarget : letters[Math.floor(Math.random()*letters.length)];
                l.style.left = Math.random() * (350 - 40) + 'px'; l.style.top = Math.random() * (250 - 40) + 'px';
                
                l.onpointerdown = (e) => {
                    if (e) e.preventDefault();
                    if (isGameOver) return;
                    if (isRed) { failMedic(T("ВЫ ОСЛЕПЛИ ОТ ДАВЛЕНИЯ!", "YOU WENT BLIND FROM PRESSURE!")); return; }
                    if (l.innerText === currentTarget) {
                        score++; document.getElementById('medic-score').innerText = score;
                        tg.HapticFeedback.impactOccurred('light');
                        currentTarget = letters[Math.floor(Math.random()*letters.length)];
                        document.getElementById('target-letter').innerText = currentTarget;
                        if(score >= 7) winMedic();
                    } else {
                        failMedic(T("НЕ ТА БУКВА!", "WRONG LETTER!"));
                    }
                    l.remove();
                };
                gameDiv.appendChild(l);
                setTimeout(() => { if(l.parentElement) l.remove(); }, 1500);
            }

            letterInt = setInterval(spawnLetter, 600); // Было 800
            gameInt = setInterval(() => {
                isRed = !isRed;
                if (isRed) {
                    gameDiv.style.background = '#800000'; eyeBtn.style.display = 'block';
                    setTimeout(() => {
                        if (isRed) failMedic(T("ВЫ НЕ ЗАКРЫЛИ ГЛАЗА ПРИ СКАЧКЕ ДАВЛЕНИЯ!", "YOU DIDN'T CLOSE YOUR EYES DURING THE SPIKE!"));
                    }, 1200); // Даем всего 1.2с на реакцию! Было 2000
                } else {
                    gameDiv.style.background = '#111'; eyeBtn.style.display = 'none';
                }
            }, 2500);

            window.closeEyes = function(e) {
                if (e) e.preventDefault();
                if (isGameOver) return;
                if(!isRed) { failMedic(T("ЗАЧЕМ ЗАКРЫЛИ ГЛАЗА ПРОСТО ТАК?!", "WHY DID YOU CLOSE YOUR EYES FOR NO REASON?!")); return; }
                isRed = false; gameDiv.style.background = '#111'; eyeBtn.style.display = 'none';
                tg.HapticFeedback.impactOccurred('medium');
            };

            function failMedic(msg) {
                if (isGameOver) return;
                isGameOver = true;
                clearInterval(letterInt); clearInterval(gameInt);
                tg.HapticFeedback.notificationOccurred('error');
                showDialog(`— ${msg} ` + T("Начинайте заново!", "Start over!"));
                setTimeout(initFloor20, 2000);
            }
            function winMedic() {
                if (isGameOver) return;
                isGameOver = true;
                clearInterval(letterInt); clearInterval(gameInt); gameDiv.innerHTML = '';
                pState.medic_tested = true; saveState();
                tg.HapticFeedback.notificationOccurred('success');
                showDialog(T("— Глаз дергается, но рефлексы в норме. Штамп о годности поставлен.", "— Eye is twitching, but reflexes are normal. Fitness stamp applied."));
                setTimeout(initFloor20, 2000);
            }
        }

        // ================= ЭТАЖ 21: ТЕХНИКА БЕЗОПАСНОСТИ =================
        function initFloor21() {

                addBtn(T('СПУСТИТЬСЯ В АРХИВ (11)', 'GO DOWN TO ARCHIVE (11)'), () => loadFloor(11));
            } else if (!pState.gosha_passed) {
                showDialog(T("— Нашли номер Гоши? 666-G-ОШ-А? Отлично, бюрократия соблюдена. Штамп ТБ поставлен! Теперь спускайтесь в Библиотеку на 10-й этаж.", "— Found Gosha's number? 666-G-OSH-A? Excellent, bureaucracy is satisfied. Safety stamp applied! Now go down to the Library on the 10th floor."));
                pState.gosha_passed = true; saveState();
                addBtn(T('ИДТИ НА 10 ЭТАЖ', 'GO TO FLOOR 10'), () => loadFloor(10));
            } else {
                showDialog(T("— Штамп ТБ у вас есть. Не нарушайте правила. Библиотека на 10-м этаже ждет.", "— You have the safety stamp. Don't break the rules. The Library on the 10th floor is waiting."));
                addBtn(T('ИДТИ НА 10 ЭТАЖ', 'GO TO FLOOR 10'), () => loadFloor(10));
            }
        }

        function startMazeGame() {
            clearInterval(window.mazeTimerInt);
            actionArea.innerHTML = `
                <div id="maze-game" style="display:flex;">
                    <div style="font-size:1.2rem; margin-bottom:5px; text-align:center;">${T("Время:", "Time:")} <span id="maze-timer" style="color:var(--neon-yellow);">20</span>${T("с", "s")}</div>
                    <div class="maze-grid" id="maze-grid"></div>
                    <div class="maze-controls">
                        <div></div><button class="maze-btn" onclick="moveMaze(0,1)">⬆️</button><div></div>
                        <button class="maze-btn" onclick="moveMaze(1,0)">⬅️</button>
                        <button class="maze-btn" onclick="moveMaze(0,-1)">⬇️</button>
                        <button class="maze-btn" onclick="moveMaze(-1,0)">➡️</button>
                    </div>
                    <div style="font-size:0.7rem; margin-top:5px; color:var(--neon-pink);">${T("ВНИМАНИЕ: УПРАВЛЕНИЕ ИНВЕРТИРОВАНО!", "WARNING: CONTROLS INVERTED!")}</div>
                </div>
            `;
            let px = 0, py = 0; const ex = 5, ey = 5;
            const fires = ['1,0', '1,1', '3,1', '4,1', '1,2', '4,2', '1,3', '2,3', '4,3', '4,4', '0,5', '1,5', '2,5', '3,5', '4,5'];
            
            let timeLeft = 20;
            let isGameOver = false;
            window.mazeTimerInt = setInterval(() => {
                timeLeft--;
                const timerEl = document.getElementById('maze-timer');
                if (timerEl) timerEl.innerText = timeLeft;
                if (timeLeft <= 0) {
                    isGameOver = true;
                    clearInterval(window.mazeTimerInt);
                    tg.HapticFeedback.notificationOccurred('error');
                    showDialog(T("— ВРЕМЯ ВЫШЛО! ВЫ ЗАДОХНУЛИСЬ В ДЫМУ! Заново!", "— TIME'S UP! YOU SUFFOCATED IN THE SMOKE! Start over!"));
                    document.getElementById('maze-game').style.display = 'none';
                    setTimeout(startMazeGame, 2000);
                }
            }, 1000);
            
            function draw() {
                const grid = document.getElementById('maze-grid');
                if(!grid) return; grid.innerHTML = '';
                for(let y=0; y<6; y++) {
                    for(let x=0; x<6; x++) {
                        let cell = document.createElement('div'); cell.className = 'maze-cell';
                        let pos = `${x},${y}`;
                        if (x===px && y===py) cell.innerText = '🦝';
                        else if (x===ex && y===ey) cell.innerText = '🚪';
                        else if (fires.includes(pos)) cell.innerText = '🔥';
                        grid.appendChild(cell);
                    }
                }
            }
            
            window.moveMaze = function(dx, dy) {
                if (isGameOver) return;
                px += dx; py += dy;
                if (px<0) px=0; if(px>5) px=5;
                if (py<0) py=0; if(py>5) py=5;
                
                tg.HapticFeedback.impactOccurred('light');
                let pos = `${px},${py}`;
                if (fires.includes(pos)) {
                    isGameOver = true;
                    clearInterval(window.mazeTimerInt);
                    tg.HapticFeedback.notificationOccurred('error');
                    showDialog(T("— ВЫ СГОРЕЛИ В СИМУЛЯТОРЕ! Заново!", "— YOU BURNED IN THE SIMULATOR! Start over!"));
                    document.getElementById('maze-game').style.display = 'none';
                    setTimeout(startMazeGame, 1500);
                } else if (px===ex && py===ey) {
                    isGameOver = true;
                    tg.HapticFeedback.notificationOccurred('success');
                    clearInterval(window.mazeTimerInt);
                    pState.tb_maze_done = true; saveState();
                    document.getElementById('maze-game').style.display = 'none';
                    initFloor21();
                } else {
                    draw();
                }
            };
            draw();
        }

        // ================= ЭТАЖ 11: АРХИВ =================
        function initFloor11() {
            actionArea.innerHTML = '';
            charName.innerText = T("Авеларий (Архивариус)", "Avelary (Archivist)");

            if (!pState.archive_sorted) {
                showDialog(T("— Тс-с-с! Не топайте! Ищете дело Гоши? Оно в секции Г-8. Но чтобы я туда пустил, рассортируйте эту корзину! Смахните папки в нужные лотки. И протирайте пыль с экрана, я тут давно не убирал.", "— Shh! Don't stomp! Looking for Gosha's file? It's in section G-8. But to let you in, sort this basket! Swipe folders into the correct trays. And wipe the dust off the screen, I haven't cleaned here in a while."));

                addBtn(T('ПОДНЯТЬСЯ К МЕДИКУ (20)', 'GO UP TO MEDIC (20)'), () => loadFloor(20));
            } else {
                showDialog(T("— Тихо... Налоговые отчеты за 2007 спят...", "— Quiet... Tax reports for 2007 are sleeping..."));
            }

        function startArchiveGame() {
            actionArea.innerHTML = `
                <div id="archive-game" style="display:flex;">
                    <div style="margin-bottom:10px;">${T("Осталось:", "Left:")} <span id="arch-score" style="color:var(--neon-yellow);">15</span></div>
                    <div id="active-folder">${T("Папка", "Folder")}</div>
                    <div class="bin-row">
                        <button class="bin-btn" style="background:#b30000;" onclick="sortFolder('red')">${T("ШРЕДЕР", "SHREDDER")}</button>
                        <button class="bin-btn" style="background:#004080;" onclick="sortFolder('blue')">${T("ДИРЕКТОРУ", "TO BOSS")}</button>
                        <button class="bin-btn" style="background:#006600;" onclick="sortFolder('green')">${T("В ДОЛГИЙ ЯЩИК", "SHELF IT")}</button>
                    </div>
                    <div id="dust-cloud">${T("ПЫЛЬ! ТРИТЕ ЭКРАН!", "DUST! WIPE SCREEN!")}</div>
                </div>
            `;
            
            let left = 15, currentType = ''; // Было 10
            const types = lang === 'en' ? [
                {t: 'red', txt: "Cat memes", c: "#eaeaea"}, {t: 'red', txt: "Synergy tasks\nupdate", c: "#eaeaea"},
                {t: 'blue', txt: "Annual report", c: "#eaeaea"}, {t: 'blue', txt: "Bonus\nrequest", c: "#eaeaea"},
                {t: 'green', txt: "Courier complaints", c: "#eaeaea"}, {t: 'green', txt: "Junior resumes", c: "#eaeaea"}
            ] : [
                {t: 'red', txt: "Мемы с котами", c: "#eaeaea"}, {t: 'red', txt: "Апдейт тасков\nпо синергии", c: "#eaeaea"},
                {t: 'blue', txt: "Годовой отчет", c: "#eaeaea"}, {t: 'blue', txt: "Заявление\nна премию", c: "#eaeaea"},
                {t: 'green', txt: "Жалобы курьеров", c: "#eaeaea"}, {t: 'green', txt: "Резюме джунов", c: "#eaeaea"}
            ];
            let isGameOver = false;

            function nextFolder() {
                if(left <= 0) {
                    isGameOver = true;
                    clearInterval(dustInt);
                    pState.archive_sorted = true; saveState();
                    tg.HapticFeedback.notificationOccurred('success');
                    initFloor11(); return;
                }
                document.getElementById('arch-score').innerText = left;
                let type = types[Math.floor(Math.random()*types.length)];
                currentType = type.t;
                const f = document.getElementById('active-folder');
                f.innerText = type.txt; f.style.background = type.c;
            }

            window.sortFolder = function(choice) {
                if (isGameOver) return;
                if (document.getElementById('dust-cloud').style.pointerEvents === 'auto') return; // Cannot click through dust
                if (choice === currentType) {
                    tg.HapticFeedback.impactOccurred('light');
                    left--; nextFolder();
                } else {
                    isGameOver = true;
                    tg.HapticFeedback.notificationOccurred('error');
                    showDialog(T("— НЕ ТУДА! ВЕСЬ АРХИВ ПОСЫПАЛСЯ! ЗАНОВО!", "— WRONG! THE WHOLE ARCHIVE COLLAPSED! START OVER!"));
                    clearInterval(dustInt); setTimeout(initFloor11, 2000);
                }
            };

            // ПЫЛЬ
            let dustOp = 0; const dust = document.getElementById('dust-cloud');
            let isWiping = false;
            
            function wipe(e) {
                if(e) e.preventDefault();
                dustOp -= 0.05; if(dustOp < 0) dustOp = 0;
                dust.style.opacity = dustOp;
                dust.style.pointerEvents = dustOp > 0.3 ? 'auto' : 'none';
            }
            
            // Логика протирания экрана (зажать и водить для ПК + тапы для телефона)
            dust.addEventListener('mousedown', (e) => { isWiping = true; wipe(e); });
            dust.addEventListener('mousemove', (e) => { if(isWiping) wipe(e); });
            window.addEventListener('mouseup', () => { isWiping = false; });
            dust.addEventListener('touchmove', wipe, { passive: false });
            
            let dustInt = setInterval(() => {
                if(Math.random() < 0.45 && dustOp < 0.2) { // Пыль появляется чаще
                    dustOp = 1; dust.style.opacity = dustOp; dust.style.pointerEvents = 'auto';
                }
            }, 2000); // Было 2500

            nextFolder();
        }

        // ================= ЭТАЖ 40: ЗАВХОЗ =================
        function initFloor40() {

            charName.innerText = T("Палыч (Завхоз)", "Palych (Supply)");

            if (pState.stealth_passed && !pState.has_book) {

                    pState.has_book = true; saveState();

                showDialog(T("— Изумительно тихо. Вам нужен финальный бланк обходного? Я отдала его Завхозу (40 этаж) как закладку в книге «Основы вайбкодинга». Верните книгу — получите бланк.", "— Amazingly quiet. You need the final bypass form? I gave it to Supply (Floor 40) as a bookmark in the book 'Basics of Vibecoding'. Return the book — get the form."));

                showDialog(T("— Вы принесли мою книгу! Моя прелесть... Искренне благодарю вас. Вы единственный, кто смог забрать её у Завхоза. Вот ваш бланк, с моим финальным штампом. Вы готовы.", "— You brought my book! My precious... I sincerely thank you. You are the only one who managed to get it from Supply. Here is your form, with my final stamp. You are ready."));
                pState.got_blank = true; saveState();
                addBtn(T('ОТЛИЧНО', 'EXCELLENT'), () => { tg.HapticFeedback.notificationOccurred('success'); initFloor10(); });
            } else {
                showDialog(T("— Еще раз спасибо за возвращенную книгу. А теперь соблюдайте тишину и возвращайтесь в Отдел Кадров, Элеонора Витальевна не любит ждать.", "— Thanks again for the returned book. And now keep quiet and return to the HR Department, Eleonora doesn't like to wait."));
            }
        }

        function startStealthGame() {
            actionArea.innerHTML = `
                <div id="stealth-game" style="display:flex;">
                    <div style="margin-bottom:10px;">${T("Прогресс:", "Progress:")} <span id="st-score" style="color:var(--game-green);">0</span>%</div>
                    <div id="stealth-bar">
                        <div id="stealth-zone"></div>
                        <div id="stealth-cursor"></div>
                    </div>
                    <button class="action-btn" id="btn-step" onclick="makeStep()">${T("СДЕЛАТЬ ШАГ", "MAKE A STEP")}</button>
                    <div id="fake-tg">
                        <div>📩 ${T("Коллега прислал смешной мем!", "Colleague sent a funny meme!")}</div>
                        <button onclick="failStealth(T('ВЫ ЗАСМЕЯЛИСЬ В ГОЛОС!', 'YOU LAUGHED OUT LOUD!'))">${T("ПОСМОТРЕТЬ", "LOOK")}</button>
                    </div>
                </div>
            `;
            
            let pos = 0, dir = 4, score = 0, stealthInt, tgInt; // Скорость курсора снижена (dir = 2)
            let isGameOver = false;
            const cursor = document.getElementById('stealth-cursor');
            const tgDiv = document.getElementById('fake-tg');

            stealthInt = setInterval(() => {
                pos += dir;
                if(pos > 95 || pos < 0) dir *= -1;
                cursor.style.left = pos + '%';
            }, 30);

            tgInt = setInterval(() => {
                if(Math.random() < 0.4) { // Уведомления появляются реже
                    tgDiv.style.display = 'block';
                    setTimeout(() => { tgDiv.style.display = 'none'; }, 1200); // Висят чуть дольше
                }
            }, 2500);

            window.makeStep = function() {
                if (isGameOver) return;
                if (tgDiv.style.display === 'block') { failStealth(T('Вы отвлеклись на телефон!', 'You got distracted by phone!')); return; }
                // Зеленая зона 40-60% (совпадает с визуалом)
                if (pos >= 40 && pos <= 60) {
                    score += 10; document.getElementById('st-score').innerText = score; // Очков за клик больше
                    tg.HapticFeedback.impactOccurred('light');
                    if(score >= 100) {
                        isGameOver = true;
                        clearInterval(stealthInt); clearInterval(tgInt);
                        pState.stealth_passed = true; saveState();
                        tg.HapticFeedback.notificationOccurred('success');
                        initFloor10();
                    }
                } else {
                    failStealth(T('ВЫ СКРИПНУЛИ БОТИНКОМ МИМО РИТМА!', 'YOUR SHOE SQUEAKED OFF BEAT!'));
                }
            };

            window.failStealth = function(msg) {
                if (isGameOver) return;
                isGameOver = true;
                clearInterval(stealthInt); clearInterval(tgInt);
                tg.HapticFeedback.notificationOccurred('error');
                showDialog(`— ${T("ТИШИНА!!", "SILENCE!!")} ${msg} ` + T("Заново!", "Start over!"));
                setTimeout(startStealthGame, 2000);
            };
        }

        document.getElementById("finish-btn").addEventListener("click", function() {
            try { audioIntro.pause(); audioBg.pause(); } catch(e){}
            window.parent.postMessage({ type: 'quest_complete', id: 'qt2_5' }, window.location.origin);
        });

    </script>
