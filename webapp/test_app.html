<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тест WebApp</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a2e; color: #fff; }
    .log { background: #0f0f1a; padding: 15px; border-radius: 8px; margin-top: 20px; font-family: monospace; font-size: 12px; max-height: 400px; overflow-y: auto; }
    button { padding: 15px 30px; font-size: 16px; margin: 10px; background: #0088cc; color: white; border: none; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🧪 Тест WebApp API</h1>
  <div id="status">Загрузка...</div>
  <button onclick="sendTest()">📡 Отправить тест</button>
  <button onclick="playGame()">🎮 Сыграть (тест)</button>
  <div class="log" id="log"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Определяем базовый URL для API
    const API_URL = '/api/sync';  // Относительный путь

    const logDiv = document.getElementById('log');

    function log(msg, type = 'info') {
      const div = document.createElement('div');
      const time = new Date().toLocaleTimeString();
      const color = type === 'error' ? '#ff5555' : type === 'success' ? '#00ff88' : '#8888ff';
      div.style.color = color;
      div.textContent = `[${time}] ${msg}`;
      logDiv.appendChild(div);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function getUserId() {
      if (tg.initDataUnsafe?.user?.id) {
        return tg.initDataUnsafe.user.id;
      }
      if (tg.initData) {
        const urlParams = new URLSearchParams(tg.initData);
        const userStr = urlParams.get('user');
        if (userStr) {
          try {
            const user = JSON.parse(decodeURIComponent(userStr));
            return user.id;
          } catch (e) {
            log('Failed to parse user: ' + e, 'error');
          }
        }
      }
      return null;
    }

    // Статус при загрузке
    const userId = getUserId();
    document.getElementById('status').innerHTML = `
      <b>User ID:</b> ${userId || '❌ НЕ НАЙДЕН'}<br>
      <b>initDataUnsafe:</b> ${tg.initDataUnsafe ? '✅' : '❌'}<br>
      <b>initData:</b> ${tg.initData ? '✅ (есть)' : '❌'}<br>
      <b>Current URL:</b> ${window.location.href}
    `;

    if (userId) {
      log(`✅ User ID получен: ${userId}`, 'success');
    } else {
      log('❌ Не удалось получить User ID', 'error');
      log('Проверьте что открыли в Telegram!', 'error');
    }

    function sendTest() {
      const userId = getUserId();
      if (!userId) {
        log('⚠️ Нет user_id!', 'error');
        return;
      }

      log('📡 Отправка тестовых данных...', 'info');
      log(`   URL: ${API_URL}`, 'info');

      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'sync_stats',
          userId: userId,
          clown_games: 999,
          clown_wins: 888,
          tower_max_level: 100,
          tower_total_levels: 500
        })
      })
      .then(r => {
        log(`   Status: ${r.status}`, 'info');
        return r.text();  // Сначала получаем текст
      })
      .then(text => {
        log(`   Response: ${text.substring(0, 200)}`, text.includes('error') ? 'error' : 'info');
        try {
          const result = JSON.parse(text);
          if (result.status === 'ok') {
            log(`✅ API ответ: ${JSON.stringify(result)}`, 'success');
          } else {
            log(`❌ API error: ${result.message}`, 'error');
          }
        } catch (e) {
          log(`❌ Не JSON ответ: ${text.substring(0, 100)}`, 'error');
        }
      })
      .catch(err => {
        log(`❌ Ошибка: ${err}`, 'error');
      });
    }

    function playGame() {
      const userId = getUserId();
      if (!userId) {
        log('⚠️ Нет user_id!', 'error');
        return;
      }

      // Эмуляция победы в игре
      log('🎮 Эмуляция игры...', 'info');

      setTimeout(() => {
        log('🏆 Победа! Отправка данных...', 'success');

        fetch('/api/sync', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: 'sync_stats',
            userId: userId,
            clown_games: 1,
            clown_wins: 1
          })
        })
        .then(r => r.json())
        .then(result => {
          log(`✅ Игра записана: ${JSON.stringify(result)}`, 'success');
        })
        .catch(err => {
          log(`❌ Ошибка: ${err}`, 'error');
        });
      }, 1000);
    }
  </script>
</body>
</html>
