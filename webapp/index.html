<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Raccoon Life</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0088cc;
      --accent: #ff0055;
      --bg-color: #121214;
      --card-bg: #1e1e24;
      --text-main: #ffffff;
      --text-sec: #a1a1aa;
      --game-green: #00ff88;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      background-image: radial-gradient(circle at top, #1e1e24 0%, #121214 100%);
    }
    .screen { display: none; padding: 5vh 16px 20px; flex-direction: column; gap: 12px; }
    .active { display: flex; }
    #cover-screen {
      text-align: center; align-items: center; justify-content: center;
      height: 100vh; gap: 20px;
    }
    h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; text-transform: uppercase; }
    p { font-size: 1.1rem; line-height: 1.6; color: var(--text-sec); max-width: 300px; }
    .main-menu-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 10px;
    }
    .menu-card {
      background: linear-gradient(145deg, #23232a, #1c1c21);
      border-radius: 20px; padding: 20px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; cursor: pointer; text-align: center;
      box-shadow: 5px 5px 10px #0b0b0c, -5px -5px 10px #25252c;
      border: 1px solid rgba(255,255,255,0.05); aspect-ratio: 1;
    }
    .menu-card:active { transform: scale(0.95); }
    .menu-card-icon {
      font-size: 2.5rem; background: #121214;
      width: 70px; height: 70px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--primary);
      box-shadow: 0 0 15px rgba(0, 136, 204, 0.2);
    }
    .menu-card-title { font-size: 0.9rem; font-weight: 700; text-transform: uppercase; }
    .section-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 20px; }
    .list-item {
      background: var(--card-bg); border-radius: 12px; padding: 16px;
      display: flex; align-items: center; gap: 15px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2); margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .list-item.completed { border: 1px solid var(--game-green); box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }
    .list-item-title { font-size: 1.1rem; font-weight: 700; }
    .list-item-desc { font-size: 0.9rem; color: var(--text-sec); }
    .list-item.completed .list-item-title::after { content: ' ✅'; }
    #reader-screen { padding: 0; height: 100vh; flex-direction: column; }
    #reader-topbar {
      display: flex; align-items: center; padding: 10px 16px;
      background: var(--card-bg); border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    #back-btn {
      background: transparent; border: none; font-size: 1.5rem;
      color: var(--text-main); padding: 5px 10px; cursor: pointer;
    }
    #reader-iframe { border: none; width: 100%; flex: 1; height: 100%; }
    .btn-primary {
      background: var(--primary); color: white; border: none;
      border-radius: 50px; padding: 16px; font-family: 'Montserrat', sans-serif;
      font-size: 1.1rem; font-weight: 800; text-transform: uppercase;
      cursor: pointer; width: 80%; max-width: 280px; margin: 0 auto;
      box-shadow: 0 0 20px rgba(0, 136, 204, 0.4);
    }
    .btn-primary:active { transform: scale(0.95); }
  </style>
</head>
<body>

<div id="app">
  <div id="cover-screen" class="screen active">
    <div style="font-size: 5rem; filter: drop-shadow(0 0 20px rgba(0,136,204,0.5));">🦝</div>
    <h1>Raccoon Life</h1>
    <p>Твой гид по миру енотов, квестов и новостей.</p>
    <button class="btn-primary" onclick="navigateTo('main-menu')">Открыть меню</button>
  </div>

  <div id="main-menu" class="screen">
    <div class="main-menu-grid">
      <div class="menu-card" onclick="renderCategory('newspapers')">
        <span class="menu-card-icon">📰</span>
        <span class="menu-card-title">Газеты</span>
      </div>
      <div class="menu-card" onclick="renderCategory('quests')">
        <span class="menu-card-icon">❓</span>
        <span class="menu-card-title">Квесты</span>
      </div>
      <div class="menu-card" onclick="renderCategory('games')">
        <span class="menu-card-icon">🎮</span>
        <span class="menu-card-title">Игры</span>
      </div>
      <div class="menu-card" onclick="renderCategory('partners')">
        <span class="menu-card-icon">🤝</span>
        <span class="menu-card-title">Партнеры</span>
      </div>
      <div class="menu-card" onclick="showLeaderboard()">
        <span class="menu-card-icon">🏆</span>
        <span class="menu-card-title">Рейтинг</span>
      </div>
      <div class="menu-card" onclick="tg.openLink('https://ton.app/pay/transfer/raccoon-times.ton?amount=0')">
        <span class="menu-card-icon">💎</span>
        <span class="menu-card-title">Поддержать</span>
      </div>
    </div>
  </div>

  <div id="list-screen" class="screen">
    <h2 id="category-title" class="section-title">Раздел</h2>
    <div id="category-list" style="display: flex; flex-direction: column; gap: 10px;"></div>
  </div>

  <div id="rating-screen" class="screen">
    <h2 class="section-title">Топ Игроков</h2>
    <div id="leaderboard-list" style="padding-bottom: 20px;"></div>
  </div>

  <div id="reader-screen" class="screen">
    <div id="reader-topbar">
      <button id="back-btn" onclick="handleBack()">✕</button>
      <b id="reader-header-title">Просмотр</b>
    </div>
    <iframe id="reader-iframe" src="" allow="autoplay; accelerometer; gyroscope; picture-in-picture"></iframe>
  </div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  // ==================== USER ID ====================
  function getUserId() {
    if (tg.initDataUnsafe?.user?.id) {
      return tg.initDataUnsafe.user.id;
    }
    if (tg.initData) {
      const urlParams = new URLSearchParams(tg.initData);
      const userStr = urlParams.get('user');
      if (userStr) {
        try {
          const user = JSON.parse(decodeURIComponent(userStr));
          return user.id;
        } catch (e) {
          console.error('Failed to parse user:', e);
        }
      }
    }
    return null;
  }

  // ==================== STATS ====================
  let stats = {
    clown_games: 0,
    clown_wins: 0,
    vladeos_games: 0,
    vladeos_wins: 0,
    tower_max_level: 0,
    tower_total_levels: 0,
    quests: []
  };

  function loadStats() {
    stats.clown_games = parseInt(localStorage.getItem('clown_games') || '0');
    stats.clown_wins = parseInt(localStorage.getItem('clown_wins') || '0');
    stats.vladeos_games = parseInt(localStorage.getItem('vladeos_games') || '0');
    stats.vladeos_wins = parseInt(localStorage.getItem('vladeos_wins') || '0');
    stats.tower_max_level = parseInt(localStorage.getItem('tower_max_level') || '0');
    stats.tower_total_levels = parseInt(localStorage.getItem('tower_total_levels') || '0');
    try { stats.quests = JSON.parse(localStorage.getItem('completed_items') || '[]'); } catch (e) { stats.quests = []; }
    console.log('📊 Stats loaded:', stats);
  }

  function saveStatsLocal() {
    localStorage.setItem('clown_games', stats.clown_games.toString());
    localStorage.setItem('clown_wins', stats.clown_wins.toString());
    localStorage.setItem('vladeos_games', stats.vladeos_games.toString());
    localStorage.setItem('vladeos_wins', stats.vladeos_wins.toString());
    localStorage.setItem('tower_max_level', stats.tower_max_level.toString());
    localStorage.setItem('tower_total_levels', stats.tower_total_levels.toString());
    localStorage.setItem('completed_items', JSON.stringify(stats.quests));
  }

  // ==================== API ====================
  function sendToAPI(data) {
    const userId = getUserId();
    if (!userId) {
      console.log('⚠️ No user_id, skipping API call');
      return;
    }

    // Добавляем userId если нет в data
    if (!data.userId && !data.user_id) {
      data.userId = userId;
    }

    console.log('📡 Sending to API:', data);

    fetch('/api/sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(result => {
      console.log('✅ API response:', result);
      if (result.status === 'ok') {
        console.log('✅ Data saved to database!');
      } else {
        console.error('❌ API error:', result.message);
      }
    })
    .catch(err => {
      console.error('❌ Network error:', err);
    });
  }

  function syncStats() {
    const userId = getUserId();
    if (!userId) return;

    // Получаем данные пользователя из Telegram
    const user = tg.initDataUnsafe?.user || {};

    const data = {
      type: 'sync_stats',
      userId: userId,
      username: user.username || '',
      first_name: user.first_name || '',
      last_name: user.last_name || '',
      clown_games: stats.clown_games,
      clown_wins: stats.clown_wins,
      vladeos_games: stats.vladeos_games,
      vladeos_wins: stats.vladeos_wins,
      tower_max_level: stats.tower_max_level,
      tower_total_levels: stats.tower_total_levels,
      quests: stats.quests
    };

    console.log('📊 Syncing stats:', data);
    sendToAPI(data);
  }

  function sendBossDamage(damage) {
    const userId = getUserId();
    if (!userId) return;

    const data = {
      type: 'boss_damage',
      userId: userId,
      damage: damage
    };

    console.log('⚔️ Sending boss damage:', data);
    sendToAPI(data);
  }

  // ==================== NAVIGATION ====================
  function handleBack() {
    const current = document.querySelector('.screen.active').id;
    if (current === 'reader-screen') {
      document.getElementById('reader-iframe').src = '';
      navigateTo('list-screen');
    } else if (current === 'rating-screen') {
      navigateTo('main-menu');
    } else if (current === 'list-screen') {
      navigateTo('main-menu');
    } else if (current === 'main-menu') {
      navigateTo('cover-screen');
    }
  }

  function navigateTo(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
    window.scrollTo(0, 0);
    tg.BackButton.offClick(handleBack);
    if (screenId === 'cover-screen') {
      tg.BackButton.hide();
    } else {
      tg.BackButton.show();
      tg.BackButton.onClick(handleBack);
    }
  }

  let currentCategory = null;

  function renderCategory(catKey) {
    currentCategory = catKey;
    const cat = DATA[catKey];
    document.getElementById('category-title').innerText = cat.title;
    const list = document.getElementById('category-list');
    list.innerHTML = '';

    const completed = JSON.parse(localStorage.getItem('completed_items') || '[]');

    cat.items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'list-item' + (item.id && completed.includes(item.id) ? ' completed' : '');
      div.innerHTML = `
        <div class="list-item-info">
          <div class="list-item-title">${item.title}</div>
          <div class="list-item-desc">${item.desc}</div>
        </div>
        <div style="color: #ccc">›</div>
      `;
      div.onclick = () => handleItemClick(item);
      list.appendChild(div);
    });
    navigateTo('list-screen');
  }

  function markAsCompleted(id) {
    if (!id) return;
    let completed = JSON.parse(localStorage.getItem('completed_items') || '[]');
    if (!completed.includes(id)) {
      completed.push(id);
      localStorage.setItem('completed_items', JSON.stringify(completed));
      stats.quests = completed;
      syncStats(); // Sync on quest complete
      if (currentCategory) renderCategory(currentCategory);
    }
  }

  function handleItemClick(item) {
    if ((item.type === 'link' || item.type === 'external') && item.id) {
      markAsCompleted(item.id);
    }
    if (item.type === 'folder') {
      renderCategory(item.target);
    } else if (item.type === 'alert') {
      tg.showAlert(item.msg);
    } else if (item.type === 'iframe') {
      document.getElementById('reader-header-title').innerText = item.title;
      document.getElementById('reader-iframe').src = item.url;
      navigateTo('reader-screen');
    } else if (item.type === 'link') {
      tg.openLink(item.url);
    } else {
      tg.openTelegramLink(item.url);
    }
  }

  function showLeaderboard() {
    const list = document.getElementById('leaderboard-list');
    list.innerHTML = '<div style="text-align:center;color:var(--text-sec);padding:20px;">Загрузка рейтинга...</div>';

    // Sync stats when opening leaderboard
    syncStats();

    // Загрузка рейтинга из API
    fetch('/api/leaderboard?limit=20')
      .then(res => res.json())
      .then(data => {
        if (data.status === 'ok' && data.leaderboard && data.leaderboard.length > 0) {
          renderLeaderboard(data.leaderboard);
        } else {
          list.innerHTML = '<div style="text-align:center;color:var(--text-sec);padding:20px;">Пока нет игроков в рейтинге. Стань первым! 🏆</div>';
        }
      })
      .catch(err => {
        console.error('Ошибка загрузки рейтинга:', err);
        list.innerHTML = '<div style="text-align:center;color:var(--accent);padding:20px;">Ошибка загрузки рейтинга</div>';
      });

    navigateTo('rating-screen');
  }

  function renderLeaderboard(players) {
    const list = document.getElementById('leaderboard-list');
    list.innerHTML = '';

    players.forEach((p, i) => {
      const div = document.createElement('div');
      div.className = 'list-item';
      
      // Определение позиции (золото, серебро, бронза)
      let rankColor = 'var(--primary)';
      let rankIcon = '#' + p.rank;
      if (p.rank === 1) { rankColor = '#ffd700'; rankIcon = '🥇'; }
      else if (p.rank === 2) { rankColor = '#c0c0c0'; rankIcon = '🥈'; }
      else if (p.rank === 3) { rankColor = '#cd7f32'; rankIcon = '🥉'; }

      // Форматирование урона
      const formattedDamage = p.total_damage.toLocaleString('ru-RU');

      div.innerHTML = `
        <div style="font-size: 1.5rem; font-weight: 800; color: ${rankColor}; width: 50px; text-align:center;">${rankIcon}</div>
        <div style="flex: 1;">
          <div style="font-weight: 700;">${p.name}</div>
          <div style="font-size: 0.75rem; color: var(--text-sec);">💥 Ударов: ${p.hits || 0}</div>
        </div>
        <div style="font-size: 1.1rem; font-weight: 800; color: var(--accent); text-align:right;">${formattedDamage}</div>
      `;
      list.appendChild(div);
    });
  }

  // ==================== DATA ====================
  const DATA = {
    newspapers: {
      title: "📰 Газеты",
      items: [
        { id: "news_17", title: "Выпуск #17", desc: "The Raccoon Times", url: "https://telegra.ph/THE-RACCOON-TIMES-March-202628-17-RU-03-03", type: "link" },
        { id: "news_16", title: "Выпуск #16", desc: "The Raccoon Times", url: "https://telegra.ph/THE-RACCOON-TIMES-February-2026-228-16-RU-02-08", type: "link" }
      ]
    },
    quests: {
      title: "❓ Квесты",
      items: [
        { title: "The Questoon Times 2", desc: "Продолжение", type: "folder", target: "qt_2" }
      ]
    },
    qt_2: {
      title: "QT 2",
      items: [
        { id: "qt2_1", title: "Глава 1: Встреча в баре", desc: "Начало", url: "qt2_1.1.html", type: "iframe" }
      ]
    },
    games: {
      title: "🎮 Игры",
      items: [
        { title: "Битва фишек", desc: "Клоун vs Енот", url: "game.html", type: "iframe" },
        { title: "PVP: Vladeos", desc: "Попробуй обыграть", url: "vladeos_pvp.html", type: "iframe" },
        { title: "Башня 3.0", desc: "Бесконечные уровни", url: "tower_game.html", type: "iframe" },
        { title: "🔺 Босс Енотов", desc: "1 млрд HP", url: "boss_game.html", type: "iframe" }
      ]
    },
    partners: {
      title: "🤝 Партнеры",
      items: [
        { title: "CapsGame", desc: "Игра про фишки", url: "https://t.me/CapsGameBot/play?startapp=r_LNPaQygljssfQTGaGc33", type: "external" }
      ]
    }
  };

  // ==================== MESSAGE HANDLER ====================
  window.addEventListener('message', function(event) {
    if (!event.data) return;

    const data = event.data;
    console.log('📨 Message from iframe:', data);
    
    // Получаем user_id для проверки
    const userId = getUserId();
    console.log('👤 Current user_id:', userId);

    // Quest complete
    if (data.type === 'quest_complete' && data.id) {
      markAsCompleted(data.id);
      const current = document.querySelector('.screen.active').id;
      if (current === 'reader-screen') {
        document.getElementById('reader-iframe').src = '';
        navigateTo('list-screen');
      }
    }

    // Clown game
    if (data.type === 'game_complete' && data.game === 'clown') {
      stats.clown_games++;
      if (data.win) stats.clown_wins++;
      saveStatsLocal();
      console.log(`🎮 Clown: games=${stats.clown_games}, wins=${stats.clown_wins}`);
      if (userId) {
        syncStats();
      } else {
        console.warn('⚠️ Нет user_id, данные не отправлены');
      }
    }

    // Vladeos game
    if (data.type === 'game_complete' && data.game === 'vladeos') {
      stats.vladeos_games++;
      if (data.win) stats.vladeos_wins++;
      saveStatsLocal();
      console.log(`⚔️ Vladeos: games=${stats.vladeos_games}, wins=${stats.vladeos_wins}`);
      if (userId) {
        syncStats();
      } else {
        console.warn('⚠️ Нет user_id, данные не отправлены');
      }
    }

    // Tower progress
    if (data.type === 'tower_update') {
      if (data.level > stats.tower_max_level) {
        stats.tower_max_level = data.level;
      }
      if (data.passed_level) {
        stats.tower_total_levels++;
        saveStatsLocal();
        console.log(`🏰 Tower: max=${stats.tower_max_level}, total=${stats.tower_total_levels}`);
        if (userId) {
          syncStats();
        } else {
          console.warn('⚠️ Нет user_id, данные не отправлены');
        }
      }
    }

    // Boss damage
    if (data.type === 'boss_damage' && data.damage) {
      sendBossDamage(data.damage);
    }

    // Boss game over
    if (data.type === 'game_over' && data.game === 'boss') {
      const current = document.querySelector('.screen.active').id;
      if (current === 'reader-screen') {
        document.getElementById('reader-iframe').src = '';
        navigateTo('list-screen');
      }
    }
  });

  // ==================== INIT ====================
  loadStats();
  console.log('🦝 Raccoon Life WebApp ready!');
  console.log('👤 User ID:', getUserId());
</script>
</body>
</html>
