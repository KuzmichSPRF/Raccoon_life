<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Морской Бой</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0088cc;
      --accent: #ff0055;
      --bg-color: #121214;
      --card-bg: #1e1e24;
      --text-main: #ffffff;
      --text-sec: #a1a1aa;
      --water: #1a3a5c;
      --water-hover: #2a5a8c;
      --ship: #4a6fa5;
      --ship-preview: #6a8fc5;
      --hit: #ff4444;
      --miss: #888888;
      --kill: #ff6b6b;
      --valid: #00ff88;
      --invalid: #ff4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      padding: 10px;
      overflow-x: hidden;
    }
    
    .game-container {
      max-width: 400px;
      margin: 0 auto;
      padding: 10px;
    }
    
    .game-header {
      text-align: center;
      margin-bottom: 15px;
    }
    
    .game-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    
    .game-status {
      font-size: 0.85rem;
      color: var(--text-sec);
      padding: 10px;
      background: var(--card-bg);
      border-radius: 10px;
      text-align: center;
      margin-bottom: 10px;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .game-status.win {
      background: linear-gradient(145deg, #1a5c3a, #0d3d22);
      border: 1px solid #00ff88;
      color: #00ff88;
    }
    
    .game-status.lose {
      background: linear-gradient(145deg, #5c1a1a, #3d0d0d);
      border: 1px solid var(--hit);
      color: var(--hit);
    }
    
    .game-status.enemy-turn {
      background: linear-gradient(145deg, #5c3a1a, #3d220d);
      border: 1px solid #ffaa00;
      color: #ffaa00;
      animation: pulse-border 1s infinite;
    }
    
    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 5px rgba(255, 170, 0, 0.3); }
      50% { box-shadow: 0 0 15px rgba(255, 170, 0, 0.6); }
    }
    
    .board-container {
      margin-bottom: 20px;
    }
    
    .board-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-sec);
      margin-bottom: 8px;
      text-transform: uppercase;
      text-align: center;
    }
    
    .board {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 2px;
      background: var(--card-bg);
      padding: 5px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .cell {
      aspect-ratio: 1;
      background: var(--water);
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      position: relative;
    }
    
    .cell:active {
      transform: scale(0.9);
    }
    
    .cell.ship {
      background: var(--ship);
    }
    
    .cell.ship-preview {
      background: var(--ship-preview);
    }
    
    .cell.valid {
      background: var(--valid);
      animation: valid-pulse 0.5s infinite;
    }
    
    .cell.invalid {
      background: var(--invalid);
      opacity: 0.5;
    }
    
    @keyframes valid-pulse {
      0%, 100% { box-shadow: 0 0 5px rgba(0, 255, 136, 0.5); }
      50% { box-shadow: 0 0 15px rgba(0, 255, 136, 0.9); }
    }
    
    .cell.hit {
      background: var(--hit);
      animation: pulse 0.5s;
    }
    
    .cell.miss {
      background: var(--miss);
    }
    
    .cell.kill {
      background: var(--kill);
      animation: pulse 0.5s;
    }
    
    .cell.not-allowed {
      cursor: not-allowed;
    }
    
    .cell.enemy-target {
      animation: enemy-target-pulse 0.5s infinite;
      border: 2px solid #ffaa00;
    }
    
    @keyframes enemy-target-pulse {
      0%, 100% { box-shadow: 0 0 5px rgba(255, 170, 0, 0.5); }
      50% { box-shadow: 0 0 15px rgba(255, 170, 0, 0.9); }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .enemy-board .cell.ship {
      background: var(--water);
    }
    
    .enemy-board .cell.hit::after {
      content: '✕';
      font-size: 0.8rem;
    }
    
    .enemy-board .cell.miss::after {
      content: '•';
      font-size: 1.2rem;
      color: var(--text-main);
    }
    
    .controls {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    
    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn:active {
      transform: scale(0.95);
    }
    
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    
    .btn-secondary {
      background: var(--card-bg);
      color: var(--text-main);
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .btn-success {
      background: #00aa66;
      color: white;
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .ship-selector {
      background: var(--card-bg);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 15px;
      text-align: center;
    }
    
    .ship-selector-title {
      font-size: 0.8rem;
      color: var(--text-sec);
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    
    .ship-buttons {
      display: flex;
      gap: 5px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .ship-btn {
      padding: 8px 12px;
      border: 2px solid var(--primary);
      background: transparent;
      color: var(--text-main);
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .ship-btn:hover {
      background: var(--primary);
    }
    
    .ship-btn.selected {
      background: var(--primary);
      box-shadow: 0 0 10px rgba(0, 136, 204, 0.5);
    }
    
    .ship-btn.placed {
      opacity: 0.3;
      border-color: var(--text-sec);
      cursor: not-allowed;
    }
    
    .rotate-btn {
      margin-top: 10px;
      padding: 10px 20px;
      background: var(--card-bg);
      border: 1px solid var(--primary);
      color: var(--primary);
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
    }
    
    .rotate-btn:active {
      background: var(--primary);
      color: white;
    }
    
    .reward-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: linear-gradient(145deg, #2a2a35, #1f1f28);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      z-index: 1000;
      border: 2px solid #ffd700;
      box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
      animation: popIn 0.3s forwards;
      max-width: 80%;
    }
    
    @keyframes popIn {
      to { transform: translate(-50%, -50%) scale(1); }
    }
    
    .reward-icon {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    
    .reward-text {
      font-size: 1.2rem;
      font-weight: 800;
      color: #ffd700;
      margin-bottom: 5px;
    }
    
    .reward-amount {
      font-size: 2rem;
      font-weight: 800;
      color: #ffd700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }
    
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 999;
      display: none;
    }
    
    .overlay.active {
      display: block;
    }
    
    .stats {
      display: flex;
      justify-content: space-around;
      padding: 10px;
      background: var(--card-bg);
      border-radius: 10px;
      margin-bottom: 10px;
    }
    
    .stat-item {
      text-align: center;
    }
    
    .stat-value {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--primary);
    }
    
    .stat-label {
      font-size: 0.7rem;
      color: var(--text-sec);
      text-transform: uppercase;
    }
    
    .phase-indicator {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
    }
    
    .phase-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-sec);
    }
    
    .phase-dot.active {
      background: var(--primary);
      box-shadow: 0 0 10px var(--primary);
    }
    
    .phase-dot.completed {
      background: #00ff88;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="game-header">
      <div class="game-title">⚓ Морской Бой</div>
    </div>
    
    <div class="phase-indicator" id="phase-indicator">
      <div class="phase-dot active" id="phase-1"></div>
      <div class="phase-dot" id="phase-2"></div>
      <div class="phase-dot" id="phase-3"></div>
    </div>
    
    <div class="game-status" id="game-status">
      Расставьте корабли на поле
    </div>
    
    <!-- Экран расстановки -->
    <div id="placement-screen">
      <div class="ship-selector">
        <div class="ship-selector-title">Выберите корабль</div>
        <div class="ship-buttons" id="ship-buttons"></div>
        <button class="rotate-btn" onclick="toggleRotation()">🔄 Поворот: <span id="rotation-text">Горизонтально</span></button>
      </div>
      
      <div class="board-container">
        <div class="board-title">🚢 Ваше поле</div>
        <div class="board player-board" id="player-board"></div>
      </div>
      
      <div class="controls">
        <button class="btn btn-secondary" onclick="autoPlaceShips()">🎲 Авто</button>
        <button class="btn btn-success" id="start-btn" onclick="startGame()" disabled>▶️ Начать бой</button>
      </div>
    </div>
    
    <!-- Экран боя -->
    <div id="battle-screen" style="display: none;">
      <div class="stats">
        <div class="stat-item">
          <div class="stat-value" id="player-ships">10</div>
          <div class="stat-label">Кораблей</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="enemy-ships">10</div>
          <div class="stat-label">Врага</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="moves-count">0</div>
          <div class="stat-label">Ходов</div>
        </div>
      </div>
      
      <div class="board-container">
        <div class="board-title">🎯 Поле врага</div>
        <div class="board enemy-board" id="enemy-board"></div>
      </div>
      
      <div class="board-container">
        <div class="board-title">🚢 Ваше поле</div>
        <div class="board player-board" id="battle-player-board"></div>
      </div>
      
      <div class="controls">
        <button class="btn btn-secondary" onclick="resetGame()">🔄 Заново</button>
        <button class="btn btn-primary" onclick="closeGame()">✕ Выход</button>
      </div>
    </div>
  </div>
  
  <div class="overlay" id="overlay"></div>
  <div class="reward-popup" id="reward-popup" style="display: none;">
    <div class="reward-icon">🎉</div>
    <div class="reward-text">Победа!</div>
    <div class="reward-amount">+100 $ENT</div>
    <button class="btn btn-primary" onclick="continueAfterWin()" style="margin-top: 20px;">▶️ Продолжить</button>
  </div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  const BOARD_SIZE = 10;
  const SHIPS_CONFIG = [
    { size: 4, count: 1, id: 'ship-4' },
    { size: 3, count: 2, id: 'ship-3' },
    { size: 2, count: 3, id: 'ship-2' },
    { size: 1, count: 4, id: 'ship-1' }
  ];

  let playerBoard = [];
  let enemyBoard = [];
  let playerShips = [];
  let enemyShips = [];
  let playerHits = [];
  let enemyHits = [];
  let isPlayerTurn = true;
  let gameOver = false;
  let movesCount = 0;
  let userId = null;
  
  // Переменные для расстановки
  let selectedShipSize = null;
  let isHorizontal = true;
  let placedShips = { 1: 0, 2: 0, 3: 0, 4: 0 };
  let gamePhase = 'placement'; // placement, battle

  // Инициализация
  function init() {
    userId = getUserId();
    createEmptyBoard();
    initShipSelector();
    renderPlacementBoard();
    updatePhaseIndicator();
  }

  function getUserId() {
    if (tg.initDataUnsafe?.user?.id) {
      return tg.initDataUnsafe.user.id;
    }
    if (tg.initData) {
      const urlParams = new URLSearchParams(tg.initData);
      const userStr = urlParams.get('user');
      if (userStr) {
        try {
          const user = JSON.parse(decodeURIComponent(userStr));
          return user.id;
        } catch (e) {}
      }
    }
    return localStorage.getItem('rl_user_id');
  }

  function createEmptyBoard() {
    playerBoard = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(0));
    enemyBoard = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(0));
    playerShips = [];
    enemyShips = [];
    playerHits = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(false));
    enemyHits = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(false));
  }

  function initShipSelector() {
    const container = document.getElementById('ship-buttons');
    container.innerHTML = '';
    
    SHIPS_CONFIG.forEach(ship => {
      for (let i = 0; i < ship.count; i++) {
        const btn = document.createElement('button');
        btn.className = 'ship-btn';
        btn.textContent = '🚢'.repeat(ship.size);
        btn.dataset.size = ship.size;
        btn.dataset.index = i;
        btn.onclick = () => selectShip(ship.size, i);
        container.appendChild(btn);
      }
    });
  }

  function selectShip(size, index) {
    if (placedShips[size] >= SHIPS_CONFIG.find(s => s.size === size).count) {
      return; // Корабль уже размещён
    }
    
    selectedShipSize = size;
    
    // Обновляем выделение
    document.querySelectorAll('.ship-btn').forEach(btn => {
      btn.classList.remove('selected');
      if (parseInt(btn.dataset.size) === size && parseInt(btn.dataset.index) === index) {
        btn.classList.add('selected');
      }
    });
    
    renderPlacementBoard();
  }

  function toggleRotation() {
    isHorizontal = !isHorizontal;
    document.getElementById('rotation-text').textContent = isHorizontal ? 'Горизонтально' : 'Вертикально';
    renderPlacementBoard();
  }

  function renderPlacementBoard() {
    const board = document.getElementById('player-board');
    board.innerHTML = '';
    
    for (let row = 0; row < BOARD_SIZE; row++) {
      for (let col = 0; col < BOARD_SIZE; col++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        
        // Отображаем размещённые корабли
        if (playerBoard[row][col] === 1) {
          cell.classList.add('ship');
        }
        
        // Показываем превью при наведении
        if (selectedShipSize) {
          cell.onmouseenter = () => showShipPreview(row, col);
          cell.onmouseleave = () => clearShipPreview();
          cell.onclick = () => placeShipAt(row, col);
          
          // Показываем валидность размещения
          if (canPlaceShip(playerBoard, row, col, selectedShipSize, isHorizontal, true)) {
            cell.classList.add('valid');
          } else {
            cell.classList.add('invalid');
          }
        }
        
        board.appendChild(cell);
      }
    }
  }

  function showShipPreview(row, col) {
    if (!selectedShipSize) return;
    
    for (let i = 0; i < selectedShipSize; i++) {
      const r = isHorizontal ? row : row + i;
      const c = isHorizontal ? col + i : col;
      
      if (r < BOARD_SIZE && c < BOARD_SIZE) {
        const index = r * BOARD_SIZE + c;
        const board = document.getElementById('player-board');
        if (board.children[index]) {
          board.children[index].classList.add('ship-preview');
        }
      }
    }
  }

  function clearShipPreview() {
    document.querySelectorAll('.ship-preview').forEach(cell => {
      cell.classList.remove('ship-preview');
    });
  }

  function placeShipAt(row, col) {
    if (!selectedShipSize) return;
    
    if (!canPlaceShip(playerBoard, row, col, selectedShipSize, isHorizontal, true)) {
      return;
    }
    
    // Размещаем корабль
    const ship = [];
    for (let i = 0; i < selectedShipSize; i++) {
      const r = isHorizontal ? row : row + i;
      const c = isHorizontal ? col + i : col;
      playerBoard[r][c] = 1;
      ship.push({ row: r, col: c });
    }
    playerShips.push(ship);
    
    // Обновляем счётчик
    placedShips[selectedShipSize]++;
    
    // Помечаем кнопку как размещённую
    const btnIndex = getShipButtonIndex(selectedShipSize, placedShips[selectedShipSize] - 1);
    const buttons = document.querySelectorAll('.ship-btn');
    if (buttons[btnIndex]) {
      buttons[btnIndex].classList.add('placed');
    }
    
    // Сбрасываем выбор
    selectedShipSize = null;
    document.querySelectorAll('.ship-btn').forEach(btn => btn.classList.remove('selected'));
    
    // Проверяем, все ли корабли размещены
    checkAllShipsPlaced();
    
    renderPlacementBoard();
  }

  function getShipButtonIndex(size, placedCount) {
    let index = 0;
    for (const ship of SHIPS_CONFIG) {
      if (ship.size === size) {
        return index + placedCount;
      }
      index += ship.count;
    }
    return 0;
  }

  function canPlaceShip(board, row, col, size, horizontal, checkNeighbors) {
    for (let i = 0; i < size; i++) {
      const r = horizontal ? row : row + i;
      const c = horizontal ? col + i : col;
      
      if (r >= BOARD_SIZE || c >= BOARD_SIZE) return false;
      if (board[r][c] === 1) return false;
      
      if (checkNeighbors) {
        // Проверка соседних клеток
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            const nr = r + dr;
            const nc = c + dc;
            if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE) {
              if (board[nr][nc] === 1) return false;
            }
          }
        }
      }
    }
    return true;
  }

  function checkAllShipsPlaced() {
    const totalShips = SHIPS_CONFIG.reduce((sum, s) => sum + s.count, 0);
    const placedTotal = Object.values(placedShips).reduce((sum, c) => sum + c, 0);
    
    const startBtn = document.getElementById('start-btn');
    if (placedTotal >= totalShips) {
      startBtn.disabled = false;
      document.getElementById('game-status').textContent = '✅ Все корабли размещены! Нажмите "Начать бой"';
    }
  }

  function autoPlaceShips() {
    // Очищаем поле
    playerBoard = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(0));
    playerShips = [];
    placedShips = { 1: 0, 2: 0, 3: 0, 4: 0 };
    
    // Размещаем все корабли
    SHIPS_CONFIG.forEach(ship => {
      for (let i = 0; i < ship.count; i++) {
        placeRandomShip(ship.size);
      }
    });
    
    // Помечаем все кнопки как размещённые
    document.querySelectorAll('.ship-btn').forEach(btn => {
      btn.classList.add('placed');
    });
    selectedShipSize = null;
    
    checkAllShipsPlaced();
    renderPlacementBoard();
  }

  function placeRandomShip(size) {
    let placed = false;
    while (!placed) {
      const horizontal = Math.random() < 0.5;
      const row = Math.floor(Math.random() * BOARD_SIZE);
      const col = Math.floor(Math.random() * BOARD_SIZE);
      
      if (canPlaceShip(playerBoard, row, col, size, horizontal, true)) {
        const ship = [];
        for (let i = 0; i < size; i++) {
          const r = horizontal ? row : row + i;
          const c = horizontal ? col + i : col;
          playerBoard[r][c] = 1;
          ship.push({ row: r, col: c });
        }
        playerShips.push(ship);
        placedShips[size]++;
        placed = true;
      }
    }
  }

  function startGame() {
    gamePhase = 'battle';
    
    // Скрываем экран расстановки, показываем экран боя
    document.getElementById('placement-screen').style.display = 'none';
    document.getElementById('battle-screen').style.display = 'block';
    
    // Генерируем поле врага
    generateEnemyBoard();
    
    // Обновляем индикатор фазы
    updatePhaseIndicator();
    
    // Настраиваем UI для боя
    document.getElementById('game-status').textContent = '🎯 Ваш ход! Стреляйте по полю врага';
    document.getElementById('game-status').className = 'game-status';
    
    renderBattleBoards();
    updateStats();
  }

  function generateEnemyBoard() {
    SHIPS_CONFIG.forEach(ship => {
      for (let i = 0; i < ship.count; i++) {
        placeRandomEnemyShip(ship.size);
      }
    });
  }

  function placeRandomEnemyShip(size) {
    let placed = false;
    while (!placed) {
      const horizontal = Math.random() < 0.5;
      const row = Math.floor(Math.random() * BOARD_SIZE);
      const col = Math.floor(Math.random() * BOARD_SIZE);
      
      if (canPlaceShip(enemyBoard, row, col, size, horizontal, true)) {
        const ship = [];
        for (let i = 0; i < size; i++) {
          const r = horizontal ? row : row + i;
          const c = horizontal ? col + i : col;
          enemyBoard[r][c] = 1;
          ship.push({ row: r, col: c });
        }
        enemyShips.push(ship);
        placed = true;
      }
    }
  }

  function renderBattleBoards() {
    renderBattlePlayerBoard();
    renderEnemyBoard();
  }

  function renderBattlePlayerBoard() {
    const board = document.getElementById('battle-player-board');
    board.innerHTML = '';
    
    for (let row = 0; row < BOARD_SIZE; row++) {
      for (let col = 0; col < BOARD_SIZE; col++) {
        const cell = document.createElement('div');
        cell.className = 'cell not-allowed';
        
        if (playerBoard[row][col] === 1) {
          cell.classList.add('ship');
        }
        
        if (playerHits[row][col]) {
          if (playerBoard[row][col] === 1) {
            cell.classList.add('kill');
          } else {
            cell.classList.add('miss');
          }
        }
        
        board.appendChild(cell);
      }
    }
  }

  function renderEnemyBoard() {
    const board = document.getElementById('enemy-board');
    board.innerHTML = '';
    
    for (let row = 0; row < BOARD_SIZE; row++) {
      for (let col = 0; col < BOARD_SIZE; col++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        
        if (enemyHits[row][col]) {
          if (enemyBoard[row][col] === 1) {
            cell.classList.add('kill');
          } else {
            cell.classList.add('miss');
          }
        } else if (isPlayerTurn && !gameOver) {
          cell.onclick = () => playerShoot(row, col);
        } else {
          cell.classList.add('not-allowed');
        }
        
        board.appendChild(cell);
      }
    }
  }

  function playerShoot(row, col) {
    if (gameOver || !isPlayerTurn || enemyHits[row][col]) return;

    enemyHits[row][col] = true;
    movesCount++;

    const hit = enemyBoard[row][col] === 1;

    // Проверяем, убит ли корабль
    const killedShip = checkShipKilled(row, col, enemyShips, enemyHits);
    
    // Если корабль убит, открываем клетки вокруг
    if (killedShip) {
      markAroundKilledShip(killedShip, enemyHits);
    }

    if (hit) {
      updateStats();
      renderEnemyBoard();

      if (checkWin(enemyShips, enemyHits)) {
        gameOver = true;
        renderEnemyBoard();
        showWin();
        return;
      }

      // Стреляем снова при попадании
      document.getElementById('game-status').textContent = killedShip ? '💀 Корабль убит! Стреляйте снова!' : '🎯 Попадание! Стреляйте снова!';
    } else {
      isPlayerTurn = false;
      updateStats();
      renderEnemyBoard();
      document.getElementById('game-status').textContent = '🤖 Ход противника...';

      setTimeout(enemyTurn, 500);
    }
  }

  function enemyTurn() {
    if (gameOver) return;
    
    const status = document.getElementById('game-status');
    status.textContent = '🤖 Противник прицеливается...';
    status.className = 'game-status enemy-turn';

    // Простой ИИ: ищет раненые корабли, иначе стреляет случайно
    let target = findDamagedShip();

    if (!target) {
      do {
        target = {
          row: Math.floor(Math.random() * BOARD_SIZE),
          col: Math.floor(Math.random() * BOARD_SIZE)
        };
      } while (playerHits[target.row][target.col]);
    }
    
    // Показываем куда целится враг
    highlightEnemyTarget(target.row, target.col);
    
    setTimeout(() => {
      // Убираем подсветку
      clearEnemyTarget();
      
      const hit = playerBoard[target.row][target.col] === 1;
      playerHits[target.row][target.col] = true;
      movesCount++;
      
      // Проверяем, убит ли корабль
      const killedShip = checkShipKilled(target.row, target.col, playerShips, playerHits);
      
      // Если корабль убит, открываем клетки вокруг
      if (killedShip) {
        markAroundKilledShip(killedShip, playerHits);
      }
      
      renderBattlePlayerBoard();
      updateStats();
      
      if (hit) {
        status.textContent = killedShip ? '💀 Корабль убит!' : '� Попадание по вашему кораблю!';
        
        if (checkWin(playerShips, playerHits)) {
          gameOver = true;
          status.textContent = '💀 ПОРАЖЕНИЕ! Ваши корабли уничтожены!';
          status.className = 'game-status lose';
          return;
        }
        
        // ИИ стреляет снова при попадании
        setTimeout(enemyTurn, 800);
      } else {
        status.textContent = '🎯 Промах! Ваш ход!';
        setTimeout(() => {
          isPlayerTurn = true;
          status.textContent = '🎯 Ваш ход! Стреляйте по полю врага';
          status.className = 'game-status';
          renderEnemyBoard();
        }, 500);
      }
    }, 1000);
  }
  
  function highlightEnemyTarget(row, col) {
    const board = document.getElementById('battle-player-board');
    const index = row * BOARD_SIZE + col;
    if (board.children[index]) {
      board.children[index].classList.add('enemy-target');
    }
  }
  
  function clearEnemyTarget() {
    const board = document.getElementById('battle-player-board');
    for (let cell of board.children) {
      cell.classList.remove('enemy-target');
    }
  }

  // Проверяет, убит ли корабль в данной клетке
  function checkShipKilled(row, col, ships, hits) {
    for (const ship of ships) {
      // Проверяем, есть ли эта клетка в корабле
      const inShip = ship.some(segment => segment.row === row && segment.col === col);
      if (inShip) {
        // Проверяем, все ли клетки корабля подбиты
        const allHit = ship.every(segment => hits[segment.row][segment.col]);
        if (allHit) {
          return ship; // Возвращаем убитый корабль
        }
      }
    }
    return null;
  }

  // Помечает промахами все клетки вокруг убитого корабля
  function markAroundKilledShip(ship, hits) {
    for (const segment of ship) {
      // Проверяем все соседние клетки (3x3)
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          const nr = segment.row + dr;
          const nc = segment.col + dc;
          
          // Если клетка в пределах поля и ещё не отмечена
          if (nr >= 0 && nr < BOARD_SIZE && 
              nc >= 0 && nc < BOARD_SIZE && 
              !hits[nr][nc]) {
            hits[nr][nc] = true; // Помечаем как промах
          }
        }
      }
    }
  }

  function findDamagedShip() {
    for (let row = 0; row < BOARD_SIZE; row++) {
      for (let col = 0; col < BOARD_SIZE; col++) {
        if (playerHits[row][col] && playerBoard[row][col] === 1) {
          // Проверяем соседей
          const neighbors = [
            { row: row - 1, col },
            { row: row + 1, col },
            { row, col: col - 1 },
            { row, col: col + 1 }
          ];
          
          for (const n of neighbors) {
            if (n.row >= 0 && n.row < BOARD_SIZE && 
                n.col >= 0 && n.col < BOARD_SIZE && 
                !playerHits[n.row][n.col]) {
              return n;
            }
          }
        }
      }
    }
    return null;
  }

  function checkWin(ships, hits) {
    for (const ship of ships) {
      for (const segment of ship) {
        if (!hits[segment.row][segment.col]) {
          return false;
        }
      }
    }
    return true;
  }

  function updateStats() {
    const playerAlive = countAliveShips(playerShips, playerHits);
    const enemyAlive = countAliveShips(enemyShips, enemyHits);
    
    document.getElementById('player-ships').textContent = playerAlive;
    document.getElementById('enemy-ships').textContent = enemyAlive;
    document.getElementById('moves-count').textContent = movesCount;
  }

  function countAliveShips(ships, hits) {
    let alive = 0;
    for (const ship of ships) {
      const allHit = ship.every(s => hits[s.row][s.col]);
      if (!allHit) alive++;
    }
    return alive;
  }

  function updatePhaseIndicator() {
    const phase1 = document.getElementById('phase-1');
    const phase2 = document.getElementById('phase-2');
    
    if (gamePhase === 'placement') {
      phase1.classList.add('active');
      phase2.classList.remove('active', 'completed');
    } else if (gamePhase === 'battle') {
      phase1.classList.remove('active');
      phase1.classList.add('completed');
      phase2.classList.add('active');
    }
  }

  function showWin() {
    const status = document.getElementById('game-status');
    status.textContent = '🎉 ПОБЕДА! Все корабли врага уничтожены!';
    status.className = 'game-status win';
    
    // Показываем награду
    document.getElementById('overlay').classList.add('active');
    document.getElementById('reward-popup').style.display = 'block';
    
    // Отправляем данные о победе (100 токенов)
    earnTokens(100, 'battleship_win');
  }

  function showLose() {
    const status = document.getElementById('game-status');
    status.textContent = '💀 ПОРАЖЕНИЕ! Ваши корабли уничтожены!';
    status.className = 'game-status lose';
  }

  function earnTokens(amount, reason) {
    if (!userId) return;
    
    const data = {
      userId: userId
    };
    
    fetch('/api/game/battleship', {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'X-Telegram-Init-Data': window.parent.Telegram?.WebApp?.initData || window.Telegram?.WebApp?.initData || ''
      },
      body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(result => {
      if (result.status === 'ok') {
        window.parent.postMessage({ type: 'game_complete', game: 'battleship', win: true }, '*');
      }
    })
    .catch(err => console.error('❌ Error:', err));
  }

  function resetGame() {
    gamePhase = 'placement';
    gameOver = false;
    isPlayerTurn = true;
    movesCount = 0;
    selectedShipSize = null;
    placedShips = { 1: 0, 2: 0, 3: 0, 4: 0 };
    
    document.getElementById('game-status').textContent = 'Расставьте корабли на поле';
    document.getElementById('game-status').className = 'game-status';
    document.getElementById('overlay').classList.remove('active');
    document.getElementById('reward-popup').style.display = 'none';
    document.getElementById('placement-screen').style.display = 'block';
    document.getElementById('battle-screen').style.display = 'none';
    
    // Сбрасываем кнопки кораблей
    document.querySelectorAll('.ship-btn').forEach(btn => {
      btn.classList.remove('placed', 'selected');
    });
    
    createEmptyBoard();
    initShipSelector();
    renderPlacementBoard();
    updatePhaseIndicator();
  }

  function closeGame() {
    tg.close();
  }

  function closeReward() {
    document.getElementById('overlay').classList.remove('active');
    document.getElementById('reward-popup').style.display = 'none';
  }

  function continueAfterWin() {
    closeReward();
    resetGame();
  }

  // Запуск игры
  init();
</script>
