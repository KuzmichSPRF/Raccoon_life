<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QT2: Первые шаги к успеху</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; }
        :root {
            --neon-cyan: #00ffcc;
            --neon-pink: #ff00ff;
            --neon-yellow: #ffff00;
            --bg-black: #050505;
            --panel-bg: rgba(15, 15, 15, 0.95);
        }
        body {
            margin: 0; background: var(--bg-black); color: var(--neon-cyan);
            font-family: 'Courier New', Courier, monospace;
            display: flex; height: 100vh; overflow: hidden;
        }
        /* --- ЛЕВАЯ ПАНЕЛЬ: ЛИФТ И ИНВЕНТАРЬ --- */
        #sidebar {
            width: 250px; background: #0a0a0a; border-right: 2px solid var(--neon-cyan);
            display: flex; flex-direction: column; padding: 15px; box-sizing: border-box;
            box-shadow: 2px 0 15px rgba(0, 255, 204, 0.2); z-index: 10;
        }
        .sidebar-title { font-weight: bold; text-align: center; margin-bottom: 20px; color: var(--neon-pink); border-bottom: 1px dashed var(--neon-pink); padding-bottom: 10px;}
        .floor-btn {
            background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan);
            padding: 10px; margin-bottom: 10px; cursor: pointer; text-align: left;
            transition: 0.2s; border-radius: 0; font-family: inherit; font-size: 0.9rem;
        }
        .floor-btn:hover:not(:disabled) { background: var(--neon-cyan); color: black; }
        .floor-btn.active { background: var(--neon-cyan); color: black; box-shadow: 0 0 10px var(--neon-cyan); }
        .floor-btn:disabled { border-color: #333; color: #555; cursor: not-allowed; }
        
        #inventory { margin-top: auto; border-top: 1px dashed var(--neon-cyan); padding-top: 10px; font-size: 0.8rem; }
        .seal { display: flex; align-items: center; gap: 10px; margin-top: 5px; color: #555; }
        .seal.active { color: var(--neon-yellow); text-shadow: 0 0 5px var(--neon-yellow); }

        .reset-btn {
            margin-bottom: 15px; padding: 10px; border: 1px dashed var(--neon-pink);
            background: transparent; color: var(--neon-pink); cursor: pointer;
            font-family: inherit; font-size: 0.8rem; text-transform: uppercase;
            transition: 0.3s; width: 100%; box-sizing: border-box;
        }
        .reset-btn:hover { background: var(--neon-pink); color: black; }

        /* --- ГЛАВНЫЙ ЭКРАН --- */
        #main-content {
            flex: 1; display: flex; flex-direction: column; padding: 20px;
            overflow-y: auto; position: relative;
        }
        .scene-image {
            width: 100%; max-width: 500px; max-height: 250px;
            object-fit: contain; background: #0a0a0a;
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
            margin: 0 auto 15px auto; display: block;
            flex-shrink: 0;
        }
        .character-header {
            font-size: 1.5rem; color: var(--neon-pink); margin-bottom: 10px; text-shadow: 0 0 5px var(--neon-pink);
            flex-shrink: 0;
        }
        .dialog-box {
            background: var(--panel-bg); border: 1px solid var(--neon-pink); padding: 20px;
            min-height: 100px; margin-bottom: 20px; font-size: 1.1rem; line-height: 1.4;
            overflow-wrap: break-word;
            word-wrap: break-word;
            flex-shrink: 0;
        }
        .action-area { flex: 1 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-bottom: 30px; }
        
        button.action-btn {
            background: transparent; border: 2px solid var(--neon-cyan); color: var(--neon-cyan);
            padding: 15px 30px; font-size: 1.2rem; cursor: pointer; margin: 10px;
            font-family: inherit; text-transform: uppercase; transition: 0.3s;
        }
        button.action-btn:hover { background: var(--neon-cyan); color: black; box-shadow: 0 0 15px var(--neon-cyan); }

        /* --- МИНИИГРА: АНКЕТА --- */
        .blind-form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 600px; }
        .blind-input {
            background: transparent; border: 1px solid var(--neon-cyan); color: white;
            padding: 10px; font-family: inherit; text-align: center; outline: none;
        }
        .blind-input:focus { box-shadow: 0 0 10px var(--neon-cyan); border-color: var(--neon-pink); }

        /* --- МИНИИГРА: КСЕРОКС --- */
        #xerox-container {
            width: 100%; max-width: 400px; height: 50px; border: 2px solid #333; position: relative; margin: 20px 0; background: #111;
        }
        #xerox-target {
            position: absolute; left: 90%; width: 5%; height: 100%; background: rgba(0, 255, 204, 0.3); border-left: 1px solid var(--neon-cyan); border-right: 1px solid var(--neon-cyan);
        }
        #xerox-bar {
            position: absolute; left: 0; top: -5px; width: 4px; height: 60px; background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink);
        }

        /* --- МИНИИГРА: СТРУП (ДЕТЕКТОР) --- */
        #stroop-word { font-size: 3rem; font-weight: bold; margin: 30px 0; letter-spacing: 5px; text-align: center;}
        #stroop-timer { color: var(--neon-pink); font-size: 1.5rem; }

        /* Эффекты */
        .shake { animation: shake 0.5s infinite; }
        @keyframes shake { 0% {transform: translate(1px, 1px) rotate(0deg);} 10% {transform: translate(-1px, -2px) rotate(-1deg);} 20% {transform: translate(-3px, 0px) rotate(1deg);} 30% {transform: translate(3px, 2px) rotate(0deg);} 40% {transform: translate(1px, -1px) rotate(1deg);} 50% {transform: translate(-1px, 2px) rotate(-1deg);} 60% {transform: translate(-3px, 1px) rotate(0deg);} 70% {transform: translate(3px, 1px) rotate(-1deg);} 80% {transform: translate(-1px, -1px) rotate(1deg);} 90% {transform: translate(1px, 2px) rotate(0deg);} 100% {transform: translate(1px, -2px) rotate(-1deg);} }
        .hidden { display: none !important; }
        
        .cursor {
            border-left: 10px solid var(--neon-cyan);
            margin-left: 5px;
            animation: blink 0.8s infinite;
            display: inline-block;
            height: 1.1em;
            vertical-align: text-bottom;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- ФИНАЛЬНЫЙ ЭКРАН КАК В 1 ГЛАВЕ --- */
        #end-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-black); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        .glitch-title {
            font-size: 3rem; text-transform: uppercase; text-shadow: 2px 2px var(--neon-pink);
            animation: glitch 0.4s infinite; margin-bottom: 20px;
            text-align: center; color: var(--neon-cyan); font-weight: bold;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            50% { transform: translate(-3px, 2px); }
            100% { transform: translate(0); }
        }
        #finish-btn:hover {
            background: var(--neon-cyan) !important; color: black !important;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; display: flex; }
            #sidebar { 
                position: relative; z-index: 100; flex-shrink: 0; background: #0a0a0a;
                width: 100%; height: auto; border-right: none; border-bottom: 2px solid var(--neon-cyan); 
                display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; 
            }
            .sidebar-title { display: none; }
            .floor-btn { 
                margin: 0; padding: 5px 2px; font-size: 0.65rem; text-align: center; 
                word-wrap: break-word; line-height: 1.2; display: flex; align-items: center; justify-content: center;
            }
            .reset-btn { grid-column: span 4; margin: 0; width: 100%; padding: 8px 10px; }
            
            #inventory { 
                position: fixed; bottom: 0; left: 0; width: 100%;
                background: rgba(10, 10, 10, 0.95); border-top: 2px solid var(--neon-cyan);
                display: flex; flex-direction: row; flex-wrap: wrap;
                justify-content: center; align-items: center; gap: 10px;
                padding: 10px; z-index: 50; box-shadow: 0 -2px 10px rgba(0,255,204,0.2);
            }
            #inventory > div:first-child { display: none; }
            .seal { margin: 0; font-size: 0.75rem; }
            #main-content { padding-bottom: 80px; }
            .blind-form { grid-template-columns: 1fr; }
            #end-screen .glitch-title { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <audio id="intro-music">
        <source src="https://raw.githubusercontent.com/KuzmichSPRF/QT2/main/intro.mp3" type="audio/mpeg">
    </audio>
    <audio id="bg-music" loop>
        <source src="https://raw.githubusercontent.com/KuzmichSPRF/QT2/main/Batman_Returns_NES_OST_-_Game_Intro_theme_(SkySound.cc).mp3" type="audio/mpeg">
    </audio>

    <div id="sidebar">
        <div class="sidebar-title">ЛИФТ СИСТЕМЫ</div>
        <button class="reset-btn" onclick="resetProgress()">[ Начать заново ]</button>
        <button class="floor-btn" id="btn-f69" onclick="loadFloor(69)">Этаж 69: Отдел Кадров</button>
        <button class="floor-btn" id="btn-f68" onclick="loadFloor(68)">Этаж 68: Служба Безопасности</button>
        <button class="floor-btn" id="btn-f60" disabled>Этаж 60: ИТ-Отдел (Блок)</button>
        <button class="floor-btn" id="btn-f13" disabled>Этаж 13: Завхоз (Блок)</button>
        
        <div id="inventory">
            <div style="color:var(--neon-cyan); margin-bottom:5px; text-align:center;">--- ПЕЧАТИ ---</div>
            <div class="seal" id="seal-hr">📄 Форма 2026-Б</div>
            <div class="seal" id="seal-sb">👁️ Проверен СБ</div>
        </div>
    </div>

    <div id="main-content">
        <div class="character-header" id="char-name">ЛИФТ</div>
        <img id="floor-image" class="scene-image hidden" src="" alt="Сцена">
        <div class="dialog-box" id="dialog-container">
            <span id="dialog-text">Выберите этаж для перемещения.</span><span id="dialog-cursor" class="cursor hidden"></span>
        </div>
        <div class="action-area" id="action-area">
            <!-- Динамический контент миниигр -->
        </div>
    </div>

    <div id="end-screen" class="hidden">
        <button id="finish-btn" style="font-size: 1.5rem; padding: 20px; border: 2px solid var(--neon-cyan); background: transparent; color: var(--neon-cyan); text-transform: uppercase; box-shadow: 0 0 20px var(--neon-cyan); cursor: pointer; transition: 0.3s; font-family: inherit;">ЭТАП ПРОЙДЕН</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        // --- СИСТЕМА СОСТОЯНИЙ ---
        let pState = JSON.parse(localStorage.getItem('qt2_progress')) || {
            hr_form_done: false,
            xerox_done: false,
            sb_verified: false,
            current_floor: null
        };

        function saveState() {
            localStorage.setItem('qt2_progress', JSON.stringify(pState));
            updateInventoryUI();
        }

        function updateInventoryUI() {
            if (pState.hr_form_done) document.getElementById('seal-hr').classList.add('active');
            if (pState.sb_verified) document.getElementById('seal-sb').classList.add('active');
        }
        updateInventoryUI();

        // --- СБРОС ПРОГРЕССА ---
        function resetProgress() {
            if (confirm("Вы точно хотите сжечь все документы и начать этот бюрократический ад заново?")) {
                localStorage.removeItem('qt2_progress');
                location.reload();
            }
        }

        // --- ЛОГИКА ЭТАЖЕЙ ---
        const charName = document.getElementById('char-name');
        const actionArea = document.getElementById('action-area');
        const dialogText = document.getElementById('dialog-text');
        const dialogCursor = document.getElementById('dialog-cursor');
        const audioIntro = document.getElementById('intro-music');
        const audioBg = document.getElementById('bg-music');
        let typingTimeout;

        // --- ФОНОВАЯ МУЗЫКА (50%) ---
        audioBg.volume = 0.5;
        function startBgMusic() {
            if (audioBg.paused) {
                audioBg.play().catch(e => console.log("Bg music play error:", e));
            }
        }
        document.addEventListener('click', startBgMusic, { once: true });
        startBgMusic(); // Попытка автозапуска
        
        // --- СИНТЕЗАТОР 8-БИТНОГО КЛИКА ---
        let clickAudioCtx;
        function play8BitClick() {
            try {
                if (!clickAudioCtx) clickAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (clickAudioCtx.state === 'suspended') clickAudioCtx.resume();
                
                const osc = clickAudioCtx.createOscillator();
                const gain = clickAudioCtx.createGain();
                
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, clickAudioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, clickAudioCtx.currentTime + 0.05);
                
                gain.gain.setValueAtTime(0.1, clickAudioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, clickAudioCtx.currentTime + 0.1);
                
                osc.connect(gain);
                gain.connect(clickAudioCtx.destination);
                
                osc.start();
                osc.stop(clickAudioCtx.currentTime + 0.1);
            } catch (e) {}
        }

        // --- ЗВУК КНОПОК ---
        document.addEventListener('click', function(e) {
            if (e.target.tagName === 'BUTTON' || e.target.closest('button')) {
                play8BitClick();
            }
        });

        // --- ФИНАЛЬНЫЙ ЭКРАН ---
        const rl_lang = localStorage.getItem('rl_lang') || 'ru';
        if (rl_lang === 'en') {
            document.getElementById('finish-btn').innerText = "STAGE CLEARED";
        }

        document.getElementById("finish-btn").addEventListener("click", function() {
            try { audioBg.pause(); } catch(e){}
            window.parent.postMessage({ type: 'quest_complete', id: 'qt2_2' }, window.location.origin);
        });

        function showDialog(text, callback) {
            clearTimeout(typingTimeout);
            dialogText.textContent = "";
            dialogCursor.classList.remove('hidden');
            
            try {
                audioIntro.currentTime = 0;
                audioIntro.play().catch(e => console.log("Audio play error:", e));
            } catch(e){}

            let i = 0;
            function typeNext() {
                if (i < text.length) {
                    dialogText.textContent += text.charAt(i);
                    i++;
                    typingTimeout = setTimeout(typeNext, 30);
                } else {
                    try { audioIntro.pause(); } catch(e){}
                    dialogCursor.classList.add('hidden');
                    if (callback) callback();
                }
            }
            typeNext();
        }

        function loadFloor(floor) {
            document.querySelectorAll('.floor-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-f${floor}`).classList.add('active');
            actionArea.innerHTML = '';
            document.getElementById('floor-image').classList.add('hidden');
            pState.current_floor = floor;
            saveState();

            if (floor === 69) initFloor69();
            if (floor === 68) initFloor68();
        }

        // ================= ЭТАЖ 69: ОТДЕЛ КАДРОВ =================
        function initFloor69() {
            charName.innerText = "Элеонора Витальевна (HR)";
            
            const img = document.getElementById('floor-image');
            img.src = "https://raw.githubusercontent.com/KuzmichSPRF/QT2/main/HR.png";
            img.classList.remove('hidden');
            
            if (!pState.hr_form_done) {
                showDialog("— Молодой человек, вы по какому вопросу? На работу? У нас обед через 40 минут, а вы без папки. Держите Обходной Лист (модель 2026-Б). Заполняйте по памяти и СТРОГО по ГОСТу. Подсказки исчезнут через 5 секунд!");
                
                const startBtn = document.createElement('button');
                startBtn.className = 'action-btn';
                startBtn.innerText = 'НАЧАТЬ ЗАПОЛНЕНИЕ';
                
                startBtn.onclick = () => {
                    actionArea.innerHTML = ''; // Убираем кнопку старта
                    
                    const formDiv = document.createElement('div');
                    formDiv.className = 'blind-form';
                    
                    // Правила бюрократии по ГОСТу
                    const formRules = [
                        { ph: "ФИО", check: (v) => { const w = v.trim().split(/\s+/); return w.length === 3 && w.every(word => /^[А-ЯЁA-Z][а-яёa-z]+$/.test(word)); } },
                        { ph: "ИНН", check: (v) => /^(\d{10}|\d{12})$/.test(v.replace(/\s/g, '')) },
                        { ph: "СНИЛС", check: (v) => /^\d{11}$/.test(v.replace(/[\s-]/g, '')) },
                        { ph: "Девичья фамилия матери", check: (v) => /^[А-ЯЁA-Z][а-яёa-z]+$/.test(v.trim()) },
                        { ph: "Любимый цвет", check: (v) => v.trim().length > 0 },
                        { ph: "Цель визита", check: (v) => v.trim().split(/\s+/).length >= 2 }, // Любое словосочетание (минимум 2 слова)
                        { ph: "Кличка питомца", check: (v) => /^[А-ЯЁA-Z][а-яёa-z]+/.test(v.trim()) }
                    ];
                    
                    formRules.forEach((rule, i) => {
                        const inp = document.createElement('input');
                        inp.className = 'blind-input';
                        inp.placeholder = rule.ph;
                        inp.id = `bf-${i}`;
                        formDiv.appendChild(inp);
                    });

                    const btn = document.createElement('button');
                    btn.className = 'action-btn'; btn.innerText = "СДАТЬ АНКЕТУ";
                    btn.onclick = () => {
                        let valid = true;
                        formRules.forEach((rule, i) => { 
                            const val = document.getElementById(`bf-${i}`).value;
                            if (!rule.check(val)) valid = false;
                        });
                        
                        if (valid) {
                            pState.hr_form_done = true; saveState();
                            showDialog("— Удивительно. Ни одной ошибки, всё по форме. Ладно, теперь сделайте 3 копии паспорта. Вон там стоит ксерокс. Главное - вовремя нажимать старт!");
                            initFloor69(); // перезагрузка стейта
                        } else {
                            tg.HapticFeedback.impactOccurred('heavy');
                            showDialog("— Вы издеваетесь?! Не по ГОСТу! Имена с заглавной (3 слова), ИНН/СНИЛС настоящие, цель визита - словосочетание! *звук рвущейся бумаги* Пишите заново!");
                            
                            document.querySelectorAll('.blind-input').forEach(el => {
                                el.classList.add('shake');
                                setTimeout(() => el.classList.remove('shake'), 500);
                            });

                            formRules.forEach((rule, i) => { 
                                const el = document.getElementById(`bf-${i}`);
                                el.value = ''; el.placeholder = rule.ph;
                            });
                            setTimeout(hidePlaceholders, 5000);
                        }
                    };

                    actionArea.appendChild(formDiv);
                    actionArea.appendChild(btn);
                    
                    function hidePlaceholders() {
                        document.querySelectorAll('.blind-input').forEach(i => i.placeholder = '...');
                    }
                    setTimeout(hidePlaceholders, 5000);
                };
                
                actionArea.appendChild(startBtn);
            } 
            else if (!pState.xerox_done) {
                showDialog("— Я жду 3 идеальных копии паспорта. Идите к ксероксу.");
                
                actionArea.innerHTML = `
                    <div style="text-align:center;">Успешных копий: <span id="x-count" style="color:var(--neon-yellow)">0</span> / 3</div>
                    <div id="xerox-container">
                        <div id="xerox-target"></div>
                        <div id="xerox-bar"></div>
                    </div>
                    <button class="action-btn" id="x-btn" onclick="stopXerox()">СКАНИРОВАТЬ</button>
                `;
                startXeroxGame();
            }
            else if (!pState.sb_verified) {
                showDialog("— Копии нормальные. Но я не поставлю визу, пока Служба Безопасности (Этаж 68) не подтвердит твою лояльность. Иди к Михалычу.");
            }
            else {
                showDialog("— СБ подтвердило? Отлично. Теперь нужен пропуск от ИТ и ключ от Завхоза... (Продолжение следует)", () => {
                    setTimeout(() => {
                        document.getElementById('main-content').classList.add('hidden');
                        document.getElementById('sidebar').classList.add('hidden');
                        document.getElementById('end-screen').classList.remove('hidden');
                    }, 1000); // Экран победы появится через секунду после окончания текста
                });
            }
        }

        // Логика Ксерокса
        let xeroxAnim, xeroxPos = 0, xeroxDir = 1, xCount = 0;
        function startXeroxGame() {
            const bar = document.getElementById('xerox-bar');
            function animate() {
                xeroxPos += xeroxDir * 2;
                if (xeroxPos > 100) { xeroxPos = 100; xeroxDir = -1; }
                if (xeroxPos < 0) { xeroxPos = 0; xeroxDir = 1; }
                if(bar) bar.style.left = xeroxPos + '%';
                xeroxAnim = requestAnimationFrame(animate);
            }
            xeroxAnim = requestAnimationFrame(animate);
        }

        function stopXerox() {
            cancelAnimationFrame(xeroxAnim);
            if (xeroxPos >= 88 && xeroxPos <= 96) {
                xCount++;
                document.getElementById('x-count').innerText = xCount;
                tg.HapticFeedback.notificationOccurred('success');
                if (xCount >= 3) {
                    pState.xerox_done = true; saveState();
                    document.getElementById('x-btn').style.display = 'none';
                    setTimeout(initFloor69, 1000);
                    return;
                }
            } else {
                xCount = 0;
                document.getElementById('x-count').innerText = xCount;
                tg.HapticFeedback.notificationOccurred('error');
                showDialog("— Зажевало бумагу! Всё сначала!");
            }
            setTimeout(startXeroxGame, 500);
        }


        // ================= ЭТАЖ 68: СЛУЖБА БЕЗОПАСНОСТИ =================
        let stroopInterval, stroopScore = 0, stroopFails = 0, isPunished = false;
        
        function initFloor68() {
            charName.innerText = "Михалыч (СБ)";
            
            const img = document.getElementById('floor-image');
            img.src = "https://raw.githubusercontent.com/KuzmichSPRF/QT2/main/SB.png";
            img.classList.remove('hidden');

            if (!pState.hr_form_done || !pState.xerox_done) {
                showDialog("— Ты кто такой? У тебя даже анкеты из HR нет. Иди на 69 этаж и не отвлекай от косынки.");
                return;
            }

            if (pState.sb_verified) {
                showDialog("— Я тебе уже всё подписал. Иди отсюда.");
                return;
            }

            showDialog("— А, от Элеоноры... Садись. Пройдем тест на детекторе лжи. Жми 'ПРАВДА' на ЗЕЛЕНЫЙ цвет, и 'ЛОЖЬ' на КРАСНЫЙ. Смысл текста не важен! Не ошибись 3 раза.");
            
            const startBtn = document.createElement('button');
            startBtn.className = 'action-btn';
            startBtn.innerText = 'НАЧАТЬ ТЕСТ';
            startBtn.onclick = () => {
                actionArea.innerHTML = `
                    <div id="stroop-word">ТЕСТ</div>
                    <div>Счет: <span id="s-score">0</span>/10 | Ошибки: <span id="s-fails" style="color:var(--neon-pink)">0</span>/3</div>
                    <div id="stroop-timer" class="hidden">ОЖИДАНИЕ: 10с</div>
                    <div style="display:flex; gap: 20px; margin-top:20px;">
                        <button class="action-btn" id="btn-true" onclick="stroopAnswer(true)">ПРАВДА</button>
                        <button class="action-btn" id="btn-false" onclick="stroopAnswer(false)">ЛОЖЬ</button>
                    </div>
                `;
                stroopScore = 0; stroopFails = 0;
                nextStroopWord();
            };
            actionArea.appendChild(startBtn);
        }

        const stroopWords = [
            "Я ЛОЯЛЕН", "ПРАВДА", "УКРАЛ СКРЕПКУ", "ЛОЖЬ", "РАБОТАЮ ЗА ЕДУ", 
            "ОБОЖАЮ НАЛОГИ", "ПЬЮ КОФЕ БОССА", "СПЛЮ НА РАБОТЕ", 
            "ПИЦЦА С АНАНАСОМ", "ДИРЕКТОР ГЕНИЙ", "Я НЕ РОБОТ", 
            "КНОПКА КРАСНАЯ", "КНОПКА ЗЕЛЕНАЯ", "СБ ЛУЧШИЕ",
            "ЗАРПЛАТА НЕ НУЖНА", "ЛЮБЛЮ БЮРОКРАТИЮ", "ЭТО ПРАВДА", "ЭТО ЛОЖЬ"
        ];
        const stroopColors = ["#00ff88", "#ff4444"]; // Green, Red
        let currentIsGreen = false;

        function nextStroopWord() {
            if (isPunished) return;
            const wordEl = document.getElementById('stroop-word');
            if(!wordEl) return;

            const word = stroopWords[Math.floor(Math.random() * stroopWords.length)];
            const color = stroopColors[Math.floor(Math.random() * stroopColors.length)];
            
            wordEl.innerText = word;
            wordEl.style.color = color;
            wordEl.style.textShadow = `0 0 10px ${color}`;
            
            currentIsGreen = (color === "#00ff88");

            clearInterval(stroopInterval);
            stroopInterval = setInterval(onStroopTimeout, 1800); // даем 1.8 сек на ответ
        }
        
        function onStroopTimeout() {
            if (isPunished) return;
            
            // Неответ в течение 1.8 сек считается ошибкой
            stroopFails++;
            document.getElementById('s-fails').innerText = stroopFails;
            tg.HapticFeedback.notificationOccurred('error');
            if (stroopFails >= 3) {
                punishPlayer();
            } else {
                nextStroopWord();
            }
        }

        function stroopAnswer(pressedTrue) {
            if (isPunished) return;
            
            if ((pressedTrue && currentIsGreen) || (!pressedTrue && !currentIsGreen)) {
                // Правильно
                stroopScore++;
                document.getElementById('s-score').innerText = stroopScore;
                tg.HapticFeedback.impactOccurred('light');
                if (stroopScore >= 10) {
                    clearInterval(stroopInterval);
                    pState.sb_verified = true; saveState();
                    showDialog("— Ладно, вижу, что ты наш человек. Держи печать. Теперь дуй обратно в HR.");
                    document.getElementById('action-area').innerHTML = '<button class="action-btn" onclick="loadFloor(69)">На 69 этаж</button>';
                } else {
                    nextStroopWord();
                }
            } else {
                // Ошибка
                stroopFails++;
                document.getElementById('s-fails').innerText = stroopFails;
                tg.HapticFeedback.notificationOccurred('error');
                if (stroopFails >= 3) {
                    punishPlayer();
                } else {
                    nextStroopWord();
                }
            }
        }

        function punishPlayer() {
            clearInterval(stroopInterval);
            isPunished = true;
            showDialog("— ТАК! Ты мне тут не юли! Сиди и думай над поведением 60 секунд!");
            document.getElementById('btn-true').disabled = true;
            document.getElementById('btn-false').disabled = true;
            document.getElementById('stroop-word').innerText = "БЛОКИРОВКА";
            document.getElementById('stroop-word').style.color = "red";
            
            let timer = 60;
            const timerEl = document.getElementById('stroop-timer');
            timerEl.classList.remove('hidden');
            
            const tInt = setInterval(() => {
                timer--;
                timerEl.innerText = `ОЖИДАНИЕ: ${timer}с`;
                if (timer <= 0) {
                    clearInterval(tInt);
                    isPunished = false;
                    stroopFails = 0; stroopScore = 0;
                    document.getElementById('s-fails').innerText = 0;
                    document.getElementById('s-score').innerText = 0;
                    timerEl.classList.add('hidden');
                    document.getElementById('btn-true').disabled = false;
                    document.getElementById('btn-false').disabled = false;
                    showDialog("— Погнали заново. Жми 'ПРАВДА' ТОЛЬКО на зеленый цвет!");
                    nextStroopWord();
                }
            }, 1000);
        }
    </script>
</body>
</html>
