<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PVP: Vladeos</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0088cc;
      --accent: #ff0055;
      --bg-color: #121214;
      --card-bg: #1e1e24;
      --text-main: #ffffff;
      --text-sec: #a1a1aa;
    }
    body {
      font-family: 'Montserrat', sans-serif;
      text-align: center;
      background-color: var(--bg-color);
      background-image: radial-gradient(circle at top, #1e1e24 0%, #121214 100%);
      margin: 0;
      padding: 15px;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .status-box {
      background: var(--card-bg); border-radius: 15px; padding: 15px; margin-bottom: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3); min-height: 60px; display: flex;
      align-items: center; justify-content: center; font-weight: bold; color: var(--text-main);
      border: 1px solid rgba(255,255,255,0.05);
      font-size: 1.1rem;
      width: 100%;
      max-width: 400px;
    }
    .arena {
      display: flex; justify-content: center; align-items: center; gap: 30px;
      margin-bottom: 40px;
      width: 100%;
    }
    .chip-wrapper {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .chip {
      width: 100px; height: 100px; border-radius: 50%; border: 4px solid #333;
      display: flex; align-items: center; justify-content: center; font-size: 45px;
      background: #121214; position: relative; transition: all 0.3s ease;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
      z-index: 2;
    }
    .chip.player { border-color: var(--primary); box-shadow: 0 0 20px rgba(0,136,204,0.3); }
    .chip.vladeos { border-color: var(--accent); box-shadow: 0 0 20px rgba(255,0,85,0.3); }
    
    .score {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--text-main);
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .score.visible { opacity: 1; transform: scale(1); }
    
    .controls {
      display: flex; flex-direction: column; gap: 12px;
      width: 100%; max-width: 320px;
    }
    .btn {
      padding: 16px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
      color: white; font-size: 1rem; transition: transform 0.1s;
      font-family: 'Montserrat', sans-serif;
      text-transform: uppercase;
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    .btn:active { transform: scale(0.96); }
    
    .btn-common { color: #a1a1aa; }
    .btn-rare { color: #0088cc; border-color: #0088cc; }
    .btn-epic { color: #9b59b6; border-color: #9b59b6; }
    .btn-legend { color: #f1c40f; border-color: #f1c40f; }
    .btn-diamond { 
      background: linear-gradient(135deg, #00c6ff, #0072ff); 
      color: white; 
      border: none;
      box-shadow: 0 0 20px rgba(0,198,255,0.4);
    }

    .hidden { display: none !important; }

    /* Animations */
    @keyframes clash-left {
      0% { transform: translateX(0); }
      40% { transform: translateX(40px) rotate(10deg); }
      100% { transform: translateX(0); }
    }
    @keyframes clash-right {
      0% { transform: translateX(0); }
      40% { transform: translateX(-40px) rotate(-10deg); }
      100% { transform: translateX(0); }
    }
    .anim-left { animation: clash-left 0.4s ease-in-out; }
    .anim-right { animation: clash-right 0.4s ease-in-out; }
    
    /* Reward Popup */
    .reward-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); display: none; align-items: center;
      justify-content: center; z-index: 1000;
    }
    .reward-popup {
      background: linear-gradient(145deg, #2a2a35, #1f1f28);
      border-radius: 20px; padding: 30px; text-align: center;
      border: 2px solid #ffd700; box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
      animation: popIn 0.3s forwards; max-width: 80%;
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .reward-icon { font-size: 3rem; margin-bottom: 10px; }
    .reward-text { font-size: 1.2rem; font-weight: 800; color: #ffd700; margin-bottom: 5px; }
    .reward-amount { font-size: 2rem; font-weight: 800; color: #ffd700; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
    .btn-continue {
      margin-top: 20px; padding: 14px 40px; background: var(--primary);
      color: white; border: none; border-radius: 50px; font-weight: 800;
      font-size: 1rem; cursor: pointer; text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="status-box" id="msg">Выбери грейд фишки</div>

  <div class="arena">
    <div class="chip-wrapper">
      <div id="p-chip" class="chip player">🦝</div>
      <div id="p-score" class="score">0</div>
    </div>
    <div style="font-size: 2rem; font-weight: 800; color: #333;">VS</div>
    <div class="chip-wrapper">
      <div id="v-chip" class="chip vladeos">😎</div>
      <div id="v-score" class="score">0</div>
    </div>
  </div>

  <div id="grade-selection" class="controls">
    <button class="btn btn-common" onclick="tryPlay('common')">Common</button>
    <button class="btn btn-rare" onclick="tryPlay('rare')">Rare</button>
    <button class="btn btn-epic" onclick="tryPlay('epic')">Epic</button>
    <button class="btn btn-legend" onclick="tryPlay('legend')">Legend</button>
    <button class="btn btn-diamond" onclick="tryPlay('diamond')">Diamond 💎</button>
  </div>

  <div id="restart-area" class="controls hidden">
    <button class="btn btn-diamond" onclick="resetGame()">Сыграть еще</button>
  </div>
  
  <!-- Reward Popup -->
  <div class="reward-overlay" id="reward-overlay">
    <div class="reward-popup">
      <div class="reward-icon">🎉</div>
      <div class="reward-text">Победа!</div>
      <div class="reward-amount">+100 $ENT</div>
      <button class="btn-continue" onclick="continueGame()">Продолжить</button>
    </div>
  </div>

  <script>
    const msg = document.getElementById('msg');
    const pChip = document.getElementById('p-chip');
    const vChip = document.getElementById('v-chip');
    const pScore = document.getElementById('p-score');
    const vScore = document.getElementById('v-score');
    const gradeSelection = document.getElementById('grade-selection');
    const restartArea = document.getElementById('restart-area');

    const insults = [
      "Не солидно...", 
      "Ставка говно!", 
      "Я играю только по-крупному.", 
      "Смешно. Давай Diamond.", 
      "У меня нет времени на мелочь."
    ];

    function tryPlay(grade) {
      if (grade !== 'diamond') {
        const randomInsult = insults[Math.floor(Math.random() * insults.length)];
        msg.innerText = randomInsult;
        msg.style.color = '#ff5555';
        
        // Shake effect on buttons
        gradeSelection.style.transform = "translateX(5px)";
        setTimeout(() => gradeSelection.style.transform = "translateX(-5px)", 50);
        setTimeout(() => gradeSelection.style.transform = "translateX(0)", 100);

        setTimeout(() => { 
          msg.style.color = 'var(--text-main)'; 
          msg.innerText = "Выбери грейд фишки"; 
        }, 1500);
        return;
      }

      playGame();
    }

    function playGame() {
      gradeSelection.classList.add('hidden');
      // Результат отправится в showResult() после определения победы/поражения

      msg.innerText = "БИТВА!";

      pChip.classList.add('anim-left');
      vChip.classList.add('anim-right');

      setTimeout(() => {
        pChip.classList.remove('anim-left');
        vChip.classList.remove('anim-right');
        showResult();
      }, 400);
    }

    function showResult() {
      // 5% шанс на победу
      const luckyWin = Math.random() < 0.05;

      let playerNum, vladeosNum;

      if (luckyWin) {
        // Игрок побеждает с минимальным отрывом
        vladeosNum = Math.floor(Math.random() * 90) + 1;
        playerNum = vladeosNum + 1;
      } else {
        // Vladeos побеждает (как обычно)
        playerNum = Math.floor(Math.random() * 90) + 1;
        vladeosNum = playerNum + 1;
      }

      pScore.innerText = playerNum;
      vScore.innerText = vladeosNum;

      pScore.classList.add('visible');
      vScore.classList.add('visible');

      if (luckyWin) {
        msg.innerText = "🍀 НЕВЕРОЯТНО! Вы победили!";
        msg.style.color = 'var(--game-green)';
        // Сообщаем родителю о победе
        window.parent.postMessage({ type: 'game_complete', game: 'vladeos', win: true }, '*');
        // Показываем награду
        showReward(100);
      } else {
        msg.innerText = "Vladeos победил! 🏆";
        msg.style.color = 'var(--accent)';
        // Сообщаем родителю о поражении
        window.parent.postMessage({ type: 'game_complete', game: 'vladeos', win: false }, '*');
        // Показываем кнопку рестарта
        restartArea.classList.remove('hidden');
      }
    }
    
    function showReward(amount) {
      const overlay = document.getElementById('reward-overlay');
      const amountEl = overlay.querySelector('.reward-amount');
      amountEl.textContent = '+' + amount + ' $ENT';
      overlay.style.display = 'flex';
      
      // Начисляем токены
      earnTokens(amount, 'vladeos_win');
    }
    
    function continueGame() {
      document.getElementById('reward-overlay').style.display = 'none';
      resetGame();
    }
    
    function earnTokens(amount, reason) {
      let userId = null;
      if (window.parent !== window) {
        try {
          const tg = window.parent.tg || window.parent.Telegram?.WebApp;
          if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userId = tg.initDataUnsafe.user.id;
          }
        } catch (e) {}
      }
      
      if (!userId) return;
      
      fetch('/api/sync', {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'X-Telegram-Init-Data': window.parent.Telegram?.WebApp?.initData || window.Telegram?.WebApp?.initData || ''
        },
        body: JSON.stringify({
          type: 'earn_tokens',
          userId: userId,
          amount: amount,
          reason: reason
        })
      })
      .then(r => r.json())
      .then(result => console.log('✅ Tokens earned:', result))
      .catch(err => console.error('❌ Error:', err));
    }

    function resetGame() {
      pScore.classList.remove('visible');
      vScore.classList.remove('visible');
      restartArea.classList.add('hidden');
      gradeSelection.classList.remove('hidden');
      msg.innerText = "Выбери грейд фишки";
      msg.style.color = 'var(--text-main)';
    }
  </script>
</body>
</html>
