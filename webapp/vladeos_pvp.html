<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PVP: Vladeos</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0088cc;
      --accent: #ff0055;
      --bg-color: #121214;
      --card-bg: #1e1e24;
      --text-main: #ffffff;
      --text-sec: #a1a1aa;
    }
    body {
      font-family: 'Montserrat', sans-serif;
      text-align: center;
      background-color: var(--bg-color);
      background-image: radial-gradient(circle at top, #1e1e24 0%, #121214 100%);
      margin: 0;
      padding: 15px;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .status-box {
      background: var(--card-bg); border-radius: 15px; padding: 15px; margin-bottom: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3); min-height: 60px; display: flex;
      align-items: center; justify-content: center; font-weight: bold; color: var(--text-main);
      border: 1px solid rgba(255,255,255,0.05);
      font-size: 1.1rem;
      width: 100%;
      max-width: 400px;
    }
    .arena {
      display: flex; justify-content: center; align-items: center; gap: 30px;
      margin-bottom: 40px;
      width: 100%;
    }
    .cap-wrapper {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .cap {
      width: 100px; height: 100px; border-radius: 50%; border: 4px solid #333;
      display: flex; align-items: center; justify-content: center; font-size: 45px;
      background: #121214; position: relative; transition: all 0.3s ease;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
      z-index: 2;
    }
    .cap.player { border-color: var(--primary); box-shadow: 0 0 20px rgba(0,136,204,0.3); }
    .cap.vladeos { border-color: var(--accent); box-shadow: 0 0 20px rgba(255,0,85,0.3); }
    
    .score {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--text-main);
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .score.visible { opacity: 1; transform: scale(1); }
    
    .controls {
      display: flex; flex-direction: column; gap: 12px;
      width: 100%; max-width: 320px;
    }
    .btn {
      padding: 16px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
      color: white; font-size: 1rem; transition: transform 0.1s;
      font-family: 'Montserrat', sans-serif;
      text-transform: uppercase;
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    .btn:active { transform: scale(0.96); }
    
    .btn-common { color: #a1a1aa; }
    .btn-rare { color: #0088cc; border-color: #0088cc; }
    .btn-epic { color: #9b59b6; border-color: #9b59b6; }
    .btn-legend { color: #f1c40f; border-color: #f1c40f; }
    .btn-diamond { 
      background: linear-gradient(135deg, #00c6ff, #0072ff); 
      color: white; 
      border: none;
      box-shadow: 0 0 20px rgba(0,198,255,0.4);
    }

    .hidden { display: none !important; }

    /* Animations */
    @keyframes clash-left {
      0% { transform: translateX(0); }
      40% { transform: translateX(40px) rotate(10deg); }
      100% { transform: translateX(0); }
    }
    @keyframes clash-right {
      0% { transform: translateX(0); }
      40% { transform: translateX(-40px) rotate(-10deg); }
      100% { transform: translateX(0); }
    }
    .anim-left { animation: clash-left 0.4s ease-in-out; }
    .anim-right { animation: clash-right 0.4s ease-in-out; }
    
    /* Reward Popup */
    .reward-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); display: none; align-items: center;
      justify-content: center; z-index: 1000;
    }
    .reward-popup {
      background: linear-gradient(145deg, #2a2a35, #1f1f28);
      border-radius: 20px; padding: 30px; text-align: center;
      border: 2px solid #ffd700; box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
      animation: popIn 0.3s forwards; max-width: 80%;
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .reward-icon { font-size: 3rem; margin-bottom: 10px; }
    .reward-text { font-size: 1.2rem; font-weight: 800; color: #ffd700; margin-bottom: 5px; }
    .reward-amount { font-size: 2rem; font-weight: 800; color: #ffd700; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
    .btn-continue {
      margin-top: 20px; padding: 14px 40px; background: var(--primary);
      color: white; border: none; border-radius: 50px; font-weight: 800;
      font-size: 1rem; cursor: pointer; text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="status-box" id="msg">Выбери грейд фишки</div>

  <div class="arena">
    <div class="cap-wrapper">
      <div id="p-cap" class="cap player">🦝</div>
      <div id="p-score" class="score">0</div>
    </div>
    <div style="font-size: 2rem; font-weight: 800; color: #333;">VS</div>
    <div class="cap-wrapper">
      <div id="v-cap" class="cap vladeos">😎</div>
      <div id="v-score" class="score">0</div>
    </div>
  </div>

  <div id="grade-selection" class="controls">
    <button class="btn btn-common" onclick="tryPlay('common')">Common</button>
    <button class="btn btn-rare" onclick="tryPlay('rare')">Rare</button>
    <button class="btn btn-epic" onclick="tryPlay('epic')">Epic</button>
    <button class="btn btn-legend" onclick="tryPlay('legend')">Legend</button>
    <button class="btn btn-diamond" onclick="tryPlay('diamond')">Diamond 💎</button>
  </div>

  <!-- Reward Popup -->
  <div class="reward-overlay" id="reward-overlay">
    <div class="reward-popup" id="reward-popup">
      <div class="reward-icon" id="popup-icon">🎉</div>
      <div class="reward-text" id="popup-title">Победа!</div>
      <div class="reward-amount" id="popup-amount">+100 Шишек</div>
      <button class="btn-continue" id="popup-btn" onclick="continueGame()">Продолжить</button>
    </div>
  </div>

  <script>
    const lang = localStorage.getItem('rl_lang') || 'ru';
    const t = {
      ru: { msgStart: "Выбери грейд фишки" },
      en: { msgStart: "Choose cap grade" }
    }[lang];

    const msg = document.getElementById('msg');
    const pCap = document.getElementById('p-cap');
    const vCap = document.getElementById('v-cap');
    const pScore = document.getElementById('p-score');
    const vScore = document.getElementById('v-score');
    const gradeSelection = document.getElementById('grade-selection');

    msg.innerText = t.msgStart;

    const insults = lang === 'ru' ? [
      "Не солидно...", "Ставка говно!", "Я играю только по-крупному.", "Смешно. Давай Diamond.", "У меня нет времени на мелочь."
    ] : [
      "Not cool...", "Trash bet!", "I play big only.", "Funny. Give me Diamond.", "No time for pennies."
    ];

    function tryPlay(grade) {
      if (grade !== 'diamond') {
        const randomInsult = insults[Math.floor(Math.random() * insults.length)];
        msg.innerText = randomInsult;
        msg.style.color = '#ff5555';
        
        // Shake effect on buttons
        gradeSelection.style.transform = "translateX(5px)";
        setTimeout(() => gradeSelection.style.transform = "translateX(-5px)", 50);
        setTimeout(() => gradeSelection.style.transform = "translateX(0)", 100);

        setTimeout(() => { 
          msg.style.color = 'var(--text-main)'; 
          msg.innerText = t.msgStart; 
        }, 1500);
        return;
      }

      playGame();
    }

    function playGame() {
      gradeSelection.classList.add('hidden');
      // Результат отправится в showResult() после определения победы/поражения

      msg.innerText = lang === 'ru' ? "БИТВА!" : "BATTLE!";

      pCap.classList.add('anim-left');
      vCap.classList.add('anim-right');

      setTimeout(() => {
        pCap.classList.remove('anim-left');
        vCap.classList.remove('anim-right');
        showResult();
      }, 400);
    }

    async function showResult() {
      let userId = null;
      try { userId = window.parent.Telegram?.WebApp?.initDataUnsafe?.user?.id || localStorage.getItem('rl_user_id'); } catch(e){}
      
      try {
        const res = await fetch('/api/game/vladeos', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'X-Telegram-Init-Data': window.parent.Telegram?.WebApp?.initData || window.Telegram?.WebApp?.initData || ''
          },
          body: JSON.stringify({ userId: userId })
        });
        const data = await res.json();
        
        pScore.innerText = data.p_score || 0;
        vScore.innerText = data.v_score || 0;
        pScore.classList.add('visible');
        vScore.classList.add('visible');
  
        if (data.win) {
          msg.innerText = lang === 'ru' ? "🍀 НЕВЕРОЯТНО! Вы победили!" : "🍀 INCREDIBLE! You won!";
          msg.style.color = 'var(--game-green)';
          window.parent.postMessage({ type: 'game_complete', game: 'vladeos', win: true }, window.location.origin);
          showPopupResult(true, 100);
        } else {
          msg.innerText = lang === 'ru' ? "Vladeos победил! 🏆" : "Vladeos won! 🏆";
          msg.style.color = 'var(--accent)';
          window.parent.postMessage({ type: 'game_complete', game: 'vladeos', win: false }, window.location.origin);
          showPopupResult(false, 0);
        }
      } catch(e) {
        msg.innerText = lang === 'ru' ? "❌ Ошибка соединения!" : "❌ Connection error!";
      }
    }
    
    function showPopupResult(isWin, amount) {
      const overlay = document.getElementById('reward-overlay');
      const popup = document.getElementById('reward-popup');
      const icon = document.getElementById('popup-icon');
      const title = document.getElementById('popup-title');
      const amountEl = document.getElementById('popup-amount');
      const btn = document.getElementById('popup-btn');
      
      if (isWin) {
        icon.innerText = '🎉';
        title.innerText = lang === 'ru' ? 'Победа!' : 'Victory!';
        title.style.color = '#ffd700';
        amountEl.style.display = 'block';
        amountEl.textContent = '+' + amount + (lang === 'ru' ? ' Шишек' : ' Cones');
        popup.style.borderColor = '#ffd700';
        btn.innerText = lang === 'ru' ? 'Продолжить' : 'Continue';
      } else {
        icon.innerText = '💀';
        title.innerText = lang === 'ru' ? 'Поражение!' : 'Defeat!';
        title.style.color = 'var(--accent)';
        amountEl.style.display = 'none';
        popup.style.borderColor = 'var(--accent)';
        btn.innerText = lang === 'ru' ? 'Сыграть ещё' : 'Play Again';
      }
      
      overlay.style.display = 'flex';
    }
    
    function continueGame() {
      document.getElementById('reward-overlay').style.display = 'none';
      resetGame();
    }
    

    function resetGame() {
      pScore.classList.remove('visible');
      vScore.classList.remove('visible');
      gradeSelection.classList.remove('hidden');
      msg.innerText = t.msgStart;
      msg.style.color = 'var(--text-main)';
    }
  </script>
</body>
</html>
