<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QT2: Финальное тестирование</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; }
        :root {
            --neon-cyan: #00ffcc;
            --neon-pink: #ff00ff;
            --neon-yellow: #ffff00;
            --bg-black: #050505;
            --panel-bg: rgba(15, 15, 15, 0.95);
        }
        body {
            margin: 0; background: var(--bg-black); color: var(--neon-cyan);
            font-family: 'Courier New', Courier, monospace;
            display: flex; height: 100vh; overflow: hidden;
        }
        #sidebar {
            width: 250px; background: #0a0a0a; border-right: 2px solid var(--neon-cyan);
            display: flex; flex-direction: column; padding: 15px; box-sizing: border-box;
            box-shadow: 2px 0 15px rgba(0, 255, 204, 0.2); z-index: 10;
        }
        .sidebar-title { font-weight: bold; text-align: center; margin-bottom: 20px; color: var(--neon-pink); border-bottom: 1px dashed var(--neon-pink); padding-bottom: 10px;}
        .floor-btn {
            background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan);
            padding: 10px; margin-bottom: 10px; cursor: pointer; text-align: left;
            transition: 0.2s; border-radius: 0; font-family: inherit; font-size: 0.9rem;
        }
        .floor-btn:hover:not(:disabled) { background: var(--neon-cyan); color: black; }
        .floor-btn.active { background: var(--neon-cyan); color: black; box-shadow: 0 0 10px var(--neon-cyan); }
        .floor-btn:disabled { border-color: #333; color: #555; cursor: not-allowed; }
        
        #inventory { margin-top: auto; border-top: 1px dashed var(--neon-cyan); padding-top: 10px; font-size: 0.8rem; }
        .seal { display: flex; align-items: center; gap: 10px; margin-top: 5px; color: #555; }
        .seal.active { color: var(--neon-yellow); text-shadow: 0 0 5px var(--neon-yellow); }

        .reset-btn {
            margin-bottom: 15px; padding: 10px; border: 1px dashed var(--neon-pink);
            background: transparent; color: var(--neon-pink); cursor: pointer;
            font-family: inherit; font-size: 0.8rem; text-transform: uppercase; width: 100%;
        }

        #main-content {
            flex: 1; display: flex; flex-direction: column; padding: 20px;
            overflow-y: auto; position: relative;
        }
        .scene-image {
            width: 100%; max-width: 500px; max-height: 250px;
            object-fit: contain; background: #0a0a0a;
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
            margin: 0 auto 15px auto; display: block;
            flex-shrink: 0;
        }
        .character-header { font-size: 1.5rem; color: var(--neon-pink); margin-bottom: 10px; text-shadow: 0 0 5px var(--neon-pink); text-align: center;}
        .dialog-box {
            background: var(--panel-bg); border: 1px solid var(--neon-pink); padding: 20px;
            min-height: 100px; margin-bottom: 20px; font-size: 1.1rem; line-height: 1.4;
            overflow-wrap: break-word; word-wrap: break-word; flex-shrink: 0;
        }
        .action-area { flex: 1 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-bottom: 30px; position: relative;}
        
        button.action-btn {
            background: transparent; border: 2px solid var(--neon-cyan); color: var(--neon-cyan);
            padding: 15px; font-size: 1rem; cursor: pointer; margin: 8px;
            font-family: inherit; text-transform: uppercase; transition: 0.3s;
            width: 100%; max-width: 500px; box-sizing: border-box; white-space: normal;
        }
        button.action-btn:hover:not(:disabled) { background: var(--neon-cyan); color: black; box-shadow: 0 0 15px var(--neon-cyan); }
        button.action-btn:disabled { border-color: #555; color: #555; cursor: not-allowed; }

        .test-container {
            width: 100%; max-width: 600px; border: 1px solid var(--neon-yellow);
            padding: 15px; background: #0a0a0a; margin-bottom: 20px;
        }
        .test-question {
            font-size: 1.2rem; color: var(--neon-yellow); margin-bottom: 15px;
            text-align: center; border-bottom: 1px dashed var(--neon-yellow); padding-bottom: 10px;
        }
        .test-progress { font-size: 0.8rem; color: #777; text-align: right; margin-bottom: 5px; }

        .cursor { border-left: 10px solid var(--neon-cyan); margin-left: 5px; animation: blink 0.8s infinite; display: inline-block; height: 1.1em; vertical-align: text-bottom; }
        @keyframes blink { 50% { opacity: 0; } }
        .hidden { display: none !important; }

        #end-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-black); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; display: flex; }
            #sidebar { width: 100%; height: auto; border-right: none; border-bottom: 2px solid var(--neon-cyan); display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; padding: 10px; flex-shrink: 0;}
            .sidebar-title { display: none; }
            .floor-btn { margin: 0; padding: 5px; font-size: 0.75rem; text-align: center; }
            .reset-btn { grid-column: span 2; margin: 0; width: 100%; padding: 8px; }
            #inventory { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10, 10, 10, 0.95); border-top: 2px solid var(--neon-cyan); display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 10px; z-index: 50; }
            #inventory > div:first-child { display: none; }
            #main-content { padding-bottom: 80px; }
            button.action-btn { font-size: 0.9rem; padding: 12px; }
        }
    </style>
</head>
<body>
    <audio id="intro-music">
        <source src="https://raw.githubusercontent.com/KuzmichSPRF/QT2/main/intro.mp3" type="audio/mpeg">
    </audio>

    <div id="sidebar">
        <div class="sidebar-title">ЛИФТ СИСТЕМЫ</div>
        <button class="reset-btn" onclick="resetProgress()">[ Начать заново ]</button>
        <button class="floor-btn" id="btn-f69" onclick="loadFloor(69)">Этаж 69: Отдел Кадров</button>
        <button class="floor-btn hidden" id="btn-f100" onclick="loadFloor(100)">Черные Двери (Босс)</button>
        
        <div id="inventory">
            <div style="color:var(--neon-cyan); margin-bottom:5px; width:100%; text-align:center;">--- СТАТУС ДОКУМЕНТОВ ---</div>
            <div class="seal active" id="inv-obhod">✅ Обходной лист закрыт</div>
            <div class="seal" id="inv-test">📊 Профиль DISC: Ожидание</div>
        </div>
    </div>

    <div id="main-content">
        <div class="character-header" id="char-name">ЛИФТ</div>
        <img id="floor-image" class="scene-image hidden" src="" alt="Сцена" onerror="this.onerror=null; this.src='https://via.placeholder.com/500x250/0a0a0a/ff00ff?text=IMAGE+404';">
        <div class="dialog-box" id="dialog-container">
            <span id="dialog-text">Поднимаемся обратно на 69-й этаж. Время финальных проверок.</span><span id="dialog-cursor" class="cursor hidden"></span>
        </div>
        <div class="action-area" id="action-area">
            <button class="action-btn" onclick="loadFloor(69)">Войти в Отдел Кадров</button>
        </div>
    </div>

    <div id="end-screen" class="hidden">
        <button id="finish-btn" style="font-size: 1.5rem; padding: 20px; border: 2px solid var(--neon-cyan); background: transparent; color: var(--neon-cyan); text-transform: uppercase; box-shadow: 0 0 20px var(--neon-cyan); cursor: pointer; transition: 0.3s; font-family: inherit;">ЭТАП ПРОЙДЕН</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const lang = localStorage.getItem('rl_lang') || 'ru';
        const T = (ru, en) => lang === 'en' ? en : ru;
        
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'language_changed') {
                localStorage.setItem('rl_lang', event.data.lang);
                location.reload();
            }
        });

        document.addEventListener("DOMContentLoaded", () => {
            if (lang === 'en') {
                document.querySelector('.sidebar-title').innerText = "SYSTEM ELEVATOR";
                document.querySelector('.reset-btn').innerText = "[ Restart ]";
                document.getElementById('btn-f69').innerText = "Floor 69: HR Dept";
                document.getElementById('btn-f100').innerText = "Black Doors (Boss)";
                document.querySelector('#inventory > div:first-child').innerText = "--- DOCUMENTS STATUS ---";
                document.getElementById('inv-obhod').innerText = "✅ Bypass sheet closed";
                document.getElementById('inv-test').innerText = "📊 DISC Profile: Waiting";
                document.getElementById('char-name').innerText = "ELEVATOR";
                document.getElementById('dialog-text').innerText = "Going back up to the 69th floor. Time for final checks.";
                const actionBtns = document.querySelectorAll('.action-btn');
                if(actionBtns[0]) actionBtns[0].innerText = "Enter HR Dept";
                document.getElementById('finish-btn').innerText = "STAGE CLEARED";
            }
        });

        // --- АУДИО (ФОН) ---
        const audioBg = new Audio('https://github.com/KuzmichSPRF/Raccoon_life/raw/refs/heads/main/sound/8%20-%20Stage%202%20Sunken%20Ship.mp3');
        audioBg.volume = 0.4;
        audioBg.loop = true;
        document.body.addEventListener('click', function startAudio() { audioBg.play().catch(()=>{}); }, { once: true });

        const audioIntro = document.getElementById('intro-music');
        let clickCtx;
        function playClick() {
            try {
                if (!clickCtx) clickCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = clickCtx.createOscillator();
                const gain = clickCtx.createGain();
                osc.type = 'square'; osc.frequency.setValueAtTime(400, clickCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, clickCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.1, clickCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, clickCtx.currentTime + 0.1);
                osc.connect(gain); gain.connect(clickCtx.destination);
                osc.start(); osc.stop(clickCtx.currentTime + 0.1);
            } catch (e) {}
        }
        document.addEventListener('click', e => { if (e.target.tagName === 'BUTTON') playClick(); });

        // --- STATE MANAGEMENT ---
        let pState = JSON.parse(localStorage.getItem('qt2_6_progress')) || {
            test_passed: false, test_result: null, current_floor: null
        };

        function updateFloorLocks() {
            const btn100 = document.getElementById('btn-f100');
            if (btn100) btn100.classList.toggle('hidden', !pState.test_passed);
        }

        const charName = document.getElementById('char-name');
        const actionArea = document.getElementById('action-area');
        const dialogText = document.getElementById('dialog-text');
        const dialogCursor = document.getElementById('dialog-cursor');
        let typingTimeout;

        function saveState() {
            localStorage.setItem('qt2_6_progress', JSON.stringify(pState));
            if (pState.test_passed) {
                document.getElementById('inv-test').classList.add('active');
                document.getElementById('inv-test').innerText = `📊 ${T("Профиль:", "Profile:")} ${pState.test_result.type}`;
            }
            updateFloorLocks();
        }
        saveState();

        function resetProgress() {
            if (confirm(T("Удалить результаты тестирования и начать заново?", "Delete test results and start over?"))) {
                localStorage.removeItem('qt2_6_progress'); location.reload();
            }
        }

        function showDialog(text, callback) {
            clearTimeout(typingTimeout); dialogText.textContent = ""; dialogCursor.classList.remove('hidden');
            try { audioIntro.currentTime = 0; audioIntro.play().catch(()=>{}); } catch(e){}

            let i = 0;
            function typeNext() {
                if (i < text.length) {
                    dialogText.textContent += text.charAt(i); i++;
                    typingTimeout = setTimeout(typeNext, 20);
                } else {
                    try { audioIntro.pause(); } catch(e){}
                    dialogCursor.classList.add('hidden');
                    if (callback) callback();
                }
            }
            typeNext();
        }

        function addBtn(text, onclick) {
            const btn = document.createElement('button');
            btn.className = 'action-btn'; btn.innerText = text; btn.onclick = onclick;
            actionArea.appendChild(btn); return btn;
        }

        function loadFloor(floor) {
            document.querySelectorAll('.floor-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-f${floor}`).classList.add('active');
            actionArea.innerHTML = '';
            const img = document.getElementById('floor-image');
            img.classList.remove('hidden');
            pState.current_floor = floor; saveState();

            if (floor === 69) initFloor69();
            if (floor === 100) initFloor100();
        }

        // ================= ЭТАЖ 69: ОТДЕЛ КАДРОВ =================
        const testQuestions = [
            {q: T("В конфликтной ситуации с коллегами вы обычно:", "In a conflict with colleagues, you usually:"), a: [{t:"D",text:T("Жестко настаиваю на своем решении.","Insist firmly on my decision.")},{t:"I",text:T("Пытаюсь разрядить обстановку шуткой.","Try to defuse it with a joke.")},{t:"S",text:T("Ищу компромисс и уступаю.","Seek compromise and yield.")},{t:"C",text:T("Обращаюсь к должностным инструкциям.","Refer to job instructions.")}]},
            {q: T("Получив новую сложную задачу, вы в первую очередь:","Receiving a complex new task, you first:"), a: [{t:"D",text:T("Сразу берусь за дело, разберемся по ходу.","Dive right in, figure it out on the go.")},{t:"I",text:T("Собираю команду на мозговой штурм.","Gather the team for a brainstorm.")},{t:"S",text:T("Прошу четкие инструкции и время на подготовку.","Ask for clear instructions and prep time.")},{t:"C",text:T("Анализирую риски и составляю подробный план.","Analyze risks and make a detailed plan.")}]},
            {q: T("В работе для вас важнее всего:","Most important for you at work is:"), a: [{t:"D",text:T("Достижение амбициозных целей и власть.","Achieving ambitious goals and power.")},{t:"I",text:T("Признание, похвала и общение с людьми.","Recognition, praise, and socializing.")},{t:"S",text:T("Стабильность и надежная команда.","Stability and a reliable team.")},{t:"C",text:T("Высокое качество и отсутствие ошибок.","High quality and zero errors.")}]},
            {q: T("Кто-то из отдела снова не помыл кружку на кухне:","Someone didn't wash their mug in the kitchen again:"), a: [{t:"D",text:T("Громко выясню, чья это кружка, и заставлю вымыть.","Loudly find out whose it is and make them wash it.")},{t:"I",text:T("Напишу забавный стикер-мем и приклею на раковину.","Draw a funny meme sticker and stick it to the sink.")},{t:"S",text:T("Молча помою сам, чтобы не раздувать скандал.","Wash it myself silently to avoid scandal.")},{t:"C",text:T("Напишу жалобу завхозу на нарушение регламента.","Write a complaint to supply manager about a policy breach.")}]},
            {q: T("На совещании кто-то предлагает абсурдную идею:","Someone suggests an absurd idea in a meeting:"), a: [{t:"D",text:T("Сразу обрываю и говорю, что это бред.","Cut them off immediately and say it's nonsense.")},{t:"I",text:T("Громко смеюсь и предлагаю идею еще безумнее.","Laugh loudly and suggest an even crazier idea.")},{t:"S",text:T("Молчу, чтобы не обидеть человека.","Stay silent so as not to offend.")},{t:"C",text:T("Прошу предоставить расчеты окупаемости этой идеи.","Ask for ROI calculations for this idea.")}]},
            {q: T("До дедлайна 1 час, а проект готов на 50%:","1 hour to deadline, project is 50% done:"), a: [{t:"D",text:T("Беру всё в свои руки, заставляю всех пахать быстрее.","Take over everything, make everyone work faster.")},{t:"I",text:T("Паникую, бегаю по офису, подбадриваю коллег.","Panic, run around the office, cheer up colleagues.")},{t:"S",text:T("Спокойно продолжаю делать свою часть работы.","Calmly continue doing my part of the work.")},{t:"C",text:T("Пишу письмо руководству с анализом причин провала.","Write to management analyzing reasons for failure.")}]},
            {q: T("Как выглядит ваш рабочий стол?","How does your desk look?"), a: [{t:"D",text:T("Только то, что нужно для достижения текущей цели.","Only what's needed to achieve current goal.")},{t:"I",text:T("Кружки, стикеры, игрушки, полный хаос.","Mugs, stickers, toys, total chaos.")},{t:"S",text:T("Фото семьи, цветок, привычный порядок годами.","Family photo, plant, usual order for years.")},{t:"C",text:T("Идеальная чистота, всё разложено по папкам.","Perfect cleanliness, everything sorted in folders.")}]},
            {q: T("Вы обнаружили ошибку в работе Босса:","You found an error in Boss's work:"), a: [{t:"D",text:T("Прямо скажу ему об этом в лицо.","Tell him straight to his face.")},{t:"I",text:T("Расскажу всем коллегам в курилке.","Tell all colleagues in the smoking room.")},{t:"S",text:T("Попробую незаметно исправить сам.","Try to secretly fix it myself.")},{t:"C",text:T("Составлю отчет об ошибке с доказательствами.","Compile an error report with evidence.")}]},
            {q: T("На ваш компьютер установили новую ОС:","A new OS is installed on your PC:"), a: [{t:"D",text:T("Требую вернуть старую, она работала быстрее!","Demand the old one back, it was faster!")},{t:"I",text:T("Ого, какие красивые новые иконки!","Wow, what beautiful new icons!")},{t:"S",text:T("Главное, чтобы мои старые файлы не пропали.","As long as my old files are not gone.")},{t:"C",text:T("Изучаю мануал и настройки приватности.","Study the manual and privacy settings.")}]},
            {q: T("В офисе сломалась кофемашина:","Office coffee machine broke down:"), a: [{t:"D",text:T("Звоню в сервис и требую починить за час.","Call service and demand a fix in an hour.")},{t:"I",text:T("Предлагаю всем пойти в кофейню на улице!","Suggest everyone goes to a street cafe!")},{t:"S",text:T("Пью чай, ничего страшного.","I'll drink tea, no big deal.")},{t:"C",text:T("Пытаюсь починить сам по инструкции из интернета.","Try to fix it myself via internet manual.")}]},
            {q: T("Ваш стиль общения в рабочих чатах:","Your communication style in work chats:"), a: [{t:"D",text:T("Коротко: 'Сделай', 'Сроки?', 'Ок'.","Short: 'Do it', 'Deadline?', 'Ok'.")},{t:"I",text:T("Голосовые сообщения по 3 минуты и куча эмодзи.","3-min voice messages and tons of emojis.")},{t:"S",text:T("Вежливые просьбы: 'Коллеги, не могли бы вы...'.","Polite requests: 'Colleagues, could you please...'.")},{t:"C",text:T("Развернутые тексты со списками и пунктами.","Detailed texts with bullet points.")}]},
            {q: T("Как вы планируете свой отпуск?","How do you plan your vacation?"), a: [{t:"D",text:T("Решаю за день до вылета, еду туда, где престижно.","Decide a day before flight, go where it's prestigious.")},{t:"I",text:T("Спонтанно, главное чтобы была крутая компания!","Spontaneously, main thing is great company!")},{t:"S",text:T("Езжу в одно и то же проверенное место годами.","Go to the same trusted place for years.")},{t:"C",text:T("Планирую за полгода, составляю Excel-таблицу.","Plan 6 months ahead, make an Excel spreadsheet.")}]},
            {q: T("В компании вводят жесткий дресс-код:","Company introduces a strict dress code:"), a: [{t:"D",text:T("Игнорирую. Мои результаты важнее костюма.","Ignore. My results are more important than a suit.")},{t:"I",text:T("Начну носить яркие галстуки или нестандартные носки.","Start wearing bright ties or funky socks.")},{t:"S",text:T("Смирюсь, правила есть правила.","Accept it, rules are rules.")},{t:"C",text:T("Изучу регламент, чтобы знать точную длину рукава.","Study the policy to know the exact sleeve length.")}]},
            {q: T("При найме нового сотрудника вы обращаете внимание на:","When hiring a new employee, you look at:"), a: [{t:"D",text:T("Его амбиции и готовность пахать.","Their ambition and readiness to work hard.")},{t:"I",text:T("Его харизму и чувство юмора.","Their charisma and sense of humor.")},{t:"S",text:T("Его стабильность и лояльность.","Their stability and loyalty.")},{t:"C",text:T("Его диплом, сертификаты и точные навыки.","Their diploma, certificates, and exact skills.")}]},
            {q: T("Завтра важная презентация, а слайды не готовы:","Important presentation tomorrow, slides aren't ready:"), a: [{t:"D",text:T("Набросаю 3 слайда и вытяну всё на уверенности.","Sketch 3 slides and wing it with confidence.")},{t:"I",text:T("Сымпровизирую, главное красиво говорить!","Improvise, the main thing is to speak beautifully!")},{t:"S",text:T("Буду сидеть всю ночь, чтобы не подвести команду.","Sit all night so as not to let the team down.")},{t:"C",text:T("Отменю встречу, так как данные не верифицированы.","Cancel the meeting as data is not verified.")}]},
            {q: T("Ваше отношение к переработкам:","Your attitude towards overtime:"), a: [{t:"D",text:T("Готов ночевать в офисе ради повышения.","Ready to sleep in the office for a promotion.")},{t:"I",text:T("Останусь, если мы закажем пиццу на всех!","I'll stay if we order pizza for everyone!")},{t:"S",text:T("Я не люблю переработки, но не могу отказать.","I don't like it, but I can't say no.")},{t:"C",text:T("Я работаю строго с 9 до 18 по ТК РФ.","I work strictly 9 to 6 according to the law.")}]},
            {q: T("Вы получили премию больше, чем ожидали:","You received a bigger bonus than expected:"), a: [{t:"D",text:T("Я это заслужил. Потребую еще больше.","I deserve it. I'll demand even more.")},{t:"I",text:T("Ура! Угощаю весь отдел кофе!","Yay! Treating the whole department to coffee!")},{t:"S",text:T("Отложу на черный день или в копилку.","Put it away for a rainy day or in a piggy bank.")},{t:"C",text:T("Напишу в бухгалтерию, возможно, ошибка в расчетах.","Write to accounting, might be a calculation error.")}]},
            {q: T("Новый клиент оказался очень токсичным:","A new client turned out to be very toxic:"), a: [{t:"D",text:T("Ставлю его на место или отказываюсь работать.","Put him in his place or refuse to work.")},{t:"I",text:T("Пытаюсь его заболтать и подружиться.","Try to talk him up and make friends.")},{t:"S",text:T("Терплю и вежливо отвечаю на все выпады.","Endure and politely answer all attacks.")},{t:"C",text:T("Общаюсь исключительно через официальные письма.","Communicate exclusively through official emails.")}]},
            {q: T("Вы узнали, что коллега получает больше вас:","You found out a colleague earns more than you:"), a: [{t:"D",text:T("Иду к Боссу и требую повышения с цифрами в руках.","Go to the Boss and demand a raise with numbers.")},{t:"I",text:T("Громко возмущаюсь при всех в кабинете.","Complain loudly in front of everyone.")},{t:"S",text:T("Расстраиваюсь, но продолжаю тихо работать.","Get upset, but quietly continue working.")},{t:"C",text:T("Собираю статистику по рынку труда для аргументации.","Gather labor market stats for argumentation.")}]},
            {q: T("Как вы относитесь к сплетням в офисе?","How do you feel about office gossip?"), a: [{t:"D",text:T("Использую их для получения рычагов влияния.","Use it to gain leverage.")},{t:"I",text:T("Обожаю! Я главный источник всех новостей.","Love it! I am the main source of all news.")},{t:"S",text:T("Стараюсь не участвовать, это вредит коллективу.","Try not to participate, it harms the team.")},{t:"C",text:T("Это неэффективный обмен непроверенной информацией.","It's an inefficient exchange of unverified info.")}]},
            {q: T("Как вы принимаете критику от руководства?","How do you take criticism from management?"), a: [{t:"D",text:T("Спорю и доказываю свою правоту.","Argue and prove I'm right.")},{t:"I",text:T("Обижаюсь, но быстро забываю.","Get offended, but quickly forget.")},{t:"S",text:T("Молча выслушиваю и переживаю в себе.","Listen silently and worry internally.")},{t:"C",text:T("Записываю пункты и требую конкретных примеров.","Write down points and demand specific examples.")}]},
            {q: T("Отношение к бюрократии:","Attitude towards bureaucracy:"), a: [{t:"D",text:T("Терпеть не могу, она тормозит бизнес.","Hate it, it slows down business.")},{t:"I",text:T("Постоянно забываю заполнять формы и теряю их.","Constantly forget to fill out forms and lose them.")},{t:"S",text:T("Заполняю, потому что так принято в компании.","Fill them out because that's the company way.")},{t:"C",text:T("Бюрократия — это основа порядка и контроля.","Bureaucracy is the foundation of order and control.")}]},
            {q: T("В лифте вы оказались наедине с гендиректором:","You are alone in the elevator with the CEO:"), a: [{t:"D",text:T("Предлагаю ему свою идею реорганизации отдела.","Pitch my idea for department reorganization.")},{t:"I",text:T("Делаю комплимент его часам и болтаю о погоде.","Compliment his watch and chat about the weather.")},{t:"S",text:T("Смотрю в телефон, здороваюсь и молчу.","Look at my phone, say hi and keep quiet.")},{t:"C",text:T("Кратко докладываю статус текущих метрик.","Briefly report the status of current metrics.")}]},
            {q: T("Ваш любимый способ обмена информацией:","Your favorite way to exchange information:"), a: [{t:"D",text:T("Звонок. Решаем вопрос за 1 минуту.","Call. Resolve the issue in 1 minute.")},{t:"I",text:T("Личная встреча с кофе и бурными обсуждениями.","Personal meeting with coffee and lively discussions.")},{t:"S",text:T("Общий чат, где все всё видят и никто не забыт.","Group chat where everyone sees everything.")},{t:"C",text:T("Детальное электронное письмо с вложениями.","Detailed email with attachments.")}]},
            {q: T("Идеальное завершение рабочей недели:","Ideal end to the work week:"), a: [{t:"D",text:T("Выполнил план на 150%, обошел конкурентов.","Hit 150% of the target, beat competitors.")},{t:"I",text:T("Шумный поход в бар с коллегами.","Noisy bar trip with colleagues.")},{t:"S",text:T("Тихий вечер дома с пледом и сериалом.","Quiet evening at home with a blanket and TV series.")},{t:"C",text:T("Все отчеты сданы, во входящих ноль писем.","All reports submitted, zero unread emails.")}]},
            {q: T("Вам дали подчиненного, который постоянно тупит:","You were given a subordinate who is constantly slow:"), a: [{t:"D",text:T("Увольняю в тот же день. Нет времени возиться.","Fire them same day. No time to babysit.")},{t:"I",text:T("Пытаюсь его мотивировать и воодушевить.","Try to motivate and inspire them.")},{t:"S",text:T("Вздыхаю и беру часть его работы на себя.","Sigh and take on part of their work.")},{t:"C",text:T("Отправляю его на курсы и пишу подробные инструкции.","Send them to courses and write detailed instructions.")}]},
            {q: T("Вы случайно удалили важную базу данных:","You accidentally deleted an important database:"), a: [{t:"D",text:T("Быстро найду виноватого сисадмина.","Quickly find a sysadmin to blame.")},{t:"I",text:T("Сделаю вид, что так и было, отвлеку всех шуткой.","Pretend it was like that, distract everyone with a joke.")},{t:"S",text:T("Впаду в панику и пойду извиняться перед всеми.","Panic and go apologize to everyone.")},{t:"C",text:T("Подниму логи, найду бэкап и восстановлю систему.","Check logs, find a backup, and restore the system.")}]},
            {q: T("Компания переходит на удаленку:","The company is switching to remote work:"), a: [{t:"D",text:T("Отлично, никто не будет мешать мне достигать целей.","Great, nobody will stop me from achieving goals.")},{t:"I",text:T("Ужас! А как же живое общение у кулера?!","Awful! What about live chats at the water cooler?!")},{t:"S",text:T("Хорошо, дома спокойнее и уютнее.","Good, it's calmer and cozier at home.")},{t:"C",text:T("Нужно настроить VPN и прописать правила связи.","Need to set up VPN and write communication rules.")}]},
            {q: T("На корпоративном тренинге вас просят разбиться на пары:","At a corporate training, you are asked to pair up:"), a: [{t:"D",text:T("Беру самого сильного, чтобы победить в заданиях.","Pick the strongest to win the tasks.")},{t:"I",text:T("Бегу к тому, с кем можно весело поболтать.","Run to someone I can chat and have fun with.")},{t:"S",text:T("Жду, пока кто-нибудь сам выберет меня.","Wait for someone to pick me.")},{t:"C",text:T("Выбираю того, чьи навыки дополняют мои.","Pick someone whose skills complement mine.")}]},
            {q: T("Руководство просит оценить работу коллег:","Management asks you to evaluate colleagues' work:"), a: [{t:"D",text:T("Оценю жестко. Выживает сильнейший.","Grade harshly. Survival of the fittest.")},{t:"I",text:T("Поставлю всем пятерки, мы же команда!","Give everyone top marks, we are a team!")},{t:"S",text:T("Постараюсь никого не обидеть средними баллами.","Try not to offend anyone with average scores.")},{t:"C",text:T("Проведу объективный анализ по каждому KPI.","Conduct an objective analysis for each KPI.")}]},
            {q: T("Вы нашли открытую банку с краской. Что с ней сделать?","You found an open can of paint. What to do with it?"), a: [{t:"D",text:T("Опрокинуть и оставить отпечатки лап по всему двору.","Knock it over and leave paw prints everywhere.")},{t:"I",text:T("Разрисовать себя боевым окрасом и пугать соседских собак.","Paint myself in war colors and scare neighborhood dogs.")},{t:"S",text:T("Осторожно понюхать и пойти мыть лапки.","Carefully sniff it and go wash my paws.")},{t:"C",text:T("Проверить состав на токсичность, прежде чем наступать.","Check composition for toxicity before stepping in.")}]},
            {q: T("Вам нужно пересечь оживленную дорогу ночью:","You need to cross a busy road at night:"), a: [{t:"D",text:T("Перебегу напрямик, пусть машины тормозят!","Run straight across, let cars brake!")},{t:"I",text:T("Дождусь других енотов, вместе веселее перебегать.","Wait for other raccoons, it's funnier to cross together.")},{t:"S",text:T("Найду безопасную водопропускную трубу под дорогой.","Find a safe culvert under the road.")},{t:"C",text:T("Изучу интервалы между машинами и вычислю оптимальное окно.","Study the intervals between cars and calculate the window.")}]},
            {q: T("В чужом гараже вы наткнулись на запасы кошачьей мяты:","In a stranger's garage, you stumbled upon catnip stash:"), a: [{t:"D",text:T("Съем всё сам прямо сейчас, пока не пришли коты.","Eat it all right now before cats arrive.")},{t:"I",text:T("Начну валяться в ней и громко мурчать от удовольствия.","Roll in it and purr loudly with pleasure.")},{t:"S",text:T("Спрячу часть про запас в дупло, остальное оставлю.","Hide some in my hollow for later, leave the rest.")},{t:"C",text:T("Рассортирую по пакетикам для удобной транспортировки.","Sort into small bags for easy transportation.")}]},
            {q: T("На дереве висит кормушка для птиц. Как достать семечки?","A bird feeder hangs on a tree. How to get the seeds?"), a: [{t:"D",text:T("Просто оторву ее и скину на землю.","Just tear it off and throw it on the ground.")},{t:"I",text:T("Буду висеть на ней вниз головой, как акробат.","Hang upside down on it like an acrobat.")},{t:"S",text:T("Дождусь, пока птицы сами просыплют часть на землю.","Wait until birds drop some on the ground themselves.")},{t:"C",text:T("Осторожно откручу крышку, чтобы не повредить механизм.","Carefully unscrew the lid to avoid breaking mechanism.")}]},
            {q: T("Как вы относитесь к стирке печенек в луже?","How do you feel about washing cookies in a puddle?"), a: [{t:"D",text:T("Стирка для слабаков. Ем сухими и хрустящими!","Washing is for the weak. I eat them dry and crunchy!")},{t:"I",text:T("Обожаю булькать ими в воде, это так забавно!","Love bubbling them in water, it's so funny!")},{t:"S",text:T("Тщательно мою каждую печеньку, традиция есть традиция.","Thoroughly wash every cookie, tradition is tradition.")},{t:"C",text:T("Стирка размягчает текстуру на 45%, предпочитаю сухой паек.","Washing softens texture by 45%, I prefer dry rations.")}]},
            {q: T("Собака загнала вас на дерево. Ваши действия?","A dog chased you up a tree. Your actions?"), a: [{t:"D",text:T("Буду кидать в нее шишками, пока не отстанет.","Throw cones at it until it leaves.")},{t:"I",text:T("Буду строить ей смешные рожицы сверху.","Make funny faces at it from above.")},{t:"S",text:T("Просто усну на ветке, рано или поздно она уйдет.","Just fall asleep on the branch, it will leave eventually.")},{t:"C",text:T("Оценю расстояние до соседнего дерева для перепрыгивания.","Estimate the distance to the next tree to jump.")}]},
            {q: T("Вы нашли забытую палатку туристов. Что будете делать?","You found a forgotten tourist tent. What will you do?"), a: [{t:"D",text:T("Прогрызу дыру и захвачу все их запасы еды.","Bite a hole and seize all their food supplies.")},{t:"I",text:T("Устрою батут из спального мешка!","Make a trampoline out of the sleeping bag!")},{t:"S",text:T("Тихонько заберусь внутрь погреться, пока их нет.","Quietly crawl inside to warm up while they are away.")},{t:"C",text:T("Тщательно исследую все карманы рюкзаков на предмет заначек.","Thoroughly inspect all backpack pockets for stashes.")}]},
            {q: T("Если другой енот нашел пиццу быстрее вас:","If another raccoon found the pizza faster than you:"), a: [{t:"D",text:T("Нападу и отберу самую вкусную часть.","Attack and take the tastiest part.")},{t:"I",text:T("Начну выпрашивать кусочек, делая милые глазки.","Start begging for a slice with cute eyes.")},{t:"S",text:T("Найду себе что-нибудь другое на соседней помойке.","Find something else in the neighboring dumpster.")},{t:"C",text:T("Предложу ему обмен на половину найденного мной яблока.","Offer to trade for half of the apple I found.")}]},
            {q: T("Люди оставили на крыльце обувь. Ваши действия?","People left shoes on the porch. Your actions?"), a: [{t:"D",text:T("Утащу один ботинок в лес, просто из вредности.","Drag one shoe into the forest out of spite.")},{t:"I",text:T("Примерю на себя и попробую в них походить!","Try them on and attempt to walk in them!")},{t:"S",text:T("Аккуратно обойду, чтобы не привлекать внимание.","Carefully walk around so as not to attract attention.")},{t:"C",text:T("Осмотрю шнурки на предмет их использования в качестве веревки.","Inspect the laces for use as a rope.")}]},
            {q: T("Как вы реагируете на свет фонарика в темноте?","How do you react to a flashlight in the dark?"), a: [{t:"D",text:T("Смело смотрю прямо на свет, чтобы напугать человека.","Stare directly into the light to scare the human.")},{t:"I",text:T("Начинаю смешно перебирать лапками в луче света.","Start moving my paws funnily in the light beam.")},{t:"S",text:T("Замираю как статуя в надежде, что меня не заметят.","Freeze like a statue hoping I won't be noticed.")},{t:"C",text:T("Ретируюсь в слепую зону за ближайший куст.","Retreat to the blind spot behind the nearest bush.")}]},
            {q: T("Какой мусорный бак для вас идеален?","Which trash can is ideal for you?"), a: [{t:"D",text:T("Самый большой и закрытый, чтобы показать всем свою силу взлома.","The biggest and locked one, to show off my lockpicking skills.")},{t:"I",text:T("Тот, возле которого тусуется много других животных.","The one where many other animals hang out.")},{t:"S",text:T("Знакомый бак за рестораном, который всегда открыт в 10 вечера.","The familiar one behind the restaurant, always open at 10pm.")},{t:"C",text:T("Бак с раздельным сбором мусора, где еда лежит отдельно.","A recycling bin where food is kept separately.")}]},
            {q: T("Вы проникли в дом. С чего начнете?","You broke into a house. Where do you start?"), a: [{t:"D",text:T("С кухни! Холодильник сам себя не опустошит.","The kitchen! Fridge won't empty itself.")},{t:"I",text:T("С гостиной! Там много мягких подушек и блестящих штук.","The living room! Lots of soft pillows and shiny things.")},{t:"S",text:T("Найду тихое место под диваном и буду наблюдать.","Find a quiet spot under the sofa and observe.")},{t:"C",text:T("Изучу планировку комнат и пути отхода через форточку.","Study the room layout and escape routes via the window.")}]},
            {q: T("На вас надели ошейник с колокольчиком. Как быть?","They put a collar with a bell on you. What to do?"), a: [{t:"D",text:T("Сорву его любыми доступными способами и растопчу.","Tear it off by any means and trample it.")},{t:"I",text:T("Буду бегать и звенеть им на всю улицу, привлекая внимание!","Run around ringing it, attracting everyone's attention!")},{t:"S",text:T("Привыкну, зато люди будут знать, что я иду и давать еду.","Get used to it, at least people will know I'm coming and give food.")},{t:"C",text:T("Изучу механизм застежки и аккуратно сниму его когтями.","Study the clasp mechanism and carefully remove it with claws.")}]},
            {q: T("Вы нашли арбуз, но он на другой стороне реки:","You found a watermelon, but it's across the river:"), a: [{t:"D",text:T("Прыгну в воду и поплыву напрямик.","Jump into the water and swim straight across.")},{t:"I",text:T("Буду махать лапами, чтобы люди с лодки меня перевезли.","Wave my paws so people on a boat give me a ride.")},{t:"S",text:T("Подожду, пока течение не прибьет его к моему берегу.","Wait for the current to wash it ashore on my side.")},{t:"C",text:T("Найду поваленное дерево или построю мост из веток.","Find a fallen tree or build a bridge from branches.")}]},
            {q: T("Ваш идеальный выходной:","Your ideal weekend:"), a: [{t:"D",text:T("Драка с котами за контроль над мусорным контейнером.","Fighting cats for control of the dumpster.")},{t:"I",text:T("Шумная вечеринка с другими енотами на крыше гаража.","Loud party with other raccoons on the garage roof.")},{t:"S",text:T("Спокойный сон в уютном теплом дупле.","Peaceful sleep in a cozy warm hollow.")},{t:"C",text:T("Инвентаризация спрятанных блестяшек и сухариков.","Inventory of hidden shiny things and crackers.")}]},
            {q: T("Если вас поймали с поличным на кухне:","If you are caught red-handed in the kitchen:"), a: [{t:"D",text:T("Зашиплю, схвачу кусок колбасы и убегу в окно.","Hiss, grab a piece of sausage and run out the window.")},{t:"I",text:T("Притворюсь ручным и дам почесать себе пузико за еду.","Pretend to be tame and let them scratch my belly for food.")},{t:"S",text:T("Замру и тихо попячусь обратно в темноту.","Freeze and quietly back away into the darkness.")},{t:"C",text:T("Брошу тарелку, чтобы отвлечь внимание, и отступлю.","Drop a plate to distract attention and retreat.")}]},
            {q: T("Как вы готовитесь к зиме?","How do you prepare for winter?"), a: [{t:"D",text:T("Отбираю лучшие дупла у белок и других енотов.","Take the best hollows from squirrels and other raccoons.")},{t:"I",text:T("Наедаю пузико на барбекю у людей, пока они не уехали.","Fatten my belly at human BBQs before they leave.")},{t:"S",text:T("Спокойно обрастаю густой шерстью и сплю больше обычного.","Calmly grow thick fur and sleep more than usual.")},{t:"C",text:T("Составляю карту незамерзающих водоемов и теплых подвалов.","Map out unfrozen water bodies and warm basements.")}]},
            {q: T("Что вы сделаете с найденным блестящим ключом?","What will you do with a shiny key you found?"), a: [{t:"D",text:T("Оставлю на самом видном месте, чтобы показать, что я тут был.","Leave it in plain sight to show I was here.")},{t:"I",text:T("Буду носить его в зубах и хвастаться перед друзьями.","Carry it in my teeth and show off to friends.")},{t:"S",text:T("Спрячу в свою тайную сокровищницу и буду иногда им любоваться.","Hide it in my secret treasury and admire it sometimes.")},{t:"C",text:T("Попытаюсь вставить его во все замочные скважины в округе.","Try to insert it into all keyholes in the area.")}]},
            {q: T("Ваша реакция на поливалку для газона:","Your reaction to a lawn sprinkler:"), a: [{t:"D",text:T("Атакую струю воды, показывая свою доминантность!","Attack the water stream showing my dominance!")},{t:"I",text:T("Устрою водные процедуры с прыжками и кувырками.","Organize a water party with jumps and somersaults.")},{t:"S",text:T("Буду обходить ее стороной, не люблю внезапный душ.","Walk around it, I don't like sudden showers.")},{t:"C",text:T("Вычислю радиус и интервал вращения, чтобы пройти сухим.","Calculate the radius and interval of rotation to pass dry.")}]},
            {q: T("Вы нашли целый пакет маршмэллоу:","You found a whole bag of marshmallows:"), a: [{t:"D",text:T("Съем все сам, пока никто не видит. Никакой дележки.","Eat it all alone. No sharing.")},{t:"I",text:T("Потащу пакет к друзьям, чтобы устроить сладкую вечеринку.","Drag the bag to friends to throw a sweet party.")},{t:"S",text:T("Буду есть по одной штучке в день, чтобы растянуть удовольствие.","Eat one piece a day to stretch the pleasure.")},{t:"C",text:T("Обязательно помою каждую зефирку в луже... ой, они растворились.","Must wash every marshmallow in a puddle... oops, they dissolved.")}]},
            {q: T("Вы нашли закрытый мусорный бак с кодовым замком. Ваши действия?","You found a locked trash can with a combination lock. Your actions?"), a: [{t:"D",text:T("Оторву крышку вместе с петлями.","Tear off the lid along with the hinges.")},{t:"I",text:T("Начну громко пищать, пока люди сами не откроют.","Start squeaking loudly until humans open it.")},{t:"S",text:T("Буду терпеливо ждать, пока кто-нибудь не выбросит мусор.","Wait patiently for someone to throw out the trash.")},{t:"C",text:T("Проанализирую механизм защелки и аккуратно взломаю его.","Analyze the latch mechanism and pick it carefully.")}]},
            {q: T("Соседний кот пытается отобрать вашу сосиску. Как поступите?","A neighborhood cat tries to steal your sausage. What do you do?"), a: [{t:"D",text:T("Нападу первым и отберу у него еще и его корм!","Attack first and steal his food too!")},{t:"I",text:T("Сделаю умилительную мордочку, пусть мне дадут вторую.","Make a cute face so they give me another one.")},{t:"S",text:T("Поделюсь половиной, чтобы избежать конфликта.","Share half to avoid conflict.")},{t:"C",text:T("Залезу на дерево по оптимальной траектории вне досягаемости.","Climb a tree on the optimal path out of reach.")}]},
            {q: T("Вы проникли в дом через форточку. Какова ваша главная цель?","You broke into a house through a window. What is your main goal?"), a: [{t:"D",text:T("Захватить кухню и стать новым хозяином дома.","Take over the kitchen and become the new master.")},{t:"I",text:T("Устроить вечеринку с катанием на шторах.","Throw a party swinging on the curtains.")},{t:"S",text:T("Найти тихое теплое место под диваном и уснуть.","Find a quiet warm spot under the couch and sleep.")},{t:"C",text:T("Провести полную инвентаризацию холодильника.","Conduct a full inventory of the refrigerator.")}]},
            {q: T("Как вы предпочитаете мыть свою еду?","How do you prefer to wash your food?"), a: [{t:"D",text:T("Не мою. Время — деньги, а грязь — приправа.","I don't. Time is money, and dirt is seasoning.")},{t:"I",text:T("Полощу в фонтане, собирая вокруг толпу зрителей.","Wash in a fountain, gathering a crowd of spectators.")},{t:"S",text:T("Строго в своей любимой луже, как учили деды.","Strictly in my favorite puddle, as my grandfathers taught me.")},{t:"C",text:T("Полощу ровно 40 секунд до гибели бактерий.","Wash for exactly 40 seconds until bacteria die.")}]},
            {q: T("Что вы сделаете с найденным блестящим фантиком?","What will you do with a shiny wrapper you found?"), a: [{t:"D",text:T("Прицеплю на грудь как медаль за превосходство.","Pin it on my chest as a medal for superiority.")},{t:"I",text:T("Буду бегать с ним, привлекая внимание енотих.","Run around with it, attracting female raccoons.")},{t:"S",text:T("Спрячу в свою надежную коллекцию в дупле.","Hide it in my reliable collection in the hollow.")},{t:"C",text:T("Изучу его светоотражающие свойства и состав.","Study its light-reflecting properties and composition.")}]},
            {q: T("На дороге лежит печенька, но рядом стоит злая собака:","A cookie lies on the road, but an angry dog is nearby:"), a: [{t:"D",text:T("Иду напролом. Печенька моя, собака будет скулить.","Push forward. The cookie is mine, dog will whine.")},{t:"I",text:T("Устрою цирковое представление, чтобы отвлечь пса.","Put on a circus show to distract the dog.")},{t:"S",text:T("Подожду до ночи, когда собака уснет.","Wait until night when the dog falls asleep.")},{t:"C",text:T("Вычислю слепую зону собаки и подкрадусь сзади.","Calculate the dog's blind spot and sneak up from behind.")}]},
            {q: T("Вы застряли головой в банке из-под арахисовой пасты:","You stuck your head in a peanut butter jar:"), a: [{t:"D",text:T("Пробью банкой стену, чтобы освободиться.","Smash the jar against the wall to break free.")},{t:"I",text:T("Выйду к людям — это же уморительно, дадут еще!","Walk out to people - it's hilarious, they'll give more!")},{t:"S",text:T("Буду сидеть смирно и ждать спасателей.","Sit still and wait for rescuers.")},{t:"C",text:T("Вычислю угол трения пластика и плавно выкручусь.","Calculate the friction angle of plastic and smoothly twist out.")}]},
            {q: T("Ваша любимая тактика воровства кошачьего корма?","Your favorite tactic for stealing cat food?"), a: [{t:"D",text:T("Наглый грабеж средь бела дня с шипением.","Brazen robbery in broad daylight with hissing.")},{t:"I",text:T("Притвориться котенком, чтобы насыпали мне.","Pretend to be a kitten so they pour some for me.")},{t:"S",text:T("Каждую ночь брать по чуть-чуть, чтобы не заметили.","Take a little bit every night so they don't notice.")},{t:"C",text:T("Разработать схему подкопа с чертежами.","Develop a tunneling scheme with blueprints.")}]},
            {q: T("Перед вами огромная лужа грязи:","A huge mud puddle is in front of you:"), a: [{t:"D",text:T("Перепрыгну ее одним прыжком!","Jump over it in one leap!")},{t:"I",text:T("Нырну в нее с разбега, обожаю грязь!","Dive into it with a running start, love mud!")},{t:"S",text:T("Обойду по краешку, чтобы не испачкать лапки.","Walk around the edge to not dirty my paws.")},{t:"C",text:T("Измерю глубину палочкой, прежде чем наступить.","Measure depth with a stick before stepping in.")}]},
            {q: T("Как вы относитесь к другим енотам на вашей территории?","How do you treat other raccoons on your territory?"), a: [{t:"D",text:T("Выгоню всех конкурентов с позором.","Drive away all competitors in disgrace.")},{t:"I",text:T("Отлично! Чем больше нас, тем веселее потрошить мусорки!","Great! The more of us, the more fun to gut trash cans!")},{t:"S",text:T("Если не трогают мои коробки, можем жить в мире.","If they don't touch my boxes, we can live in peace.")},{t:"C",text:T("Составлю график посещения баков для оптимизации.","Draw up a schedule for visiting bins for optimization.")}]}
        ];

        let scores = { D: 0, I: 0, S: 0, C: 0 };
        let qIndex = 0;
        let currentTestQueue = [];

        function initFloor69() {
            charName.innerText = "Элеонора Витальевна (Кадры)";
            document.getElementById('floor-image').src = "https://raw.githubusercontent.com/KuzmichSPRF/QT2/main/HR.png";

            if (!pState.test_passed) {
                showDialog(T("— А, обходной лист собран. Похвально. Но прежде чем я допущу вас к Боссу, по регламенту положено пройти тест DISC. Там ровно 1000 вопросов. Садитесь за терминал и отвечайте честно. Посмотрим, какой вы винтик в нашем корпоративном механизме.", "— Ah, bypass sheet collected. Commendable. But before I let you see the Boss, you must pass the DISC test. There are exactly 1000 questions. Sit at the terminal and answer honestly. Let's see what kind of cog you are in our corporate machine."));
                addBtn(T('СЕСТЬ ЗА ТЕРМИНАЛ (НАЧАТЬ ТЕСТ)', 'SIT AT TERMINAL (START TEST)'), () => {
                    // Идеальное перемешивание вопросов (алгоритм Фишера-Йетса)
                    currentTestQueue = [...testQuestions];
                    for (let i = currentTestQueue.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [currentTestQueue[i], currentTestQueue[j]] = [currentTestQueue[j], currentTestQueue[i]];
                    }
                    qIndex = 0;
                    scores = { D: 0, I: 0, S: 0, C: 0 };
                    startTest();
                });
            } else {
                showDialog(T(`— СТОП! Достаточно. 60 вопросов вполне хватит, чтобы всё про вас понять. Ваш профиль зафиксирован в деле. Тип: ${pState.test_result.type}. ${pState.test_result.desc} Черные двери на 100-й этаж разблокированы. Босс не любит, когда опаздывают.`, `— STOP! Enough. 60 questions are quite enough to understand everything about you. Your profile is recorded. Type: ${pState.test_result.type}. ${pState.test_result.desc} Black doors to the 100th floor are unlocked. The Boss doesn't like it when you're late.`));
            }
        }

        function startTest() {
            if(qIndex >= currentTestQueue.length) { finishTest(); return; }
            
            const q = currentTestQueue[qIndex];
            actionArea.innerHTML = `
                <div class="test-container">
                    <div class="test-progress">${T("Вопрос", "Question")} ${qIndex + 1} ${T("из", "of")} 1000</div>
                    <div class="test-question">${q.q}</div>
                    <div id="answers-area"></div>
                </div>
            `;
            
            const ansArea = document.getElementById('answers-area');
            // Перемешиваем ответы (алгоритм Фишера-Йетса)
            const shuffled = [...q.a];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            shuffled.forEach(ans => {
                const btn = document.createElement('button');
                btn.className = 'action-btn';
                btn.style.fontSize = '0.85rem'; btn.style.textTransform = 'none';
                btn.style.padding = '12px 15px'; btn.style.margin = '6px';
                btn.innerText = ans.text;
                btn.disabled = true; // Защита от мгновенного прокликивания
                
                btn.onclick = () => {
                    scores[ans.t]++;
                    qIndex++;
                    startTest();
                };
                ansArea.appendChild(btn);
                
                setTimeout(() => {
                    btn.disabled = false;
                }, 3000); // Кнопки разблокируются через 1 секунду
            });
        }

        function finishTest() {
            let maxScore = -1; let maxType = '';
            for (let t in scores) { if (scores[t] > maxScore) { maxScore = scores[t]; maxType = t; } }

            let res = { type: '', desc: '' };
            if (maxType === 'D') {
                res.type = T("D (Доминант)", "D (Dominant)");
                res.desc = T("Вы прете напролом, игнорируя правила. Босс любит таких... или съедает первыми.", "You push forward, ignoring rules. The Boss likes these... or eats them first.");
            } else if (maxType === 'I') {
                res.type = T("I (Влияющий)", "I (Influencing)");
                res.desc = T("Вы много болтаете, но умеете убеждать. Посмотрим, сможете ли вы заболтать Босса.", "You talk a lot, but you know how to persuade. Let's see if you can out-talk the Boss.");
            } else if (maxType === 'S') {
                res.type = T("S (Стабильный)", "S (Steady)");
                res.desc = T("Вы тихий, исполнительный планктон. Идеальный сотрудник, чтобы вечно тянуть лямку.", "You are quiet, executive plankton. An ideal employee to pull the strap forever.");
            } else {
                res.type = T("C (Аналитик)", "C (Compliant)");
                res.desc = T("Вы душный бюрократ. Вы даже этот тест читали дважды в поисках подвоха. Отличный кадр.", "You are a stuffy bureaucrat. You even read this test twice looking for a catch. Excellent hire.");
            }

            pState.test_result = res;
            pState.test_passed = true;
            saveState();
            
            actionArea.innerHTML = '';
            initFloor69(); // Перезагружаем диалог с результатами
        }

        // ================= ЭТАЖ 100: БОСС =================
        function initFloor100() {
            charName.innerText = T("ЧЕРНЫЕ ДВЕРИ", "BLACK DOORS");
            document.getElementById('floor-image').src = "https://raw.githubusercontent.com/KuzmichSPRF/Raccoon_life/main/image/vorota.png";
            
            showDialog(T("— Огромные черные двери со скрежетом открываются, пропуская вас внутрь. Путь назад отрезан. Впереди — только кабинет Босса...", "— Huge black doors creak open, letting you in. The way back is cut off. Ahead is only the Boss's office..."), () => {
                addBtn(T('ВОЙТИ К БОССУ (ЗАВЕРШИТЬ)', 'ENTER BOSS OFFICE (FINISH)'), () => {
                    document.getElementById('main-content').classList.add('hidden');
                    document.getElementById('sidebar').classList.add('hidden');
                    document.getElementById('end-screen').classList.remove('hidden');
                });
            });
        }

        document.getElementById("finish-btn").addEventListener("click", function() {
            try { audioIntro.pause(); } catch(e){}
            try { audioBg.pause(); } catch(e){}
            window.parent.postMessage({ type: 'quest_complete', id: 'qt2_6' }, window.location.origin);
        });

    </script>
</body>
</html>
