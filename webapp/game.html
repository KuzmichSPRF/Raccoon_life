<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Raccoon Times: Битва Титанов</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0088cc;
      --accent: #ff0055;
      --bg-color: #121214;
      --card-bg: #1e1e24;
      --text-main: #ffffff;
      --text-sec: #a1a1aa;
      
      --game-green: #00ff88;
      --game-yellow: #ffcc00;
    }
    body { 
      font-family: 'Montserrat', sans-serif; 
      text-align: center; 
      background-color: var(--bg-color); 
      background-image: radial-gradient(circle at top, #1e1e24 0%, #121214 100%);
      margin: 0; 
      padding: 15px; 
      color: var(--text-main); 
    }
    
    .status-box { 
      background: var(--card-bg); border-radius: 15px; padding: 15px; margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3); min-height: 80px; display: flex; 
      align-items: center; justify-content: center; font-weight: bold; color: var(--text-main);
      border: 1px solid rgba(255,255,255,0.05);
      font-size: 1.1rem;
    }

    .arena { display: flex; justify-content: space-around; align-items: flex-end; margin-top: 20px; }
    
    .chip { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #333; 
            display: flex; align-items: center; justify-content: center; font-size: 40px; 
            background: #121214; position: relative; transition: all 0.3s ease; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
    
    .chip.active { border-color: var(--primary); transform: scale(1.1); box-shadow: 0 0 20px rgba(0,136,204,0.4), inset 0 0 10px rgba(0,0,0,0.5); }
    
    /* Анимации */
    @keyframes crit-shake { 0% {transform: rotate(0);} 25% {transform: rotate(10deg);} 75% {transform: rotate(-10deg);} 100% {transform: rotate(0);} }
    .crit { animation: crit-shake 0.2s infinite; border-color: var(--game-yellow) !important; box-shadow: 0 0 15px var(--game-yellow) !important; }
    .heal-effect { border-color: var(--game-green) !important; box-shadow: 0 0 20px var(--game-green) !important; }
    
    .animate-attack { transform: translateX(50px) scale(1.2) !important; }
    .animate-bot-attack { transform: translateX(-50px) scale(1.2) !important; }

    /* Полоски */
    .bars { width: 100px; margin-top: 15px; }
    .bar-label { font-size: 10px; font-weight: bold; text-transform: uppercase; margin-bottom: 3px; display: block; color: var(--text-sec); }
    .bar { height: 8px; background: #333; border-radius: 4px; overflow: hidden; border: none; margin-bottom: 8px; }
    .fill { height: 100%; transition: width 0.4s ease; }
    .hp { background: var(--game-green); box-shadow: 0 0 5px var(--game-green); }
    .energy { background: var(--game-yellow); box-shadow: 0 0 5px var(--game-yellow); }

    /* Кнопки приемов */
    .controls { 
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 30px; 
      background: var(--card-bg); padding: 20px; border-radius: 20px; 
      box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .btn { 
      padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
      color: white; font-size: 0.85rem; transition: transform 0.1s;
      font-family: 'Montserrat', sans-serif;
      text-transform: uppercase;
    }
    .btn:active { transform: scale(0.95); }
    .btn:disabled { background: #333 !important; color: #666; opacity: 1; cursor: not-allowed; }

    .btn-std { background: var(--primary); grid-column: span 2; font-size: 1rem; padding: 16px; box-shadow: 0 0 15px rgba(0,136,204,0.3); }
    .btn-sp1 { background: #e67e22; }
    .btn-sp2 { background: #9b59b6; }
    .btn-sp3 { background: var(--accent); box-shadow: 0 0 15px rgba(255,0,85,0.3); }

    #restart-btn {
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .log { font-size: 0.8rem; margin-top: 15px; color: var(--text-sec); font-style: italic; }
    
    /* Reward Popup */
    .reward-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); display: none; align-items: center;
      justify-content: center; z-index: 1000;
    }
    .reward-popup {
      background: linear-gradient(145deg, #2a2a35, #1f1f28);
      border-radius: 20px; padding: 30px; text-align: center;
      border: 2px solid #ffd700; box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
      animation: popIn 0.3s forwards; max-width: 80%;
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .reward-icon { font-size: 3rem; margin-bottom: 10px; }
    .reward-text { font-size: 1.2rem; font-weight: 800; color: #ffd700; margin-bottom: 5px; }
    .reward-amount { font-size: 2rem; font-weight: 800; color: #ffd700; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
    .btn-continue {
      margin-top: 20px; padding: 14px 40px; background: var(--primary);
      color: white; border: none; border-radius: 50px; font-weight: 800;
      font-size: 1rem; cursor: pointer; text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="status-box" id="msg">Твой ход, Енот! <br>Выбирай прием.</div>

  <div class="arena">
    <div id="p1-area">
      <div id="p1-chip" class="chip active">🦝</div>
      <div class="bars">
        <span class="bar-label">HP</span>
        <div class="bar"><div id="p1-hp" class="fill hp" style="width: 100%;"></div></div>
        <span class="bar-label">Энергия</span>
        <div class="bar"><div id="p1-nrg" class="fill energy" style="width: 0%;"></div></div>
      </div>
      <p><b>Енот</b></p>
    </div>

    <div id="bot-area">
      <div id="bot-chip" class="chip">🤡</div>
      <div class="bars">
        <span class="bar-label">HP</span>
        <div class="bar"><div id="bot-hp" class="fill hp" style="width: 100%;"></div></div>
        <span class="bar-label">Энергия</span>
        <div class="bar"><div id="bot-nrg" class="fill energy" style="width: 0%;"></div></div>
      </div>
      <p><b>Клоун</b></p>
    </div>
  </div>

  <div class="controls" id="controls">
    <button class="btn btn-std" onclick="action('attack')">Обычный удар (+20 Энергии)</button>
    <button class="btn btn-sp1" id="sp1" onclick="action('trash')" disabled>Мусорный залп (40 Энергии)</button>
    <button class="btn btn-sp2" id="sp2" onclick="action('snack')" disabled>Перекус (30 Энергии)</button>
    <button class="btn btn-sp3" id="sp3" onclick="action('rage')" disabled>Ярость Енота (80 Энергии)</button>
    <button class="btn btn-std" id="btn-cookie" onclick="buyCookie()" style="background: #ff69b4; grid-column: 2 / 3;">🍪 100 HP (100 $ENT)</button>
  </div>

  <button class="btn btn-std" id="restart-btn" onclick="restartGame()" style="display: none; margin-top: 15px; background: var(--game-green); color: #000;">🔄 Сыграть ещё</button>

  <!-- Reward Popup -->
  <div class="reward-overlay" id="reward-overlay">
    <div class="reward-popup">
      <div class="reward-icon">🎉</div>
      <div class="reward-text">Победа!</div>
      <div class="reward-amount">+10 $ENT</div>
      <button class="btn-continue" onclick="continueGame()">Продолжить</button>
    </div>
  </div>

  <div class="log" id="log">Битва началась...</div>

  <script>
    let pHP = 100, pNRG = 0;
    let bHP = 100, bNRG = 0;
    let active = true;
    let pStats = { maxHp: 100 };

    function action(type) {
      if (!active) return;
      toggleBtns(true);

      let dmg = 0, heal = 0, cost = 0, text = "";
      let isCrit = Math.random() < 0.2;

      if (type === 'attack') {
        dmg = 10; pNRG = Math.min(100, pNRG + 20);
        text = "Енот наносит четкий удар!";
      } else if (type === 'trash') {
        dmg = 25; cost = 40;
        text = "Енот закидал Клоуна мусором!";
      } else if (type === 'snack') {
        heal = 30; cost = 30;
        text = "Енот съел сухарик и подлечился!";
      } else if (type === 'rage') {
        dmg = 50; cost = 80; isCrit = true;
        text = "ПОЛНАЯ ЯРОСТЬ ЕНОТА!";
      }

      if (isCrit && dmg > 0) { dmg = Math.floor(dmg * 1.5); text = "💥 КРИТ: " + text; }

      pNRG -= cost;
      executeAction('p1-chip', dmg, heal, isCrit, text);

      if (bHP <= 0) return endGame("Клоун улетает в цирк! ЕНОТ ПОБЕДИЛ! 🏆");
      if (active) setTimeout(botTurn, 1500);
    }
    
    function buyCookie() {
      if (!active) return;
      
      // Получаем user_id из Telegram
      let userId = null;
      try {
        if (window.parent && window.parent.tg && window.parent.tg.initDataUnsafe) {
          userId = window.parent.tg.initDataUnsafe.user?.id;
        }
      } catch (e) {
        console.error('Error getting user_id:', e);
      }
      
      if (!userId) {
        document.getElementById('log').innerText = "❌ Ошибка: нет user_id";
        return;
      }
      
      // Блокируем кнопку на время запроса
      const cookieBtn = document.getElementById('btn-cookie');
      cookieBtn.disabled = true;
      
      document.getElementById('log').innerText = "🍪 Покупка печеньки...";
      
      // Списываем 100 токенов
      fetch('/api/sync', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'spend_tokens',
          userId: userId,
          amount: 100,
          reason: 'cookie_heal'
        })
      })
      .then(r => {
        console.log('Response status:', r.status);
        return r.json();
      })
      .then(result => {
        console.log('Result:', result);
        
        // Проверяем статус ответа
        if (result.status === 'error') {
          const errorMsg = result.message || 'Ошибка сервера';
          console.error('API Error:', errorMsg);
          
          if (errorMsg.includes('Insufficient') || errorMsg.includes('недостаточно')) {
            document.getElementById('log').innerText = "❌ Недостаточно токенов!";
          } else {
            document.getElementById('log').innerText = "❌ " + errorMsg;
          }
          return;
        }
        
        if (result.status === 'ok') {
          // Восстанавливаем 100% здоровья
          pHP = pStats.maxHp;
          updateUI();
          document.getElementById('log').innerText = "🍪 100% HP восстановлено!";
          
          // Анимация лечения
          const chip = document.getElementById('p1-chip');
          chip.classList.add('heal-effect');
          setTimeout(() => chip.classList.remove('heal-effect'), 400);
        } else {
          document.getElementById('log').innerText = "❌ Неизвестная ошибка!";
        }
      })
      .catch(err => {
        console.error('❌ Error:', err);
        document.getElementById('log').innerText = "❌ Ошибка сети!";
      })
      .finally(() => {
        setTimeout(() => {
          cookieBtn.disabled = false;
          if (active) toggleBtns(false);
        }, 500);
      });
    }

    function botTurn() {
      if (!active) return;
      let dmg = 0, heal = 0, isCrit = Math.random() < 0.15;
      let text = "";

      if (bNRG >= 70) {
        dmg = 40; bNRG -= 70; text = "🤡 Клоун взрывает огромную петарду!";
      } else if (bHP < 40 && bNRG >= 30) {
        heal = 25; bNRG -= 30; text = "🤡 Клоун достал аптечку из шляпы!";
      } else {
        dmg = 12; bNRG = Math.min(100, bNRG + 25); text = "🤡 Клоун бьет резиновым молотком!";
      }

      if (isCrit && dmg > 0) { dmg = Math.floor(dmg * 1.5); text = "🎈 КРИТ: " + text; }
      
      executeAction('bot-chip', dmg, heal, isCrit, text);

      if (pHP <= 0) return endGame("Клоун оказался хитрее... Енот повержен 🤡");
      toggleBtns(false);
    }

    function executeAction(attackerId, dmg, heal, crit, txt) {
      const chip = document.getElementById(attackerId);
      const log = document.getElementById('log');
      
      // Логика урона
      if (dmg > 0) {
        chip.classList.add(attackerId === 'p1-chip' ? 'animate-attack' : 'animate-bot-attack');
        if (crit) chip.classList.add('crit');
        if (attackerId === 'p1-chip') bHP -= dmg; else pHP -= dmg;
      }
      
      // ИСПРАВЛЕННАЯ ЛОГИКА ЛЕЧЕНИЯ: Лечим того, КТО атакует
      if (heal > 0) {
        chip.classList.add('heal-effect');
        if (attackerId === 'p1-chip') {
            pHP = Math.min(100, pHP + heal);
        } else {
            bHP = Math.min(100, bHP + heal);
        }
      }

      setTimeout(() => {
        chip.classList.remove('animate-attack', 'animate-bot-attack', 'crit', 'heal-effect');
        updateUI();
        document.getElementById('msg').innerHTML = txt;
        log.innerText = `Действие: ${txt} (${dmg > 0 ? -dmg + ' HP' : '+' + heal + ' HP'})`;
      }, 400);
    }

    function updateUI() {
      document.getElementById('p1-hp').style.width = Math.max(0, pHP) + "%";
      document.getElementById('bot-hp').style.width = Math.max(0, bHP) + "%";
      document.getElementById('p1-nrg').style.width = pNRG + "%";
      document.getElementById('bot-nrg').style.width = bNRG + "%";

      document.getElementById('sp1').disabled = (pNRG < 40);
      document.getElementById('sp2').disabled = (pNRG < 30);
      document.getElementById('sp3').disabled = (pNRG < 80);
    }

    function toggleBtns(val) {
      const btns = document.querySelectorAll('.btn');
      btns.forEach(b => b.disabled = val);
      if (!val) updateUI();
    }

    function endGame(txt) {
      active = false;
      updateUI();
      document.getElementById('msg').innerHTML = txt;

      document.getElementById('controls').style.opacity = "0.5";
      toggleBtns(true);

      // Отправляем результат родителю (победа если у бота <= 0 HP)
      const isWin = (bHP <= 0);
      window.parent.postMessage({ type: 'game_complete', game: 'clown', win: isWin }, '*');
      
      // Показываем награду при победе
      if (isWin) {
        showReward(10);
      } else {
        // Показываем кнопку "Сыграть ещё" при поражении
        const restartBtn = document.getElementById('restart-btn');
        if (restartBtn) {
          restartBtn.style.display = 'block';
        }
      }
    }
    
    function showReward(amount) {
      const overlay = document.getElementById('reward-overlay');
      const amountEl = overlay.querySelector('.reward-amount');
      amountEl.textContent = '+' + amount + ' $ENT';
      overlay.style.display = 'flex';
      
      // Начисляем токены
      earnTokens(amount, 'clown_win');
    }
    
    function continueGame() {
      document.getElementById('reward-overlay').style.display = 'none';
      restartGame();
    }
    
    function earnTokens(amount, reason) {
      // Получаем user_id из Telegram
      let userId = null;
      if (window.parent !== window) {
        // Пытаемся получить из parent (WebApp)
        try {
          const tg = window.parent.tg || window.parent.Telegram?.WebApp;
          if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userId = tg.initDataUnsafe.user.id;
          }
        } catch (e) {}
      }
      
      if (!userId) return;
      
      fetch('/api/sync', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'earn_tokens',
          userId: userId,
          amount: amount,
          reason: reason
        })
      })
      .then(r => r.json())
      .then(result => console.log('✅ Tokens earned:', result))
      .catch(err => console.error('❌ Error:', err));
    }

    function restartGame() {
      // Сбрасываем статы
      pHP = 100;
      pNRG = 0;
      bHP = 100;
      bNRG = 0;
      active = true;
      
      // Сбрасываем UI
      document.getElementById('msg').innerHTML = 'Твой ход, Енот! <br>Выбирай прием.';
      document.getElementById('log').innerText = 'Битва началась...';
      document.getElementById('controls').style.opacity = "1";
      
      // Скрываем кнопку рестарта
      const restartBtn = document.getElementById('restart-btn');
      if (restartBtn) {
        restartBtn.style.display = 'none';
      }
      
      updateUI();
      toggleBtns(false);
    }
  </script>
</body>
</html>
