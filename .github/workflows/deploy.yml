name: Deploy Bot

on:
  push:
    branches:
      - main  # или master, проверьте имя своей ветки

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Переходим в папку проекта
            cd /home/${{ secrets.SERVER_USER }}/my_bot
            
            # 2. Обновляем код
            git fetch --all
            git reset --hard origin/main
            
            # 3. Работа с виртуальным окружением
            if [ ! -d "venv" ]; then
                python3 -m venv venv
            fi
            source venv/bin/activate
            
            # 4. Установка библиотек
            if [ -f "requirements.txt" ]; then
                pip install --upgrade pip
                pip install -r requirements.txt
            fi
            
            # 5. Перезапуск через SUDO с передачей пароля
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S systemctl restart my_bot
            
            # 6. Проверка статуса
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S systemctl status my_bot --no-pager
