name: Deploy Raccoon Bot (Dual Server)

on:
  push:
    branches:
      - main  # Сработает при пуше в ветку main
  workflow_dispatch:  # Ручной запуск через GitHub UI

jobs:
  # Деплой на НОВЫЙ сервер (ветка main)
  deploy-new:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to NEW Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY_NEW }}
          command_timeout: 10m
          script: |
            set -e
            
            echo "🚀 Starting deploy..."
            cd ~/Raccoon_life

            # 1. Останавливаем бота
            echo "⏹️ Stopping bot..."
            sudo systemctl stop raccoon_bot || true
            pkill -f bot.py || true
            sleep 2

            # 2. Сбрасываем локальные изменения
            echo "🔄 Resetting local changes..."
            git reset --hard HEAD
            git clean -fd

            # 3. Забираем свежие изменения
            echo "📥 Pulling changes..."
            git pull origin main

            # 4. Создаём/обновляем venv (ОБЯЗАТЕЛЬНО перед запуском!)
            echo "🐍 Setting up venv..."
            if [ -d "venv" ]; then
                echo "Removing old venv..."
                rm -rf venv
            fi
            echo "Creating virtual environment..."
            python3 -m venv venv
            
            source venv/bin/activate

            # 5. Устанавливаем зависимости
            echo "📦 Installing dependencies..."
            pip install --upgrade pip
            pip install -r requirements.txt

            # 6. Проверяем что venv работает
            echo "✅ Python version: $(python --version)"
            echo "✅ Python path: $(which python)"
            
            # Проверяем что файл бота существует
            echo "✅ Bot file exists: $(test -f bot/bot.py && echo 'YES' || echo 'NO')"

            # 7. Перезагружаем systemd (на случай изменений в service файле)
            echo "🔄 Reloading systemd..."
            sudo systemctl daemon-reload

            # 8. Запускаем бота
            echo "▶️ Starting bot..."
            sudo systemctl start raccoon_bot

            # 9. Проверяем статус
            sleep 3
            echo "📊 Bot status:"
            sudo systemctl status raccoon_bot --no-pager || true
            
            # 10. Показываем последние логи если ошибка
            if ! sudo systemctl is-active --quiet raccoon_bot; then
                echo "❌ Bot failed to start! Last logs:"
                sudo journalctl -u raccoon_bot -n 20 --no-pager
                exit 1
            fi
            
            echo "✅ Deploy complete!"