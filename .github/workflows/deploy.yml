name: Deploy Raccoon Bot (Dual Server)

on:
  push:
    branches:
      - main  # Сработает при пуше в ветку main
  workflow_dispatch:  # Ручной запуск через GitHub UI

jobs:
  # Деплой на НОВЫЙ сервер (ветка main)
  deploy-new:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to NEW Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY_NEW }}
          command_timeout: 10m
          script: |
            set -e  # Выход при ошибке
            
            echo "🚀 Starting deploy..."
            cd ~/Raccoon_life

            # 1. Останавливаем бота
            echo "⏹️ Stopping bot..."
            systemctl stop raccoon_bot || sudo systemctl stop raccoon_bot || true
            pkill -f bot.py || sudo pkill -f bot.py || true
            sleep 2

            # 2. Сбрасываем локальные изменения
            echo "🔄 Resetting local changes..."
            git reset --hard HEAD
            git clean -fd

            # 3. Забираем свежие изменения
            echo "📥 Pulling changes..."
            git pull origin main

            # 4. Создаём/обновляем venv
            echo "🐍 Checking venv..."
            if [ ! -d "venv" ]; then
                echo "Creating virtual environment..."
                python3 -m venv venv
            fi
            
            source venv/bin/activate

            # 5. Устанавливаем зависимости
            echo "📦 Installing dependencies..."
            pip install --upgrade pip
            pip install -r requirements.txt

            # 6. Проверяем что venv работает
            echo "✅ Python version: $(python --version)"
            echo "✅ Python path: $(which python)"

            # 7. Запускаем бота
            echo "▶️ Starting bot..."
            systemctl start raccoon_bot || sudo systemctl start raccoon_bot || true

            # 8. Проверяем статус
            sleep 2
            echo "📊 Bot status:"
            systemctl status raccoon_bot --no-pager || sudo systemctl status raccoon_bot --no-pager || true
            
            echo "✅ Deploy complete!"