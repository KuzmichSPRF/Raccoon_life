    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

      color: var(--tg-theme-text-color, #000);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* -------- ГЛАВНОЕ МЕНЮ -------- */
    .screen { display: none; padding: 16px; flex-direction: column; gap: 12px; }
    .active { display: flex; }

    #cover-screen {
      text-align: center;
      justify-content: center;
      height: 90vh;
      gap: 20px;
    }

    .main-menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    .menu-card {
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      border: 1px solid rgba(0,0,0,0.05);
      text-align: center;
    }

    .menu-card:active { transform: scale(0.95); opacity: 0.8; }
    .menu-card-icon { font-size: 2.2rem; }
    .menu-card-title { font-size: 1rem; font-weight: 700; }

    /* -------- СПИСКИ -------- */
    .section-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 8px; }
    
    .list-item {
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: inherit;
    }

    .list-item:active { opacity: 0.7; }
    .list-item-info { 
      flex: 1; 
      overflow: hidden; 
    }
    .list-item-title { 
      font-weight: 600; 
      font-size: 1rem; 
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .list-item-desc { font-size: 0.85rem; opacity: 0.6; margin-top: 2px; }

    /* -------- РИДЕР -------- */
    #reader-screen { padding: 0; height: 100vh; flex-direction: column; }
    #reader-topbar {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      background: var(--tg-theme-bg-color, #fff);
      border-bottom: 1px solid rgba(0,0,0,0.1);
      position: relative;
      z-index: 100;

    #reader-iframe { border: none; width: 100%; flex: 1; height: 100%; }
