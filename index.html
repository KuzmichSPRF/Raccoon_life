<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Question Times 2</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      min-height: 100vh;
    }

    /* -------- ГЛАВНОЕ МЕНЮ -------- */
    .screen { display: none; padding: 16px; flex-direction: column; gap: 12px; }
    .active { display: flex; }

    #cover-screen {
      text-align: center;
      justify-content: center;
      height: 90vh;
      gap: 20px;
    }

    .main-menu-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    .menu-card {
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      cursor: pointer;
      border: 1px solid rgba(0,0,0,0.05);
    }

    .menu-card:active { transform: scale(0.98); opacity: 0.8; }
    .menu-card-icon { font-size: 2rem; }
    .menu-card-title { font-size: 1.2rem; font-weight: 700; }

    /* -------- СПИСКИ -------- */
    .section-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 8px; }
    
    .list-item {
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: inherit;
    }

    .list-item-info { flex: 1; }
    .list-item-title { font-weight: 600; font-size: 1rem; }
    .list-item-desc { font-size: 0.85rem; opacity: 0.6; margin-top: 2px; }

    /* -------- РИДЕР -------- */
    #reader-screen { padding: 0; height: 100vh; }
    #reader-topbar {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      background: var(--tg-theme-bg-color, #fff);
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }
    #back-btn { background: none; border: none; font-size: 1.2rem; color: var(--tg-theme-link-color); padding-right: 15px; }
    #reader-iframe { border: none; width: 100%; flex: 1; }

    .btn-primary {
      background: var(--tg-theme-button-color, #0088cc);
      color: var(--tg-theme-button-text-color, #fff);
      border: none; border-radius: 12px; padding: 16px;
      font-weight: 700; cursor: pointer;
    }
  </style>
</head>
<body>

<div id="app">
  <div id="cover-screen" class="screen active">
    <div style="font-size: 4rem">🦝</div>
    <h1>Raccoon Life</h1>
    <p>Твой гид по миру енотов, квестов и новостей.</p>
    <button class="btn-primary" onclick="navigateTo('main-menu')">Открыть меню</button>
  </div>

  <div id="main-menu" class="screen">
    <h2 class="section-title">Куда отправимся?</h2>
    <div class="main-menu-grid">
      <div class="menu-card" onclick="renderCategory('newspapers')">
        <span class="menu-card-icon">📰</span>
        <span class="menu-card-title">Газеты</span>
      </div>
      <div class="menu-card" onclick="renderCategory('quests')">
        <span class="menu-card-icon">⚔️</span>
        <span class="menu-card-title">Квесты</span>
      </div>
      <div class="menu-card" onclick="renderCategory('partners')">
        <span class="menu-card-icon">🤝</span>
        <span class="menu-card-title">Партнеры</span>
      </div>
    </div>
  </div>

  <div id="list-screen" class="screen">
    <h2 id="category-title" class="section-title">Раздел</h2>
    <div id="category-list" style="display: flex; flex-direction: column; gap: 10px;"></div>
  </div>

  <div id="reader-screen" class="screen">
    <div id="reader-topbar">
      <button id="back-btn" onclick="navigateTo('list-screen')">✕</button>
      <b id="reader-header-title">Просмотр</b>
    </div>
    <iframe id="reader-iframe" src=""></iframe>
  </div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  // ДАННЫЕ
  const DATA = {
    newspapers: {
      title: "📰 Газеты",
      items: [
        { title: "Выпуск #17", desc: "The Raccoon Times", url: "https://telegra.ph/THE-RACCOON-TIMES-March-202628-17-RU-03-03", type: "link" },
        { title: "Выпуск #16", desc: "Архив новостей", url: "https://telegra.ph/Vypusk-16-01-01", type: "link" },
        // Добавляйте новые газеты сюда
      ]
    },
    quests: {
      title: "⚔️ Квесты",
      items: [
        { title: "Глава 1: Встреча в баре", desc: "Начало приключения", url: "qt2_1.1.html", type: "iframe" },
        { title: "Глава 2: Старый замок", desc: "Тайны прошлого", url: "chapter2.html", type: "iframe" },
      ]
    },
    partners: {
      title: "🤝 Партнеры",
      items: [
        { title: "CapsGame", desc: "Игра про крышки в Telegram", url: "https://t.me/example_bot?start=123", type: "external" },
        { title: "Raccoon Squad", desc: "Наше сообщество", url: "https://t.me/raccoon_channel", type: "external" },
      ]
    }
  };

  let currentCategory = '';

  function navigateTo(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
    
    // Управление кнопкой "Назад" в самом Telegram
    if (screenId === 'cover-screen') {
      tg.BackButton.hide();
    } else {
      tg.BackButton.show();
      tg.BackButton.onClick(() => {
        if (screenId === 'reader-screen') navigateTo('list-screen');
        else if (screenId === 'list-screen') navigateTo('main-menu');
        else navigateTo('cover-screen');
      });
    }
  }

  function renderCategory(catKey) {
    currentCategory = catKey;
    const cat = DATA[catKey];
    document.getElementById('category-title').innerText = cat.title;
    const listContainer = document.getElementById('category-list');
    listContainer.innerHTML = '';

    cat.items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'list-item';
      div.innerHTML = `
        <div class="list-item-info">
          <div class="list-item-title">${item.title}</div>
          <div class="list-item-desc">${item.desc}</div>
        </div>
        <div style="opacity: 0.3">›</div>
      `;
      div.onclick = () => handleItemClick(item);
      listContainer.appendChild(div);
    });

    navigateTo('list-screen');
  }

  function handleItemClick(item) {
    if (item.type === 'iframe') {
      // Открываем внутри приложения (для квестов)
      document.getElementById('reader-header-title').innerText = item.title;
      document.getElementById('reader-iframe').src = item.url;
      navigateTo('reader-screen');
    } else if (item.type === 'link') {
      // Для Telegra.ph лучше открывать во встроенном браузере Telegram
      tg.openLink(item.url);
    } else {
      // Для рефералок открываем внешнюю ссылку
      tg.openTelegramLink(item.url);
    }
  }
</script>
</body>
</html>
