  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #app {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* -------- ОБЛОЖКА -------- */
    #cover-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
      gap: 16px;
    }

    #cover-screen h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    #cover-screen p {
      font-size: 1rem;
      opacity: 0.7;
      max-width: 320px;
    }

    /* -------- СПИСОК ГЛАВ -------- */
    #chapters-screen {
      display: none;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }

    #chapters-screen h2 {
      font-size: 1.3rem;
      font-weight: 700;
      padding: 8px 4px;
    }

    .chapter-card {
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 14px;
      padding: 16px;
      cursor: pointer;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chapter-card:active { opacity: 0.65; }

    .chapter-card.locked {
      opacity: 0.4;
      cursor: default;
    }

    .chapter-icon {
      font-size: 1.6rem;
      flex-shrink: 0;
    }

    .chapter-info { flex: 1; }

    .chapter-title {
      font-size: 1rem;
      font-weight: 600;
    }

    .chapter-subtitle {
      font-size: 0.8rem;
      opacity: 0.6;
      margin-top: 2px;
    }

    .chapter-arrow {
      font-size: 1.1rem;
      opacity: 0.4;
    }

    /* -------- РИДЕР -------- */
    #reader-screen {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    #reader-topbar {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 12px;
      background: var(--tg-theme-bg-color, #fff);
      border-bottom: 1px solid rgba(0,0,0,0.07);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    #back-btn {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--tg-theme-link-color, #0088cc);
      padding: 4px;
    }

    #reader-title {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #reader-iframe {
      flex: 1;
      border: none;
      width: 100%;
      height: calc(100vh - 56px);
    }

    /* -------- КНОПКИ -------- */
    .btn-primary {
      background: var(--tg-theme-button-color, #0088cc);
      color: var(--tg-theme-button-text-color, #fff);
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:active { opacity: 0.75; }
  </style>
</head>
<body>
<div id="app">

  <!-- ОБЛОЖКА -->
  <div id="cover-screen">
    <div style="font-size: 3.5rem">📰</div>
    <h1>The Question<br>Times 2</h1>
    <p>Интерактивный квест. Читай главы и делай выборы, которые меняют историю.</p>
    <button class="btn-primary" onclick="showChapters()">Начать</button>
  </div>

  <!-- СПИСОК ГЛАВ -->
  <div id="chapters-screen">
    <h2>📚 Главы</h2>
    <div id="chapters-list"></div>
  </div>

  <!-- РИДЕР -->
  <div id="reader-screen">
    <div id="reader-topbar">
      <button id="back-btn" onclick="showChapters()">←</button>
      <span id="reader-title"></span>
    </div>
    <iframe id="reader-iframe" src="" allowfullscreen></iframe>
  </div>

</div>

<script>
  // Инициализация Telegram WebApp
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  // ============================================================
  //  ДАННЫЕ КВЕСТА
  //  Чтобы добавить новую главу — просто добавьте объект сюда.
  //  published: false  — глава будет показана как заблокированная
  // ============================================================
  const CHAPTERS = [
    {
      id: "qt2_1_1",
      title: "Часть 1",
      subtitle: "Начало истории",
      icon: "📖",
      url: "https://telegra.ph/your-chapter-1-url",   // <-- замените на реальный URL
      published: true
    },
    {
      id: "qt2_1_2",
      title: "Часть 2",
      subtitle: "Скоро...",
      icon: "🔒",
      url: "",
      published: false
    },
    {
      id: "qt2_1_3",
      title: "Часть 3",
      subtitle: "Скоро...",
      icon: "🔒",
      url: "",
      published: false
    }
  ];

  // ============================================================
  //  НАВИГАЦИЯ
  // ============================================================
  function showCover() {
    document.getElementById("cover-screen").style.display = "flex";
    document.getElementById("chapters-screen").style.display = "none";
    document.getElementById("reader-screen").style.display = "none";
    tg.BackButton.hide();
  }

  function showChapters() {
    document.getElementById("cover-screen").style.display = "none";
    document.getElementById("reader-screen").style.display = "none";
    const chapScreen = document.getElementById("chapters-screen");
    chapScreen.style.display = "flex";
    renderChapters();
    tg.BackButton.show();
    tg.BackButton.onClick(showCover);
  }

  function openChapter(chapter) {
    if (!chapter.published || !chapter.url) return;
    document.getElementById("chapters-screen").style.display = "none";
    document.getElementById("reader-title").textContent = chapter.title;
    document.getElementById("reader-iframe").src = chapter.url;
    document.getElementById("reader-screen").style.display = "flex";
    tg.BackButton.show();
    tg.BackButton.onClick(showChapters);
  }

  function renderChapters() {
    const list = document.getElementById("chapters-list");
    list.innerHTML = "";
    CHAPTERS.forEach(ch => {
      const card = document.createElement("div");
      card.className = "chapter-card" + (ch.published ? "" : " locked");
      card.innerHTML = `
        <div class="chapter-icon">${ch.icon}</div>
        <div class="chapter-info">
          <div class="chapter-title">${ch.title}</div>
          <div class="chapter-subtitle">${ch.subtitle}</div>
        </div>
        <div class="chapter-arrow">${ch.published ? "›" : "🔒"}</div>
      `;
      if (ch.published) card.addEventListener("click", () => openChapter(ch));
      list.appendChild(card);
    });
  }
</script>
</body>
