<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Raccoon Life</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0088cc;
      --accent: #ff0055;
      --bg-color: #121214;
      --card-bg: #1e1e24;
      --text-main: #ffffff;
      --text-sec: #a1a1aa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      background-image: radial-gradient(circle at top, #1e1e24 0%, #121214 100%);
    }

    /* -------- ГЛАВНОЕ МЕНЮ -------- */
    .screen { display: none; padding: 16px; flex-direction: column; gap: 12px; }
    .active { display: flex; }

    /* Исправленное центрирование обложки */
    #cover-screen {
      text-align: center;
      align-items: center;
      justify-content: center;
      height: 100vh; /* На всю высоту */
      gap: 20px;
      background: transparent;
      color: var(--text-main);
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: var(--text-sec);
      max-width: 300px;
    }

    .main-menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 20px;
      padding: 0 10px;
    }
    
    @media (min-width: 400px) {
      .main-menu-grid { grid-template-columns: 1fr 1fr; }
    }

    .menu-card {
      background: linear-gradient(145deg, #23232a, #1c1c21);
      border-radius: 20px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      text-align: center;
      box-shadow: 5px 5px 10px #0b0b0c, -5px -5px 10px #25252c;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid rgba(255,255,255,0.05);
      aspect-ratio: 1;
    }

    .menu-card:active { transform: scale(0.95); box-shadow: inset 5px 5px 10px #0b0b0c, inset -5px -5px 10px #25252c; }
    
    .menu-card-icon { 
      font-size: 2.5rem; 
      background: #121214;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--primary);
      box-shadow: 0 0 15px rgba(0, 136, 204, 0.2);
    }
    
    .menu-card-title { font-size: 0.9rem; font-weight: 700; color: var(--text-main); text-transform: uppercase; letter-spacing: 0.5px; }

    /* -------- СПИСКИ -------- */
    .section-title { 
      font-size: 1.8rem; 
      font-weight: 800;
      margin-bottom: 20px; 
      color: var(--text-main);
      padding-left: 5px;
      border: none;
      text-align: left;
      text-shadow: none;
      text-transform: uppercase;
    }
    
    .list-item {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 15px;
      text-decoration: none;
      color: var(--text-main);
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.05);
      transition: transform 0.2s;
    }

    .list-item:active { transform: scale(0.98); }
    .list-item-info { flex: 1; overflow: hidden; }
    .list-item-title { 
      font-size: 1.1rem; 
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 5px;
    }
    .list-item-desc { font-size: 0.9rem; color: var(--text-sec); }

    /* -------- РИДЕР -------- */
    #reader-screen { padding: 0; height: 100vh; flex-direction: column; background: var(--bg-color); }
    #reader-topbar {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      background: var(--card-bg);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      position: relative;
      z-index: 100;
    }
    #back-btn { 
      background: transparent; 
      border: none; 
      font-size: 1.5rem; 
      color: var(--text-main); 
      padding: 5px 10px; 
      cursor: pointer; 
      margin-right: 10px;
      box-shadow: none;
    }
    #back-btn:active { opacity: 0.6; transform: none; }
    
    #reader-header-title { font-size: 1.1rem; font-weight: 700; }
    
    #reader-iframe { border: none; width: 100%; flex: 1; height: 100%; }

    /* Центрированная кнопка */
    .btn-primary {
      background: var(--primary);
      color: white;
      border: none; 
      border-radius: 50px; 
      padding: 16px;
      font-family: 'Montserrat', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer; 
      width: 80%;
      max-width: 280px;
      margin: 0 auto; /* Дополнительная гарантия центра */
      box-shadow: 0 0 20px rgba(0, 136, 204, 0.4);
      transition: transform 0.2s;
    }
    .btn-primary:active {
      transform: scale(0.95);
      box-shadow: 0 0 10px rgba(0, 136, 204, 0.2);
    }
  </style>
</head>
<body>

<div id="app">
  <div id="cover-screen" class="screen active">
    <div style="font-size: 5rem; filter: drop-shadow(0 0 20px rgba(0,136,204,0.5));">🦝</div>
    <h1>Raccoon Life</h1>
    <p>Твой гид по миру енотов, квестов и новостей.</p>
    <button class="btn-primary" onclick="navigateTo('main-menu')">Открыть меню</button>
  </div>

  <div id="main-menu" class="screen">
    <h2 class="section-title">Куда отправимся?</h2>
    <div class="main-menu-grid">
      <div class="menu-card" onclick="renderCategory('newspapers')">
        <span class="menu-card-icon">📰</span>
        <span class="menu-card-title">Газеты</span>
      </div>
      <div class="menu-card" onclick="renderCategory('quests')">
        <span class="menu-card-icon">⚔️</span>
        <span class="menu-card-title">Квесты</span>
      </div>
      <div class="menu-card" onclick="renderCategory('games')">
        <span class="menu-card-icon">🎮</span>
        <span class="menu-card-title">Игры</span>
      </div>
      <div class="menu-card" onclick="renderCategory('partners')">
        <span class="menu-card-icon">🤝</span>
        <span class="menu-card-title">Партнеры</span>
      </div>
    </div>
  </div>

  <div id="list-screen" class="screen">
    <h2 id="category-title" class="section-title">Раздел</h2>
    <div id="category-list" style="display: flex; flex-direction: column; gap: 10px;"></div>
  </div>

  <div id="reader-screen" class="screen">
    <div id="reader-topbar">
      <button id="back-btn" onclick="handleBack()">✕</button>
      <b id="reader-header-title">Просмотр</b>
    </div>
    <iframe id="reader-iframe" src="" allow="autoplay; accelerometer; gyroscope; picture-in-picture"></iframe>
  </div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  const DATA = {
    newspapers: {
      title: "📰 Газеты",
      items: [
        { title: "Выпуск #17", desc: "The Raccoon Times", url: "https://telegra.ph/THE-RACCOON-TIMES-March-202628-17-RU-03-03", type: "link" },
        { title: "Выпуск #16", desc: "The Raccoon Times", url: "https://telegra.ph/THE-RACCOON-TIMES-February-2026-228-16-RU-02-08", type: "link" }
      ]
    },
    quests: {
      title: "⚔️ Квесты",
      items: [
        { title: "Глава 1: Встреча в баре", desc: "Начало приключения", url: "qt2_1.1.html", type: "iframe" }
      ]
    },
    games: {
      title: "🎮 Игры",
      items: [
        { title: "Битва фишек", desc: "Клоун против Енота", url: "game.html", type: "iframe" },
        { title: "PVP: Vladeos", desc: "Попробуй обыграть @Vladeos", url: "vladeos_pvp.html", type: "iframe" }
      ]
    },
    partners: {
      title: "🤝 Партнеры",
      items: [
        { title: "CapsGame", desc: "Игра про фишки в Telegram", url: "https://t.me/CapsGameBot/play?startapp=r_LNPaQygljssfQTGaGc33", type: "external" }
      ]
    }
  };

  function handleBack() {
    const currentScreen = document.querySelector('.screen.active').id;
    if (currentScreen === 'reader-screen') {
      document.getElementById('reader-iframe').src = "";
      navigateTo('list-screen');
    } else if (currentScreen === 'list-screen') {
      navigateTo('main-menu');
    } else if (currentScreen === 'main-menu') {
      navigateTo('cover-screen');
    }
  }

  function navigateTo(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
    window.scrollTo(0,0);
    
    tg.BackButton.offClick(handleBack);
    if (screenId === 'cover-screen') tg.BackButton.hide();
    else {
      tg.BackButton.show();
      tg.BackButton.onClick(handleBack);
    }
  }

  function renderCategory(catKey) {
    const cat = DATA[catKey];
    document.getElementById('category-title').innerText = cat.title;
    const listContainer = document.getElementById('category-list');
    listContainer.innerHTML = '';

    cat.items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'list-item';
      div.innerHTML = `<div class="list-item-info"><div class="list-item-title">${item.title}</div><div class="list-item-desc">${item.desc}</div></div><div style="color: #ccc">›</div>`;
      div.onclick = () => handleItemClick(item);
      listContainer.appendChild(div);
    });
    navigateTo('list-screen');
  }

  function handleItemClick(item) {
    if (item.type === 'iframe') {
      document.getElementById('reader-header-title').innerText = item.title;
      document.getElementById('reader-iframe').src = item.url;
      navigateTo('reader-screen');
    } else if (item.type === 'link') tg.openLink(item.url);
    else tg.openTelegramLink(item.url);
  }
</script>
</body>
</html>
