<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Raccoon Life</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0088cc;
      --accent: #ff0055;
      --bg-color: #121214;
      --card-bg: #1e1e24;
      --text-main: #ffffff;
      --text-sec: #a1a1aa;
      --game-green: #00ff88;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      background-image: radial-gradient(circle at top, #1e1e24 0%, #121214 100%);
    }

    /* -------- ГЛАВНОЕ МЕНЮ -------- */
    .screen { display: none; padding: 5vh 16px 20px; flex-direction: column; gap: 12px; }
    .active { display: flex; }

    @media (max-width: 600px) {
      .screen { padding-top: 5vh; }
    }

    /* Исправленное центрирование обложки */
    #cover-screen {
      text-align: center;
      align-items: center;
      justify-content: center;
      height: 100vh; /* На всю высоту */
      gap: 20px;
      background: transparent;
      color: var(--text-main);
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: var(--text-sec);
      max-width: 300px;
    }

    .main-menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 0;
      padding: 0 10px;
    }
    
    @media (min-width: 400px) {
      .main-menu-grid { grid-template-columns: 1fr 1fr; }
    }

    .menu-card {
      background: linear-gradient(145deg, #23232a, #1c1c21);
      border-radius: 20px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      text-align: center;
      box-shadow: 5px 5px 10px #0b0b0c, -5px -5px 10px #25252c;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid rgba(255,255,255,0.05);
      aspect-ratio: 1;
    }

    .menu-card:active { transform: scale(0.95); box-shadow: inset 5px 5px 10px #0b0b0c, inset -5px -5px 10px #25252c; }
    
    .menu-card-icon { 
      font-size: 2.5rem; 
      background: #121214;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--primary);
      box-shadow: 0 0 15px rgba(0, 136, 204, 0.2);
    }
    
    .menu-card-title { font-size: 0.9rem; font-weight: 700; color: var(--text-main); text-transform: uppercase; letter-spacing: 0.5px; }

    /* -------- СПИСКИ -------- */
    .section-title { 
      font-size: 1.8rem; 
      font-weight: 800;
      margin-bottom: 20px; 
      color: var(--text-main);
      padding-left: 5px;
      border: none;
      text-align: left;
      text-shadow: none;
      text-transform: uppercase;
    }
    
    .list-item {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 15px;
      text-decoration: none;
      color: var(--text-main);
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.05);
      transition: transform 0.2s;
    }
    
    .list-item.completed {
      border: 1px solid var(--game-green);
      box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
    }

    .list-item:active { transform: scale(0.98); }
    .list-item-info { flex: 1; overflow: hidden; }
    .list-item-title { 
      font-size: 1.1rem; 
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 5px;
    }
    
    .list-item.completed .list-item-title::after {
      content: ' ✅';
      color: var(--game-green);
    }
    .list-item-desc { font-size: 0.9rem; color: var(--text-sec); }

    /* -------- РИДЕР -------- */
    #reader-screen { padding: 0; height: 100vh; flex-direction: column; background: var(--bg-color); }
    #reader-topbar {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      background: var(--card-bg);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      position: relative;
      z-index: 100;
    }
    #back-btn { 
      background: transparent; 
      border: none; 
      font-size: 1.5rem; 
      color: var(--text-main); 
      padding: 5px 10px; 
      cursor: pointer; 
      margin-right: 10px;
      box-shadow: none;
    }
    #back-btn:active { opacity: 0.6; transform: none; }
    
    #reader-header-title { font-size: 1.1rem; font-weight: 700; }
    
    #reader-iframe { border: none; width: 100%; flex: 1; height: 100%; }

    /* Центрированная кнопка */
    .btn-primary {
      background: var(--primary);
      color: white;
      border: none; 
      border-radius: 50px; 
      padding: 16px;
      font-family: 'Montserrat', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer; 
      width: 80%;
      max-width: 280px;
      margin: 0 auto; /* Дополнительная гарантия центра */
      box-shadow: 0 0 20px rgba(0, 136, 204, 0.4);
      transition: transform 0.2s;
    }
    .btn-primary:active {
      transform: scale(0.95);
      box-shadow: 0 0 10px rgba(0, 136, 204, 0.2);
    }

    /* -------- РЕЙТИНГ -------- */
    .leaderboard-item {
      background: var(--card-bg);
      border-radius: 15px;
      padding: 15px;
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 10px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .rank-badge {
      font-size: 1.2rem; font-weight: 800; color: var(--primary);
      width: 30px; text-align: center;
    }
    .player-details { flex: 1; }
    .player-name { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
    .player-stats { font-size: 0.75rem; color: var(--text-sec); display: flex; gap: 8px; flex-wrap: wrap; }
    .player-score { font-size: 1.1rem; font-weight: 800; color: var(--accent); }
    .stat-tag { background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>

<div id="app">
  <div id="cover-screen" class="screen active">
    <div style="font-size: 5rem; filter: drop-shadow(0 0 20px rgba(0,136,204,0.5));">🦝</div>
    <h1>Raccoon Life</h1>
    <p>Твой гид по миру енотов, квестов и новостей.</p>
    <button class="btn-primary" onclick="navigateTo('main-menu')">Открыть меню</button>
  </div>

  <div id="main-menu" class="screen">
    <div class="main-menu-grid">
      <div class="menu-card" onclick="renderCategory('newspapers')">
        <span class="menu-card-icon">📰</span>
        <span class="menu-card-title">Газеты</span>
      </div>
      <div class="menu-card" onclick="renderCategory('quests')">
        <span class="menu-card-icon">❓</span>
        <span class="menu-card-title">Квесты</span>
      </div>
      <div class="menu-card" onclick="renderCategory('games')">
        <span class="menu-card-icon">🎮</span>
        <span class="menu-card-title">Игры</span>
      </div>
      <div class="menu-card" onclick="renderCategory('partners')">
        <span class="menu-card-icon">🤝</span>
        <span class="menu-card-title">Партнеры</span>
      </div>
      <div class="menu-card" onclick="showLeaderboard()">
        <span class="menu-card-icon">🏆</span>
        <span class="menu-card-title">Рейтинг</span>
      </div>
      <div class="menu-card" onclick="tg.openLink('https://ton.app/pay/transfer/raccoon-times.ton?amount=0')">
        <span class="menu-card-icon">💎</span>
        <span class="menu-card-title">Поддержать проект</span>
      </div>
    </div>
  </div>

  <div id="list-screen" class="screen">
    <h2 id="category-title" class="section-title">Раздел</h2>
    <div id="category-list" style="display: flex; flex-direction: column; gap: 10px;"></div>
  </div>

  <div id="rating-screen" class="screen">
    <h2 class="section-title">Топ Игроков</h2>
    <div id="leaderboard-list" style="padding-bottom: 20px;"></div>
  </div>

  <div id="reader-screen" class="screen">
    <div id="reader-topbar">
      <button id="back-btn" onclick="handleBack()">✕</button>
      <b id="reader-header-title">Просмотр</b>
    </div>
    <iframe id="reader-iframe" src="" allow="autoplay; accelerometer; gyroscope; picture-in-picture"></iframe>
  </div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  const DATA = {
    newspapers: {
      title: "📰 Газеты",
      items: [
        { id: "news_17", title: "Выпуск #17", desc: "The Raccoon Times", url: "https://telegra.ph/THE-RACCOON-TIMES-March-202628-17-RU-03-03", type: "link" },
        { id: "news_16", title: "Выпуск #16", desc: "The Raccoon Times", url: "https://telegra.ph/THE-RACCOON-TIMES-February-2026-228-16-RU-02-08", type: "link" },
        { id: "news_15", title: "Выпуск #15", desc: "The Raccoon Times", url: "https://telegra.ph/THE-RACCOON-TIMES-December-1488-2025-15-RU-12-07", type: "link" },
        { id: "news_14", title: "Выпуск #14", desc: "The Raccoon Times", url: "https://telegra.ph/THE-RACCOON-TIMES-0210-SEPTEMBER-2025-14-10-02", type: "link" },
        { id: "news_13", title: "Выпуск #13", desc: "The Raccoon Times", url: "https://telegra.ph/THE-RACCOON-TIMES-SEPTEMBER-04092025-13-RU-09-06", type: "link" },
        { id: "news_12", title: "Выпуск #12", desc: "The Raccoon Times", url: "https://telegra.ph/THE-RACCOON-TIMES-AUGUST-2469-2025--RU-08-17", type: "link" },
        { id: "news_11", title: "Выпуск #11", desc: "The Raccoon Times", url: "https://telegra.ph/THE-RACCOON-TIMES-JULY-2025-1155-RU-07-26", type: "link" },
        { id: "news_10", title: "Выпуск #10", desc: "The Raccoon Times", url: "https://telegra.ph/THE-RACCOON-TIMES-55-87-JULY-2025-10-RU-07-06", type: "link" },
        { id: "news_9", title: "Выпуск #9", desc: "The Raccoon Times", url: "https://telegra.ph/THE-RACCOON-TIMES-May-2025-9-579611-RU-06-08", type: "link" },
        { id: "news_8", title: "Выпуск #8", desc: "The Raccoon Times", url: "https://telegra.ph/THE-RACCOON-TIMES-May-45872025-8-RU-05-18", type: "link" },
        { id: "news_7", title: "Выпуск #7", desc: "The Raccoon Times", url: "https://telegra.ph/THE-RACCOON-TIMES-99867-May-2025-7-RU-04-30", type: "link" },
        { id: "news_6", title: "Выпуск #6", desc: "The Raccoon Times", url: "https://telegra.ph/THE-RACCOON-2346-TIMES-April-2025-6-RU-04-18", type: "link" },
        { id: "news_5", title: "Выпуск #5", desc: "The Raccoon Times", url: "https://telegra.ph/THE-RACCOON-TIMES-March-2025-5-03-25", type: "link" },
        { id: "news_4", title: "Выпуск #4", desc: "The Raccoon Times", url: "https://telegra.ph/THE-RACCOON-TIMES-March-2025-4-03-04", type: "link" },
        { id: "news_3", title: "Выпуск #3", desc: "The Raccoon Times", url: "https://telegra.ph/THE-RACCOON-TIMES-February-2025-2-02-08", type: "link" },
        { id: "news_2", title: "Выпуск #2", desc: "The Raccoon Times", url: "https://telegra.ph/THE-RACCOON-TIMES-JANUARY-2025-2-01-23", type: "link" },
        { id: "news_1", title: "Выпуск #1", desc: "The Raccoon Times", url: "https://telegra.ph/THE-RACCOON-TIMES-JANUARY-01-08", type: "link" }
      ]
    },
    quests: {
      title: "❓ Квесты",
      items: [
        { title: "The Questoon Times Remake", desc: "Классика", type: "folder", target: "qt_remake" },
        { title: "The Questoon Times 2", desc: "Продолжение", type: "folder", target: "qt_2" }
      ]
    },
    qt_remake: {
      title: "QT Remake",
      items: [
        { title: "SOON...", desc: "В разработке", type: "alert", msg: "Скоро..." }
      ]
    },
    qt_2: {
      title: "QT 2",
      items: [
        { id: "qt2_1", title: "Глава 1: Встреча в баре", desc: "Начало приключения", url: "qt2_1.1.html", type: "iframe" }
      ]
    },
    games: {
      title: "🎮 Игры",
      items: [
        { title: "Битва фишек", desc: "Клоун против Енота", url: "game.html", type: "iframe" },
        { title: "PVP: Vladeos", desc: "Попробуй обыграть @Vladeos", url: "vladeos_pvp.html", type: "iframe" },
        { title: "Башня 3.0", desc: "Бесконечные уровни", url: "tower_game.html", type: "iframe" }
      ]
    },
    partners: {
      title: "🤝 Партнеры",
      items: [
        { title: "CapsGame", desc: "Игра про фишки в Telegram", url: "https://t.me/CapsGameBot/play?startapp=r_LNPaQygljssfQTGaGc33", type: "external" }
      ]
    }
  };

  function handleBack() {
    const currentScreen = document.querySelector('.screen.active').id;
    if (currentScreen === 'reader-screen') {
      document.getElementById('reader-iframe').src = "";
      navigateTo('list-screen');
    } else if (currentScreen === 'rating-screen') {
      navigateTo('main-menu');
    } else if (currentScreen === 'list-screen') {
      navigateTo('main-menu');
    } else if (currentScreen === 'main-menu') {
      navigateTo('cover-screen');
    }
  }

  function navigateTo(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
    window.scrollTo(0,0);
    
    tg.BackButton.offClick(handleBack);
    if (screenId === 'cover-screen') tg.BackButton.hide();
    else {
      tg.BackButton.show();
      tg.BackButton.onClick(handleBack);
    }
  }

  let currentCategory = null;

  function renderCategory(catKey) {
    currentCategory = catKey;
    const cat = DATA[catKey];
    document.getElementById('category-title').innerText = cat.title;
    const listContainer = document.getElementById('category-list');
    listContainer.innerHTML = '';

    let completedItems = [];
    try {
      completedItems = JSON.parse(localStorage.getItem('completed_items') || '[]');
    } catch (e) {
      console.error(e);
    }

    cat.items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'list-item';
      if (item.id && completedItems.includes(item.id)) {
        div.classList.add('completed');
      }
      div.innerHTML = `<div class="list-item-info"><div class="list-item-title">${item.title}</div><div class="list-item-desc">${item.desc}</div></div><div style="color: #ccc">›</div>`;
      div.onclick = () => handleItemClick(item);
      listContainer.appendChild(div);
    });
    navigateTo('list-screen');
  }

  function markAsCompleted(id) {
    if (!id) return;
    try {
      let completed = JSON.parse(localStorage.getItem('completed_items') || '[]');
      if (!completed.includes(id)) {
        completed.push(id);
        localStorage.setItem('completed_items', JSON.stringify(completed));
        // Обновляем список, если он открыт
        if (currentCategory) {
          renderCategory(currentCategory);
        }
      }
    } catch (e) {
      console.error(e);
    }
  }

  function handleItemClick(item) {
    // Если это ссылка или внешний ресурс, отмечаем как прочитанное сразу
    if ((item.type === 'link' || item.type === 'external') && item.id) {
      markAsCompleted(item.id);
    }

    if (item.type === 'folder') {
      renderCategory(item.target);
    } else if (item.type === 'alert') {
      tg.showAlert ? tg.showAlert(item.msg) : alert(item.msg);
    } else if (item.type === 'iframe') {
      document.getElementById('reader-header-title').innerText = item.title;
      document.getElementById('reader-iframe').src = item.url;
      navigateTo('reader-screen');
    } else if (item.type === 'link') tg.openLink(item.url);
    else tg.openTelegramLink(item.url);
  }

  function showLeaderboard() {
    const list = document.getElementById('leaderboard-list');
    list.innerHTML = '';

    // Имитация данных игроков
    // Формула для примера
    const players = [
      { name: "Vladeos", games: 150, wins: 120, donat: 5000, login: 45, score: 0 },
      { name: "RaccoonKing", games: 300, wins: 100, donat: 0, login: 12, score: 0 },
      { name: "Donater777", games: 10, wins: 2, donat: 50000, login: 1, score: 0 },
      { name: "PlayerOne", games: 50, wins: 25, donat: 100, login: 5 },
      { name: "Guest_99", games: 5, wins: 0, donat: 0, login: 1 }
    ];

    // Расчет очков
    players.forEach(p => {
      p.score = (p.wins * 15) + (p.games * 5) + (p.login * 10) + (p.donat * 1);
    });

    // Сортировка
    players.sort((a, b) => b.score - a.score);

    players.forEach((p, i) => {
      const div = document.createElement('div');
      div.className = 'leaderboard-item';
      div.innerHTML = `
        <div class="rank-badge">#${i + 1}</div>
        <div class="player-details">
          <div class="player-name">${p.name}</div>
          <div class="player-stats"><span class="stat-tag">🎮 ${p.games}</span> <span class="stat-tag">🏆 ${p.wins}</span> <span class="stat-tag">📅 ${p.login}</span> <span class="stat-tag">💎 ${p.donat}</span></div>
        </div>
        <div class="player-score">${p.score}</div>
      `;
      list.appendChild(div);
    });

    navigateTo('rating-screen');
  }

  // Обработка сообщений от iframe (квесты, игры, башня)
  window.addEventListener('message', function(event) {
    if (!event.data) return;
    
    // Завершение квеста
    if (event.data.type === 'quest_complete') {
        markAsCompleted(event.data.id);
        handleBack();
    }
    
    // Статистика игр (победа/поражение)
    if (event.data.type === 'game_complete') {
        let games = parseInt(localStorage.getItem('games_played') || '0');
        localStorage.setItem('games_played', games + 1);
        
        if (event.data.win) {
            let wins = parseInt(localStorage.getItem('wins_count') || '0');
            localStorage.setItem('wins_count', wins + 1);
        }
    }
    
    // Прогресс башни
    if (event.data.type === 'tower_update') {
        let currentMax = parseInt(localStorage.getItem('tower_max_level') || '0');
        if (event.data.level > currentMax) {
            localStorage.setItem('tower_max_level', event.data.level);
        }
    }
  });
</script>
</body>
</html>
